<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta name="apple-mobile-web-app-capable" content="yes" />
        <meta
            name="apple-mobile-web-app-status-bar-style"
            content="black-translucent"
        />
        <title>Employee Shift Scheduler</title>
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            html,
            body {
                overflow: visible;
                height: auto;
            }

            body {
                font-family:
                    -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                    Oxygen, Ubuntu, Cantarell, sans-serif;
                min-height: 100vh;
                -webkit-text-size-adjust: 100%;
            }

            .container {
                max-width: 1400px;
                margin: 0 auto;
            }

            .header {
                color: white;
                text-align: center;
            }

            .toolbar,
            .toolbar-group,
            .toolbar-btn,
            .btn,
            .drawer-header,
            .sidebar-toggle,
            .filter-checkbox-item,
            .rate-item-header,
            .request-header,
            .request-actions,
            .date-chip,
            .date-chip-remove {
                display: flex;
                align-items: center;
            }

            .toolbar {
                justify-content: space-between;
                flex-wrap: wrap;
            }

            .toolbar-group,
            .request-actions,
            .selected-dates-chips {
                gap: 8px;
            }

            .toolbar-left,
            .toolbar-right,
            .toolbar-actions,
            .toolbar-status {
                display: flex;
                align-items: center;
            }

            .toolbar-divider {
                width: 1px;
                height: 24px;
                background: rgba(255, 255, 255, 0.3);
                margin: 0 8px;
            }

            .toolbar-btn,
            .btn,
            .week-navigation button,
            .date-picker-nav button,
            .add-item-type-btn,
            .day-off-period-btn,
            .add-shift-btn,
            .request-tab,
            .date-picker-date,
            .shift-delete,
            .btn-small-delete,
            .btn-archive,
            .approve-deny-btn,
            .date-chip-remove {
                border: none;
                cursor: pointer;
                font-weight: 600;
                -webkit-tap-highlight-color: transparent;
            }

            .toolbar-btn,
            .btn {
                justify-content: center;
                gap: 6px;
            }

            .toolbar-btn svg {
                width: 16px;
                height: 16px;
            }

            .toolbar-btn:disabled {
                opacity: 0.5;
                cursor: not-allowed;
                transform: none;
            }

            .main-content {
                display: grid;
                grid-template-columns: 300px 1fr;
            }

            .section {
                margin-bottom: 16px;
            }

            .input-group {
                margin-bottom: 12px;
            }

            .input-group label,
            .filter-checkbox-item label {
                display: block;
                cursor: pointer;
            }

            .input-group input,
            .input-group select {
                width: 100%;
                font-size: 14px;
            }

            .input-group input[type="color"] {
                width: 80px;
                height: 80px;
                padding: 5px;
                cursor: pointer;
            }

            .btn {
                width: 100%;
                padding: 10px 14px;
                font-size: 13px;
            }

            .employee-list {
                margin-top: 12px;
            }

            .employee-item {
                display: flex;
                justify-content: space-between;
                align-items: center;
                padding: 12px 14px;
                margin-bottom: 8px;
                cursor: move;
            }

            .employee-item.archived {
                opacity: 0.5;
            }

            .employee-item.archived .employee-name::after {
                content: " (Archived)";
                font-size: 10px;
                color: #999;
                font-weight: normal;
                margin-left: 4px;
            }

            .employee-item.dragging,
            .shift-card.dragging {
                opacity: 0.5;
            }

            .employee-name {
                font-weight: 600;
                font-size: 14px;
            }

            .employee-role,
            .shift-time {
                font-size: 11px;
            }

            .rate-item {
                padding: 12px;
                margin-bottom: 10px;
            }

            .rate-item-header {
                justify-content: space-between;
                margin-bottom: 10px;
            }

            .rate-fields {
                display: grid;
                grid-template-columns: repeat(3, 1fr);
                gap: 10px;
            }

            .rate-fields input {
                padding: 8px;
                font-size: 13px;
            }

            .btn-small-delete,
            .btn-archive,
            .approve-deny-btn {
                color: white;
            }

            .btn-small-delete {
                padding: 4px 10px;
                font-size: 12px;
            }

            .btn-archive {
                min-width: 36px;
                padding: 6px 12px;
                font-size: 16px;
            }

            .drawer-header {
                justify-content: space-between;
                cursor: pointer;
                margin-bottom: 0;
            }

            .drawer-header h3 {
                margin: 0;
                color: white;
                font-size: 14px;
                display: flex;
                align-items: center;
                gap: 8px;
            }

            .drawer-toggle {
                transition: transform 0.3s;
            }

            .drawer-toggle.open {
                transform: rotate(180deg);
            }

            .drawer-content {
                max-height: 0;
                overflow: hidden;
                padding: 0;
                transition: max-height 0.3s ease-out;
            }

            .drawer-content.open {
                max-height: 2000px;
                padding: 14px;
                transition: max-height 0.5s ease-in;
            }

            .sidebar-toggle,
            .filter-checkbox-item {
                cursor: pointer;
                padding: 12px 14px;
            }

            .sidebar-toggle input[type="checkbox"],
            .filter-checkbox-item input[type="checkbox"],
            #editIsDayOff {
                appearance: none;
                -webkit-appearance: none;
                display: grid;
                place-content: center;
                width: 18px;
                height: 18px;
                flex: 0 0 18px;
                margin: 0 10px 0 0;
                padding: 0;
                border: 2px solid rgba(91, 65, 40, 0.38) !important;
                border-radius: 3px !important;
                background: rgba(255, 252, 246, 0.96) !important;
                box-shadow: none;
                cursor: pointer;
            }

            .sidebar-toggle input[type="checkbox"]::before,
            .filter-checkbox-item input[type="checkbox"]::before,
            #editIsDayOff::before {
                content: "";
                width: 10px;
                height: 10px;
                border-radius: 2px;
                background: var(--clay-700, #6b5a42);
                transform: scale(0);
                transition: transform 0.12s ease-in-out;
            }

            .sidebar-toggle input[type="checkbox"]:checked::before,
            .filter-checkbox-item input[type="checkbox"]:checked::before,
            #editIsDayOff:checked::before {
                transform: scale(1);
            }

            .sidebar-toggle input[type="checkbox"]:focus-visible,
            .filter-checkbox-item input[type="checkbox"]:focus-visible,
            #editIsDayOff:focus-visible {
                outline: 2px solid rgba(216, 169, 79, 0.72);
                outline-offset: 2px;
            }

            .sidebar-toggle .toggle-label,
            .filter-checkbox-item label {
                flex: 1;
                font-size: 13px;
                font-weight: 600;
            }

            .filter-checkbox-item {
                margin-bottom: 6px;
            }

            .week-navigation {
                display: flex;
                justify-content: space-between;
                align-items: center;
            }

            .current-week {
                font-weight: 600;
            }

            .calendar {
                display: grid;
                grid-template-columns: repeat(7, 1fr);
            }

            .day-column {
                display: flex;
                flex-direction: column;
                min-height: 120px;
            }

            .day-header {
                padding: 15px;
                text-align: center;
                font-weight: 600;
            }

            .shifts-container {
                flex: 1;
                display: flex;
                flex-direction: column;
                padding: 10px;
            }

            .shift-card {
                position: relative;
                color: white;
                cursor: grab;
                touch-action: none;
            }

            .shift-card:active {
                cursor: grabbing;
            }

            .shift-delete {
                position: absolute;
                top: 8px;
                right: 8px;
                width: 20px;
                height: 20px;
                color: white;
                border-radius: 50%;
            }

            .add-shift-btn {
                width: 100%;
                padding: 6px;
            }

            .closed-day-message {
                flex: 1;
                display: flex;
                align-items: center;
                justify-content: center;
                min-height: 160px;
                padding: 18px 10px;
                border-radius: 12px;
                background: linear-gradient(135deg, #8fae8b 0%, #6f906b 100%);
                color: white;
                text-align: center;
                font-size: 20px;
                font-weight: 800;
                letter-spacing: 0.12em;
                line-height: 1.45;
            }

            .reopen-day-btn {
                width: 100%;
                margin-top: 8px;
                padding: 6px;
                border: none;
                border-radius: 8px;
                background: #48bb78;
                color: white;
                cursor: pointer;
                font-weight: 700;
            }

            .modal-overlay,
            .modal,
            .loading-overlay {
                display: none;
            }

            .modal-overlay {
                position: fixed;
                inset: 0;
                z-index: 999;
            }

            .modal-overlay.active {
                display: block;
            }

            .modal {
                position: absolute;
                z-index: 1000;
            }

            .modal.active {
                display: block;
            }

            .modal-content {
                width: 500px;
                max-height: 70vh;
                padding: 25px;
                overflow-y: auto;
                -webkit-overflow-scrolling: touch;
            }

            .modal-header {
                margin-bottom: 20px;
            }

            .modal-actions {
                display: flex;
                gap: 10px;
                align-items: center;
                margin-top: 20px;
            }

            .empty-state {
                text-align: center;
                padding: 30px 20px;
                font-size: 13px;
                font-style: italic;
            }

            .loading-overlay {
                position: fixed;
                inset: 0;
                z-index: 10000;
                justify-content: flex-start;
                align-items: center;
                flex-direction: column;
                padding-top: 60px;
            }

            .loading-overlay.active {
                display: flex;
            }

            .loading-content {
                min-width: 300px;
                padding: 40px;
                text-align: center;
            }

            .loading-spinner {
                width: 50px;
                height: 50px;
                border: 5px solid transparent;
                border-radius: 50%;
                animation: spin 1s linear infinite;
                margin: 0 auto 20px;
            }

            @keyframes spin {
                to {
                    transform: rotate(360deg);
                }
            }

            .toast {
                position: fixed;
                top: 20px;
                right: 20px;
                z-index: 9999;
                display: flex;
                align-items: center;
                gap: 12px;
                max-width: 400px;
                padding: 16px 24px;
                opacity: 0;
                transform: translateX(400px);
                transition: all 0.3s ease;
            }

            .toast.show {
                opacity: 1;
                transform: translateX(0);
            }

            .toast-content {
                flex: 1;
            }

            .toast-title {
                font-weight: 600;
                font-size: 14px;
                margin-bottom: 2px;
            }

            .toast-message {
                font-size: 13px;
            }

            .request-tabs,
            .selected-dates-chips {
                display: flex;
            }

            .request-tabs {
                gap: 4px;
                margin-bottom: 12px;
                padding: 4px;
            }

            .request-tab {
                flex: 1;
                padding: 8px 12px;
                font-size: 12px;
            }

            .request-list {
                max-height: 400px;
                overflow-y: auto;
            }

            .request-item {
                padding: 12px;
                margin-bottom: 8px;
            }

            .request-item-time-off {
                background: #fff4f1;
                border-left: 4px solid var(--red);
                color: #5f241f;
            }

            .request-item-availability {
                background: #ecfbf8;
                border-left: 4px solid #319795;
                color: #234e52;
            }

            .request-header {
                justify-content: space-between;
                align-items: start;
                margin-bottom: 8px;
            }

            .request-date {
                font-size: 11px;
            }

            .request-dates {
                display: flex;
                align-items: center;
                gap: 8px;
                flex-wrap: wrap;
                font-size: 14px;
                font-weight: 600;
                margin-bottom: 8px;
            }

            .request-type-pill {
                display: inline-flex;
                align-items: center;
                border-radius: 999px;
                padding: 3px 8px;
                font-size: 11px;
                font-weight: 800;
                text-transform: uppercase;
                letter-spacing: 0.04em;
            }

            .request-item-time-off .request-type-pill {
                background: rgba(207, 84, 72, 0.14);
                color: #8f3028;
            }

            .request-item-availability .request-type-pill {
                background: rgba(49, 151, 149, 0.16);
                color: #235f61;
            }

            .approve-deny-btn {
                position: absolute;
                bottom: 8px;
                padding: 4px 8px;
                font-size: 11px;
            }

            .approve-btn {
                left: 8px;
            }

            .deny-btn {
                right: 32px;
            }

            .date-picker-nav {
                display: flex;
                justify-content: space-between;
                align-items: center;
                margin-bottom: 15px;
            }

            .date-picker-nav button {
                padding: 8px 16px;
            }

            .date-picker-grid {
                display: grid;
                grid-template-columns: repeat(7, 1fr);
                gap: 4px;
                margin-bottom: 15px;
            }

            .date-picker-day-header,
            .date-picker-date {
                display: flex;
                align-items: center;
                justify-content: center;
            }

            .date-picker-day-header {
                padding: 8px;
                font-size: 12px;
                font-weight: 600;
            }

            .date-picker-date {
                aspect-ratio: 1;
                font-size: 14px;
            }

            .date-picker-date:disabled {
                cursor: not-allowed;
                opacity: 0.5;
            }

            .selected-dates-container {
                margin-top: 15px;
                padding: 15px;
                min-height: 60px;
            }

            .selected-dates-label {
                margin-bottom: 10px;
            }

            .selected-dates-chips {
                flex-wrap: wrap;
            }

            .date-chip {
                gap: 8px;
                padding: 6px 12px;
                font-size: 13px;
            }

            .date-chip-remove {
                width: 20px;
                height: 20px;
                justify-content: center;
                background: transparent;
                color: white;
                font-size: 18px;
                line-height: 1;
            }

            @media (max-width: 1024px) {
                .main-content {
                    grid-template-columns: 1fr;
                }
            }

            @media (max-width: 768px) {
                .toolbar,
                .toolbar-group,
                .modal-actions {
                    flex-direction: column;
                }

                .toolbar-group,
                .toolbar-btn,
                .save-status,
                .week-navigation input[type="date"],
                .modal-actions .btn {
                    width: 100%;
                }

                .btn,
                .toolbar-btn,
                .week-navigation input[type="date"] {
                    min-height: 48px;
                }

                .input-group input,
                .input-group select {
                    font-size: 16px;
                }

                .input-group input[type="color"] {
                    width: 100px;
                    height: 100px;
                }

                .rate-fields {
                    grid-template-columns: 1fr;
                }

                .calendar {
                    grid-template-columns: repeat(2, 1fr);
                }

                .day-header {
                    display: none;
                }

                .modal-content {
                    width: 300px;
                    max-height: 60vh;
                }

                .toast {
                    top: 10px;
                    left: 10px;
                    right: 10px;
                    max-width: none;
                    transform: translateY(-100px);
                }

                .toast.show {
                    transform: translateY(0);
                }
            }

            :root {
                --clay-950: #21170f;
                --clay-900: #352619;
                --clay-800: #4c3725;
                --clay-700: #6b4f36;
                --clay-600: #846f52;
                --clay-500: #a1825d;
                --clay-200: #eadfce;
                --clay-100: #f6efe4;
                --cream: #fffaf1;
                --paper: rgba(255, 252, 246, 0.93);
                --ink: #2b2219;
                --muted: #7d6f61;
                --line: rgba(91, 65, 40, 0.14);
                --gold: #d8a94f;
                --green: #3f9a6b;
                --red: #cf5448;
                --blue: #3d7e9f;
                --shadow-soft: 0 18px 50px rgba(58, 39, 21, 0.13);
                --shadow-card: 0 10px 26px rgba(58, 39, 21, 0.1);
                --radius-xl: 28px;
                --radius-lg: 20px;
                --radius-md: 14px;
            }

            body {
                color: var(--ink);
                background:
                    radial-gradient(
                        circle at top left,
                        rgba(216, 169, 79, 0.26),
                        transparent 34rem
                    ),
                    radial-gradient(
                        circle at 92% 18%,
                        rgba(132, 111, 82, 0.24),
                        transparent 28rem
                    ),
                    linear-gradient(
                        135deg,
                        #fff9ed 0%,
                        #f4eadb 42%,
                        #eadfce 100%
                    );
                padding: 26px;
            }

            body::before {
                content: "";
                position: fixed;
                inset: 0;
                pointer-events: none;
                background-image:
                    linear-gradient(
                        rgba(255, 255, 255, 0.32) 1px,
                        transparent 1px
                    ),
                    linear-gradient(
                        90deg,
                        rgba(255, 255, 255, 0.24) 1px,
                        transparent 1px
                    );
                background-size: 38px 38px;
                mask-image: linear-gradient(
                    to bottom,
                    rgba(0, 0, 0, 0.55),
                    transparent 70%
                );
            }

            .container {
                position: relative;
                background: var(--paper);
                border: 1px solid rgba(255, 255, 255, 0.72);
                border-radius: var(--radius-xl);
                box-shadow: var(--shadow-soft);
                overflow: hidden;
                backdrop-filter: blur(16px);
            }

            .header {
                position: relative;
                overflow: hidden;
                background:
                    linear-gradient(
                        135deg,
                        rgba(33, 23, 15, 0.94),
                        rgba(76, 55, 37, 0.92)
                    ),
                    radial-gradient(
                        circle at 22% 20%,
                        rgba(216, 169, 79, 0.52),
                        transparent 22rem
                    );
                padding: 36px 32px 28px;
            }

            .header::before {
                content: "";
                position: absolute;
                inset: auto -8% -80% -8%;
                height: 170px;
                background: radial-gradient(
                    ellipse at center,
                    rgba(255, 250, 241, 0.22),
                    transparent 68%
                );
            }

            .header h1 {
                position: relative;
                font-size: clamp(28px, 4vw, 48px);
                line-height: 1;
                letter-spacing: -0.04em;
                text-shadow: 0 8px 28px rgba(0, 0, 0, 0.28);
            }

            .header p {
                position: relative;
                max-width: 620px;
                margin: 12px auto 0;
                color: rgba(255, 250, 241, 0.76);
                font-size: 15px;
                line-height: 1.5;
            }

            .toolbar {
                background: rgba(53, 38, 25, 0.94);
                border-top: 1px solid rgba(255, 255, 255, 0.08);
                border-bottom: 1px solid rgba(255, 255, 255, 0.1);
                padding: 12px 22px;
                gap: 12px 18px;
            }

            .toolbar-btn,
            .btn,
            .week-navigation button,
            .date-picker-nav button,
            .add-shift-btn,
            .request-tab {
                border-radius: 999px;
                transition:
                    transform 0.18s ease,
                    box-shadow 0.18s ease,
                    background 0.18s ease,
                    border-color 0.18s ease;
            }

            .toolbar-btn-primary {
                background: var(--cream);
                color: var(--clay-900);
                box-shadow: 0 8px 18px rgba(0, 0, 0, 0.12);
            }

            .toolbar-btn-secondary {
                background: rgba(255, 250, 241, 0.12);
                color: #fffaf1;
                border: 1px solid rgba(255, 255, 255, 0.14);
            }

            .toolbar-btn:hover:not(:disabled),
            .btn:hover,
            .week-navigation button:hover,
            .date-picker-nav button:hover,
            .add-shift-btn:hover {
                transform: translateY(-2px);
            }

            .save-status {
                background: rgba(255, 250, 241, 0.12);
                border: 1px solid rgba(255, 255, 255, 0.14);
                border-radius: 999px;
                padding: 7px 12px;
                color: #48bb78;
            }

            .save-status:hover:not(:disabled) {
                background: rgba(255, 250, 241, 0.18);
            }

            .toolbar-left {
                flex-wrap: wrap;
                gap: 8px 12px;
                min-width: 0;
            }

            .toolbar-right {
                gap: 10px;
                margin-left: auto;
                position: relative;
            }

            .toolbar-actions,
            .toolbar-status {
                gap: 8px;
            }

            .maintenance-status {
                color: rgba(255, 250, 241, 0.64);
                font-size: 11px;
                font-weight: 600;
                letter-spacing: 0;
                line-height: 1.35;
                max-width: min(62vw, 680px);
                overflow: hidden;
                text-overflow: ellipsis;
                white-space: nowrap;
            }

            .tools-menu-wrap {
                position: relative;
            }

            .tools-menu {
                position: absolute;
                top: calc(100% + 8px);
                right: 0;
                z-index: 30;
                display: none;
                min-width: 190px;
                padding: 6px;
                background: rgba(255, 252, 246, 0.98);
                border: 1px solid rgba(68, 51, 34, 0.14);
                border-radius: var(--radius-md);
                box-shadow: var(--shadow-modal);
            }

            .tools-menu.open {
                display: grid;
                gap: 4px;
            }

            .tools-menu-item {
                width: 100%;
                display: flex;
                align-items: center;
                gap: 10px;
                padding: 10px 12px;
                background: transparent;
                border: none;
                border-radius: 8px;
                color: var(--clay-900);
                cursor: pointer;
                font: inherit;
                font-size: 14px;
                font-weight: 700;
                text-align: left;
            }

            .tools-menu-item:hover {
                background: rgba(127, 108, 80, 0.12);
            }

            .tools-menu-item svg {
                width: 18px;
                height: 18px;
                flex: 0 0 18px;
            }

            .main-content {
                background: rgba(255, 250, 241, 0.34);
            }

            .sidebar {
                background: linear-gradient(
                    180deg,
                    rgba(255, 250, 241, 0.78),
                    rgba(246, 239, 228, 0.86)
                );
                border-right: 1px solid var(--line);
                padding: 22px;
            }

            .section {
                margin-bottom: 18px;
            }

            .drawer-header,
            .sidebar-toggle {
                border: 1px solid rgba(255, 255, 255, 0.65);
                box-shadow: var(--shadow-card);
            }

            .drawer-header {
                background: linear-gradient(
                    135deg,
                    var(--clay-800),
                    var(--clay-600)
                );
                padding: 14px 16px;
                border-radius: var(--radius-md);
            }

            .drawer-header:hover {
                background: linear-gradient(
                    135deg,
                    var(--clay-900),
                    var(--clay-700)
                );
            }

            .drawer-content.open {

        <script>
            const APP_VERSION = "v2.3";
            console.log(`Schedule Edit App Version: ${APP_VERSION}`);

            function isEmbeddedInWix() {
                return window.parent !== window;
            }

            const IS_MOCK_MODE = !isEmbeddedInWix();

            // Loading overlay functions
            function showLoading(message, details = "") {
                const overlay = document.getElementById("loadingOverlay");
                const messageEl = document.getElementById("loadingMessage");
                const detailsEl = document.getElementById("loadingDetails");

                messageEl.textContent = message;
                detailsEl.textContent = details;
                overlay.classList.add("active");
            }

            function hideLoading() {
                const overlay = document.getElementById("loadingOverlay");
                overlay.classList.remove("active");
            }

            function updateLoadingDetails(details) {
                const detailsEl = document.getElementById("loadingDetails");
                detailsEl.textContent = details;
            }

            function updateMaintenanceStatus(cleanup, backendVersion) {
                const statusEl = document.getElementById("maintenanceStatus");
                if (!statusEl) return;

                if (backendVersion) {
                    backendAppVersion = backendVersion;
                }

                const deletedCount = cleanup ? cleanup.deletedCount || 0 : 0;
                const cleanupText = cleanup
                    ? `Last cleanup: ${deletedCount} old shift${deletedCount === 1 ? "" : "s"}`
                    : "Cleanup ready";
                const modeText = IS_MOCK_MODE ? "Mock mode" : "";
                const hasVersionMismatch =
                    backendAppVersion && backendAppVersion !== APP_VERSION;
                const versionText = hasVersionMismatch
                    ? `Version mismatch: HTML ${APP_VERSION} / Velo ${backendAppVersion}`
                    : APP_VERSION;

                statusEl.textContent = [versionText, modeText, cleanupText]
                    .filter(Boolean)
                    .join(" | ");
                statusEl.title = hasVersionMismatch
                    ? `HTML ${APP_VERSION} / Velo ${backendAppVersion}`
                    : statusEl.textContent;
            }

            function setToolsMenuOpen(isOpen) {
                const menu = document.getElementById("toolsMenu");
                const button = document.getElementById("toolsMenuButton");
                if (!menu || !button) return;

                menu.classList.toggle("open", isOpen);
                button.setAttribute("aria-expanded", String(isOpen));
            }

            function toggleToolsMenu(event) {
                event.stopPropagation();
                const menu = document.getElementById("toolsMenu");
                setToolsMenuOpen(!menu?.classList.contains("open"));
            }

            function closeToolsMenu() {
                setToolsMenuOpen(false);
            }

            function runToolAction(action) {
                closeToolsMenu();
                action();
            }

            // Toast notification system
            function showToast(title, message, type = "success") {
                // Remove any existing toasts
                const existingToasts = document.querySelectorAll(".toast");
                existingToasts.forEach((toast) => toast.remove());

                // Create new toast
                const toast = document.createElement("div");
                toast.className = `toast ${type}`;

                const icon =
                    type === "success" ? "✅" : type === "error" ? "❌" : "ℹ️";

                toast.innerHTML = `
                <div class="toast-icon">${icon}</div>
                <div class="toast-content">
                    <div class="toast-title">${title}</div>
                    ${message ? `<div class="toast-message">${message}</div>` : ""}
                </div>
            `;

                document.body.appendChild(toast);

                // Trigger animation
                setTimeout(() => toast.classList.add("show"), 10);

                // Auto-dismiss after 3 seconds
                setTimeout(() => {
                    toast.classList.remove("show");
                    setTimeout(() => toast.remove(), 300);
                }, 3000);
            }

            function applyQuickShift(startTime, endTime) {
                const startInput = document.getElementById("shiftStart");
                const endInput = document.getElementById("shiftEnd");
                if (startInput) startInput.value = startTime;
                if (endInput) endInput.value = endTime;
            }

            let employees = [];
            let shifts = [];
            let availability = [];
            let closedDays = [];
            let currentStartDate = new Date();
            let currentEndDate = new Date();
            let selectedDay = null;
            let editingShiftId = null;
            let draggedShiftId = null;
            let editingEmployeeId = null;
            let tempRates = [];
            let selectedEmployees = new Set(); // Track which employees are selected for filtering
            let undoStack = [];
            let maxUndoSteps = 20;
            let showDayOffs = true; // Track whether to show days off
            let showAvailability = true;
            const TIME_OFF_PERIOD_LABELS = {
                "full-day": "Full Day",
                morning: "Morning",
                evening: "Evening",
            };

            // Multi-date picker for Add Shift modal
            let selectedShiftDates = [];
            let shiftPickerMonth = new Date();
            let selectedAddItemType = "shift";
            let selectedAddDayOffPeriod = "full-day";

            // Initialize to today and 35 days from today
            currentStartDate.setHours(0, 0, 0, 0);
            currentEndDate.setHours(0, 0, 0, 0);
            currentEndDate.setDate(currentEndDate.getDate() + 34); // 35 days total (0-34)

            // Auto-save system with debouncing
            let autoSaveTimeout = null;
            let isSaving = false;
            let backendAppVersion = null;
            const AUTO_SAVE_DELAY = 1500; // Wait 1.5 seconds after last change before saving

            function formatMockDate(offsetDays) {
                const date = new Date();
                date.setHours(0, 0, 0, 0);
                date.setDate(date.getDate() + offsetDays);
                return formatDate(date);
            }

            function createMockScheduleData({ includeRates = false } = {}) {
                const names = [
                    ["Avery Lane", "#7F6C50"],
                    ["Jordan Price", "#2F855A"],
                    ["Mia Chen", "#2B6CB0"],
                    ["Sam Rivera", "#B7791F"],
                    ["Taylor Brooks", "#9F7AEA"],
                    ["Nora Patel", "#C05621"],
                    ["Eli Morgan", "#319795"],
                    ["Grace Kim", "#D53F8C"],
                    ["Leo Bennett", "#4A5568"],
                ];
                const employees = names.map(([name, color], index) => ({
                    id: 1000 + index,
                    wixId: null,
                    name,
                    archived: false,
                    color,
                    displayOrder: index,
                    rates: includeRates
                        ? [
                              {
                                  wixId: null,
                                  rate: 15 + index * 0.5,
                                  startDate: null,
                                  endDate: null,
                              },
                          ]
                        : [],
                }));
                const employeeName = (id) =>
                    employees.find((employee) => employee.id === id)?.name || "";

                return {
                    employees,
                    closedDays: [formatMockDate(10)],
                    shifts: [
                        [1000, 1, "09:00", "15:00"],
                        [1001, 1, "12:00", "18:00"],
                        [1002, 2, "10:00", "16:00"],
                        [1003, 2, "13:00", "19:00"],
                        [1004, 3, "09:30", "14:30"],
                        [1005, 4, "11:00", "17:00"],
                        [1006, 5, "09:00", "13:00"],
                        [1007, 6, "14:00", "20:00"],
                        [1008, 7, "10:00", "18:00"],
                    ].map(([employeeId, offset, startTime, endTime], index) => ({
                        id: 2000 + index,
                        wixId: null,
                        employeeId,
                        employeeName: employeeName(employeeId),
                        date: formatMockDate(offset),
                        startTime,
                        endTime,
                        isDayOff: false,
                        isTimeOffRequest: false,
                        requestStatus: null,
                        requestDate: null,
                        requestedBy: null,
                    })).concat([
                        {
                            id: 2100,
                            wixId: null,
                            employeeId: 1002,
                            employeeName: employeeName(1002),
                            date: formatMockDate(8),
                            startTime: "00:00",
                            endTime: "00:00",
                            isDayOff: true,
                            isTimeOffRequest: false,
                            requestStatus: null,
                            requestDate: null,
                            requestedBy: null,
                        },
                        {
                            id: 2101,
                            wixId: null,
                            employeeId: 1005,
                            employeeName: employeeName(1005),
                            date: formatMockDate(12),
                            startTime: null,
                            endTime: null,
                            isDayOff: false,
                            isTimeOffRequest: true,
                            requestStatus: "pending",
                            requestDate: new Date().toISOString(),
                            requestedBy: employeeName(1005),
                            timeOffPeriod: "morning",
                        },
                        {
                            id: 2102,
                            wixId: null,
                            employeeId: 1007,
                            employeeName: employeeName(1007),
                            date: formatMockDate(14),
                            startTime: "00:00",
                            endTime: "00:00",
                            isDayOff: true,
                            isTimeOffRequest: false,
                            requestStatus: "approved",
                            requestDate: new Date().toISOString(),
                            requestedBy: employeeName(1007),
                            timeOffPeriod: "evening",
                        },
                    ]),
                    availability: [
                        {
                            id: 3000,
                            wixId: null,
                            employeeId: 1000,
                            employeeName: employeeName(1000),
                            date: formatMockDate(2),
                            availabilityPeriod: "full-day",
                            requestStatus: "approved",
                            requestDate: new Date().toISOString(),
                            requestedBy: employeeName(1000),
                        },
                        {
                            id: 3001,
                            wixId: null,
                            employeeId: 1004,
                            employeeName: employeeName(1004),
                            date: formatMockDate(6),
                            availabilityPeriod: "evening",
                            requestStatus: "pending",
                            requestDate: new Date().toISOString(),
                            requestedBy: employeeName(1004),
                        },
                    ],
                };
            }

            function autoSave() {
                // Clear any pending auto-save
                if (autoSaveTimeout) {
                    clearTimeout(autoSaveTimeout);
                }

                // Update status to show pending save
                updateSaveStatus("pending");

                // Debounce: wait for user to stop making changes
                autoSaveTimeout = setTimeout(() => {
                    performAutoSave();
                }, AUTO_SAVE_DELAY);
            }

            function updateEmployeeDisplayOrder() {
                employees.forEach((employee, index) => {
                    employee.displayOrder = index;
                });
            }

            function performAutoSave() {
                if (IS_MOCK_MODE) {
                    updateSaveStatus("saved");
                    updateMaintenanceStatus();
                    return;
                }

                if (isSaving) {
                    // If already saving, queue another save
                    autoSaveTimeout = setTimeout(() => performAutoSave(), 500);
                    return;
                }

                isSaving = true;
                updateSaveStatus("saving");
                updateEmployeeDisplayOrder();

                const data = {
                    employees: employees,
                    shifts: shifts,
                    closedDays: closedDays,
                };

                // Send to Wix parent page
                window.parent.postMessage(
                    {
                        action: "SYNC_TO_DATABASE",
                        data: data,
                    },
                    "*",
                );
            }

            function saveImmediately() {
                if (autoSaveTimeout) {
                    clearTimeout(autoSaveTimeout);
                    autoSaveTimeout = null;
                }
                performAutoSave();
            }

            function updateSaveStatus(status) {
                const statusEl = document.getElementById("saveStatus");
                if (!statusEl) return;

                const dotEl = statusEl.querySelector(".save-dot");
                const labelEl = statusEl.querySelector(".save-label");
                const states = {
                    pending: {
                        color: "#A0AEC0",
                        label: "Unsaved",
                        title: "Save unsaved changes",
                        disabled: false,
                    },
                    saving: {
                        color: "#ECC94B",
                        label: "Saving...",
                        title: "Saving changes",
                        disabled: true,
                    },
                    saved: {
                        color: "#48BB78",
                        label: "Saved",
                        title: "Save now",
                        disabled: false,
                    },
                    error: {
                        color: "#F56565",
                        label: "Save failed",
                        title: "Retry save",
                        disabled: false,
                    },
                };
                const currentState = states[status];
                if (!currentState) return;

                if (dotEl && labelEl) {
                    dotEl.style.color = currentState.color;
                    labelEl.textContent = currentState.label;
                    statusEl.style.color = currentState.color;
                    statusEl.title = currentState.title;
                    statusEl.disabled = currentState.disabled;
                    return;
                }

                switch (status) {
                    case "pending":
                        statusEl.innerHTML =
                            '<span style="color: #718096;">●</span> Unsaved changes';
                        statusEl.style.color = "#718096";
                        break;
                    case "saving":
                        statusEl.innerHTML =
                            '<span style="color: #ECC94B;">●</span> Saving...';
                        statusEl.style.color = "#ECC94B";
                        break;
                    case "saved":
                        statusEl.innerHTML =
                            '<span style="color: #48BB78;">●</span> Saved';
                        statusEl.style.color = "#48BB78";
                        break;
                    case "error":
                        statusEl.innerHTML =
                            '<span style="color: #F56565;">●</span> Save failed';
                        statusEl.style.color = "#F56565";
                        break;
                }
            }

            // Undo system
            function saveState() {
                const state = {
                    employees: JSON.parse(JSON.stringify(employees)),
                    shifts: JSON.parse(JSON.stringify(shifts)),
                    closedDays: JSON.parse(JSON.stringify(closedDays)),
                };
                undoStack.push(state);
                if (undoStack.length > maxUndoSteps) {
                    undoStack.shift(); // Remove oldest state
                }
                updateUndoButton();
            }

            function undo() {
                if (undoStack.length === 0) return;

                const previousState = undoStack.pop();
                employees = previousState.employees;
                shifts = previousState.shifts;
                closedDays = normalizeClosedDays(previousState.closedDays || []);

                // Rebuild selectedEmployees set
                selectedEmployees.clear();
                employees.forEach((emp) => selectedEmployees.add(emp.id));

                renderEmployees();
                updateEmployeeSelect();
                renderEmployeeFilter();
                renderCalendar();
                updateUndoButton();

                // Trigger auto-save after undo
                autoSave();
            }

            function updateUndoButton() {
                const btn = document.getElementById("undoButton");
                if (btn) {
                    btn.disabled = undoStack.length === 0;
                    btn.style.opacity = undoStack.length === 0 ? "0.5" : "1";
                    btn.style.cursor =
                        undoStack.length === 0 ? "not-allowed" : "pointer";
                }
            }

            // LocalStorage functions
            // Wix Integration - Message passing functions
            function sendToWix(action, data) {
                if (IS_MOCK_MODE) return;

                window.parent.postMessage(
                    {
                        action: action,
                        data: data,
                    },
                    "*",
                );
            }

            function deleteShiftFromWix(shift) {
                if (!shift || !shift.wixId) return;

                sendToWix("DELETE_SHIFT", {
                    wixId: shift.wixId,
                });
            }

            function deleteShiftsForDatesFromWix(dates) {
                if (!dates || dates.length === 0) return;

                sendToWix("DELETE_SHIFTS_FOR_DATES", {
                    dates: dates,
                });
            }

            function deleteTimeOffRequestsFromWix(shiftsToDelete) {
                const wixIds = (shiftsToDelete || [])
                    .map((shift) => shift.wixId)
                    .filter(Boolean);

                if (wixIds.length === 0) return;

                sendToWix("DELETE_TIME_OFF_REQUESTS", {
                    wixIds: wixIds,
                });
            }

            function approveAvailabilityRequestInWix(item) {
                if (!item || !item.wixId) return;

                sendToWix("APPROVE_AVAILABILITY_REQUEST", {
                    wixId: item.wixId,
                });
            }

            function denyAvailabilityRequestInWix(item) {
                if (!item || !item.wixId) return;

                sendToWix("DENY_AVAILABILITY_REQUEST", {
                    wixId: item.wixId,
                });
            }

            function deleteEmployeeFromWix(employee) {
                if (!employee || !employee.wixId) return;

                sendToWix("DELETE_EMPLOYEE", {
                    wixId: employee.wixId,
                });
            }

            function normalizeClosedDays(days) {
                return [
                    ...new Set(
                        (days || [])
                            .map((day) => {
                                if (!day) return null;
                                if (day instanceof Date) return formatDate(day);
                                const value = String(day);
                                return value.includes("T")
                                    ? value.split("T")[0]
                                    : value;
                            })
                            .filter(Boolean),
                    ),
                ].sort();
            }

            function isClosedDate(dateStr) {
                return closedDays.includes(dateStr);
            }

            function reopenBusinessDay(dateStr) {
                if (!isClosedDate(dateStr)) return;

                saveState();
                closedDays = closedDays.filter((day) => day !== dateStr);
                saveData();
                renderCalendar();
                showToast("Business Day Reopened", dateStr, "success");
            }

            function saveData() {
                autoSave();
            }

            function getRateClientKey(employeeId, rate) {
                return [
                    employeeId,
                    rate?.rate ?? "",
                    rate?.startDate ?? "",
                    rate?.endDate ?? "",
                ]
                    .map((value) => String(value).trim())
                    .join("|");
            }

            function applySyncResult(syncResult) {
                if (!syncResult) return;

                const employeeIds = syncResult.employees || {};
                employees.forEach((employee) => {
                    const wixId = employeeIds[employee.id];
                    if (wixId) {
                        employee.wixId = wixId;
                    }
                });

                const rateIds = syncResult.rates || {};
                employees.forEach((employee) => {
                    (employee.rates || []).forEach((rate) => {
                        const wixId = rateIds[getRateClientKey(employee.id, rate)];
                        if (wixId) {
                            rate.wixId = wixId;
                        }
                    });
                });

                const shiftIds = syncResult.shifts || {};
                shifts.forEach((shift) => {
                    const wixId = shiftIds[shift.id];
                    if (wixId) {
                        shift.wixId = wixId;
                    }
                });
            }

            function applyLoadedScheduleData(data, { showLoadedToast = false } = {}) {
                employees = data.employees || [];
                shifts = (data.shifts || []).map((shift) => ({
                    ...shift,
                    timeOffPeriod: normalizeTimeOffPeriod(shift.timeOffPeriod),
                }));
                availability = (data.availability || []).map((item) => ({
                    ...item,
                    availabilityPeriod: normalizeTimeOffPeriod(
                        item.availabilityPeriod,
                    ),
                    requestStatus: item.requestStatus || "approved",
                }));
                closedDays = normalizeClosedDays(data.closedDays || []);

                employees.forEach((emp) => {
                    if (!emp.color) {
                        emp.color = "#7F6C50";
                    }
                });

                selectedEmployees = new Set(employees.map((e) => e.id));

                renderEmployees();
                updateEmployeeSelect();
                renderEmployeeFilter();
                renderCalendar();
                renderTimeOffDrawer();

                if (showLoadedToast) {
                    showToast(
                        IS_MOCK_MODE ? "Loaded Mock Schedule" : "Loaded from Database",
                        `${employees.length} employees, ${shifts.length} shifts`,
                        "success",
                    );
                }
            }

            function loadMockData() {
                const mockData = createMockScheduleData({ includeRates: true });
                applyLoadedScheduleData(mockData);
                updateSaveStatus("saved");
                updateMaintenanceStatus();
                hideLoading();
            }

            // Floating modal positioning
            let lastClickEvent = null;
            let shiftModalHome = null;
            let shiftModalNextSibling = null;

            document.addEventListener(
                "click",
                function (e) {
                    lastClickEvent = e;
                },
                true,
            );

            function isMobileLayout() {
                return window.innerWidth <= 768;
            }

            function rememberShiftModalHome(modal) {
                if (shiftModalHome) return;
                shiftModalHome = modal.parentNode;
                shiftModalNextSibling = modal.nextSibling;
            }

            function setShiftModalTitle() {
                const title = document.querySelector("#shiftModal .modal-header h2");
                if (!title) return;

                title.textContent = {
                    shift: "Add Shift",
                    "day-off": "Add Day Off",
                    closed: "Add Closed Day",
                }[selectedAddItemType] || "Add Shift";
            }

            function openMobileShiftPanel(dateStr) {
                const modal = document.getElementById("shiftModal");
                const mount = document.getElementById("mobileShiftPanel");
                const overlay = document.getElementById("modalOverlay");

                if (!modal || !mount) return false;

                rememberShiftModalHome(modal);
                overlay.classList.remove("active");
                mount.hidden = false;
                mount.appendChild(modal);

                setShiftModalTitle();
                modal.classList.add("mobile-inline-modal", "active");

            function restoreMobileShiftModal() {
                const modal = document.getElementById("shiftModal");
                const mount = document.getElementById("mobileShiftPanel");

                if (!modal) return;

                modal.classList.remove("mobile-inline-modal");
                setShiftModalTitle();

                if (shiftModalHome && modal.parentNode !== shiftModalHome) {

            function openFloatingModal(modalId) {
                const modal = document.getElementById(modalId);
                const overlay = document.getElementById("modalOverlay");

                if (!modal || !lastClickEvent) return;

                // Show overlay
                overlay.classList.add("active");

                const content = modal.querySelector(".modal-content");
                if (content) content.scrollTop = 0;

                if (isMobileLayout()) {
                    modal.style.left = "";
                    modal.style.right = "";
                    modal.style.top = "";
                    modal.style.bottom = "";
                    modal.style.width = "";
                    modal.style.transform = "";
                    modal.classList.add("active");
                    return;
                }

                modal.style.right = "auto";

                // Get click position
                const clickX = lastClickEvent.pageX;
                const clickY = lastClickEvent.pageY;

                // Get viewport dimensions
                const viewportWidth = window.innerWidth;
                const modalWidth = 500; // Match CSS .modal-content width

                // Calculate horizontal position - try to center on click, but keep in bounds
                let left = clickX - modalWidth / 2;
                left = Math.max(
                    10,
                    Math.min(left, viewportWidth - modalWidth - 10),
                );

                // Position vertically above the click point
                let top = clickY - 150;

                // Apply position
                modal.style.left = left + "px";
                modal.style.top = top + "px";

                // Show modal
                modal.classList.add("active");
            }

            function handleWixMessage(message) {
                switch (message.action) {
                    case "LOAD_DATA":
                        employees = message.employees || [];
                        shifts = message.shifts || [];
                        closedDays = normalizeClosedDays(message.closedDays || []);
                        selectedEmployees = new Set(employees.map((e) => e.id));
                        renderEmployees();
                        updateEmployeeSelect();
                        renderEmployeeFilter();

                        break;

                    case "ERROR":
                        console.error("Wix error:", message.message);

            function exportData() {
                const data = {
                    employees: employees,
                    shifts: shifts,
                    closedDays: closedDays,
                    exportDate: new Date().toISOString(),
                };
                const dataStr = JSON.stringify(data, null, 2);
                const dataBlob = new Blob([dataStr], {
                    type: "application/json",
                });

                // Get current date and time in EST
                const now = new Date();
                const estTime = new Date(
                    now.toLocaleString("en-US", {
                        timeZone: "America/New_York",
                    }),
                );

                const year = estTime.getFullYear();
                const month = String(estTime.getMonth() + 1).padStart(2, "0");
                const day = String(estTime.getDate()).padStart(2, "0");
                const hours = String(estTime.getHours()).padStart(2, "0");
                const minutes = String(estTime.getMinutes()).padStart(2, "0");
                const seconds = String(estTime.getSeconds()).padStart(2, "0");

                const timestamp = `${hours}${minutes}${seconds}`;
                const filename = `schedule-backup-${year}-${month}-${day}-${timestamp}.json`;

                const url = URL.createObjectURL(dataBlob);
                const link = document.createElement("a");
                link.href = url;
                link.download = filename;
                link.click();
                URL.revokeObjectURL(url);

                showToast(
                    "Exported Successfully",
                    `${employees.length} employees, ${shifts.length} shifts`,
                    "success",
                );
            }

            function importData() {
                const input = document.createElement("input");
                input.type = "file";
                input.accept = "application/json";
                input.onchange = (e) => {
                    const file = e.target.files[0];
                    if (file) {
                        showLoading(
                            "Importing Data...",
                            `Reading ${file.name}...`,
                        );

                        const reader = new FileReader();
                        reader.onload = (event) => {
                            try {
                                const data = JSON.parse(event.target.result);
                                if (
                                    confirm(
                                        "This will replace all current data. Continue?",
                                    )
                                ) {
                                    updateLoadingDetails(
                                        "Processing employees...",
                                    );

                                    employees = data.employees || [];
                                    shifts = data.shifts || [];
                                    closedDays = normalizeClosedDays(
                                        data.closedDays || [],
                                    );

                                    // Ensure all employees have required fields
                                    employees.forEach((emp) => {
                                        if (emp.archived === undefined) {
                                            emp.archived = false;
                                        }
                                        if (!emp.rates) {
                                            emp.rates = [];
                                        }
                                        if (!emp.color) {
                                            emp.color = "#7F6C50";
                                        }
                                    });

                                    updateLoadingDetails(
                                        "Validating shifts...",
                                    );

                                    // Validate shifts - make sure all shifts reference valid employees
                                    const validEmployeeIds = new Set(
                                        employees.map((e) => e.id),
                                    );
                                    const invalidShifts = shifts.filter(
                                        (s) =>
                                            !validEmployeeIds.has(s.employeeId),
                                    );

                                    if (invalidShifts.length > 0) {
                                        console.warn(
                                            `Found ${invalidShifts.length} shifts with invalid employee references`,
                                        );
                                        shifts = shifts.filter((s) =>
                                            validEmployeeIds.has(s.employeeId),
                                        );
                                    }

                                    shifts = shifts.filter(
                                        (s) => !isClosedDate(s.date),
                                    );

                                    // Ensure all shifts have required fields
                                    shifts.forEach((shift) => {
                                        const employee = employees.find(
                                            (e) => e.id === shift.employeeId,
                                        );
                                        if (employee) {
                                            shift.employeeName = employee.name;
                                        }
                                        // Ensure isDayOff field exists
                                        if (shift.isDayOff === undefined) {
                                            shift.isDayOff = false;
                                        }
                                    });

                                    selectedEmployees = new Set(
                                        employees.map((e) => e.id),
                                    );

                                    updateLoadingDetails("Saving data...");

                                    // Save to localStorage
                                    saveData();

                                    updateLoadingDetails(
                                        "Rendering calendar...",
                                    );

                                    // Small delay to ensure DOM is ready
                                    setTimeout(() => {
                                        try {
                                            renderEmployees();
                                            updateEmployeeSelect();
                                            renderEmployeeFilter();
                                            renderCalendar();
                                            renderTimeOffDrawer();

                                            hideLoading();

                                            if (invalidShifts.length > 0) {
                                                showToast(
                                                    "Data Imported",
                                                    `${employees.length} employees, ${shifts.length} shifts (${invalidShifts.length} invalid shifts skipped)`,
                                                    "info",
                                                );
                                            } else {
                                                showToast(
                                                    "Data Imported Successfully",
                                                    `${employees.length} employees, ${shifts.length} shifts`,
                                                    "success",
                                                );
                                            }
                                        } catch (renderError) {
                                            console.error(
                                                "Render error:",
                                                renderError,
                                            );
                                            hideLoading();
                                            showToast(
                                                "Import Error",
                                                "Data imported but there was an error displaying it",
                                                "error",
                                            );
                                        }
                                    }, 100);
                                } else {
                                    hideLoading();
                                }
                            } catch (error) {
                                console.error("Import error:", error);
                                hideLoading();
                                showToast(
                                    "Import Failed",
                                    error.message,
                                    "error",
                                );
                            }
                        };
                        reader.readAsText(file);
                    }
                };
                input.click();
            }
