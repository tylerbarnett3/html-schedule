            function saveShift() {
                const isDayOff = selectedAddItemType === "day-off";
                const isClosedForBusiness = selectedAddItemType === "closed";
                const timeOffPeriod = normalizeTimeOffPeriod(
                    selectedAddDayOffPeriod,
                );
                const selectedEmployeeCheckboxes = document.querySelectorAll(
                    ".shift-employee-checkbox:checked",
                );
                const selectedEmployeeIds = Array.from(
                    selectedEmployeeCheckboxes,
                ).map((cb) => parseInt(cb.value));

                if (selectedShiftDates.length === 0) {
                    alert("Please select at least one date");
                    return;
                }

                if (isClosedForBusiness) {
                    const datesToClose = normalizeClosedDays(selectedShiftDates);

                    saveState();
                    closedDays = normalizeClosedDays([
                        ...closedDays,
                        ...datesToClose,
                    ]);
                    shifts = shifts.filter((shift) => !datesToClose.includes(shift.date));
                    deleteShiftsForDatesFromWix(datesToClose);

                    closeShiftModal();
                    saveData();
                    renderCalendar();
                    renderEmployees();
                    renderTimeOffDrawer();
                    showToast(
                        "Closed for Business",
                        `${datesToClose.length} day${datesToClose.length === 1 ? "" : "s"} marked closed`,
                        "success",
                    );
                    return;
                }

                if (selectedEmployeeIds.length === 0) {
                    alert("Please select at least one employee");
                    return;
                }

                const selectedClosedDates = selectedShiftDates.filter((dateStr) =>
                    isClosedDate(dateStr),
                );
                if (selectedClosedDates.length > 0) {
                    alert("Reopen closed business days before adding shifts.");
                    return;
                }

                let startTime, endTime;

                if (!isDayOff) {
                    startTime = document.getElementById("shiftStart").value;
                    endTime = document.getElementById("shiftEnd").value;

                    if (!startTime || !endTime) {
                        alert("Please fill in start and end times");
                        return;
                    }
                } else {
                    // Day off uses special placeholder times
                    startTime = "00:00";
                    endTime = "00:00";
                }

                if (!isDayOff) {
                    const conflicts = getShiftSubmissionConflicts({
                        employeeIds: selectedEmployeeIds,
                        dates: selectedShiftDates,
                        startTime,
                        endTime,
                    });

                    if (conflicts.length > 0) {
                        alert(buildShiftConflictMessage(conflicts));
                        return;
                    }
                }

                const duplicateDayOffConflicts = isDayOff
                    ? getDuplicateDayOffConflicts(
                          selectedEmployeeIds,
                          selectedShiftDates,
                          timeOffPeriod,
                      )
                    : [];
                if (duplicateDayOffConflicts.length > 0) {
                    alert(
                        buildDuplicateDayOffMessage(
                            duplicateDayOffConflicts,
                            timeOffPeriod,
                        ),
                    );
                    return;
                }

                const dayOffConflicts = isDayOff
                    ? getDayOffConflicts(
                          selectedEmployeeIds,
                          selectedShiftDates,
                          timeOffPeriod,
                      )
                    : [];
                if (
                    dayOffConflicts.length > 0 &&
                    !confirm(buildDayOffConflictMessage(dayOffConflicts))
                ) {
                    return;
                }

                saveState(); // Save state before adding shifts

                const removedConflictCount =
                    dayOffConflicts.length > 0
                        ? deleteConflictingShifts(dayOffConflicts)
                        : 0;

                // Create a shift for each selected employee on each selected date
                selectedShiftDates.forEach((dateStr) => {
                    selectedEmployeeIds.forEach((employeeId) => {
                        const employee = employees.find(
                            (e) => e.id === employeeId,
                        );

                        shifts.push({
                            id: Date.now() + Math.random(), // Ensure unique IDs
                            wixId: null,
                            employeeId: employeeId,
                            employeeName: employee.name,
                            date: dateStr,
                            startTime: startTime,
                            endTime: endTime,
                            isDayOff: isDayOff,
                            timeOffPeriod: isDayOff ? timeOffPeriod : "full-day",
                        });
                    });
                });

                closeShiftModal();
                saveData();
                renderCalendar();
                renderEmployees();
                if (removedConflictCount > 0) {
                    showToast(
                        "Day Off Added",
                        `${removedConflictCount} conflicting shift${removedConflictCount === 1 ? "" : "s"} removed`,
                        "success",
                    );
                }
            }

            function deleteShift(id) {
                const shiftToDelete = shifts.find((s) => s.id === id);
                saveState(); // Save state before deletion
                shifts = shifts.filter((s) => s.id !== id);
                deleteShiftFromWix(shiftToDelete);
                saveData();
                renderCalendar();
                renderEmployees(); // Refresh employee list to update hours
                renderTimeOffDrawer();
                saveImmediately();
            }

            function formatTime12Hour(time24) {
                if (!time24) return "—";
                const [hours, minutes] = time24.split(":");
                const hour = parseInt(hours);
                const ampm = hour >= 12 ? "PM" : "AM";
                const hour12 = hour % 12 || 12;
                return `${hour12}:${minutes} ${ampm}`;
            }

            function renderCalendar() {
                const calendar = document.getElementById("calendar");
                if (!calendar) return; // Element doesn't exist yet, skip
                const dayNames = [
                    "Sun",
                    "Mon",
                    "Tue",
                    "Wed",
                    "Thu",
                    "Fri",
                    "Sat",
                ];
                const dayNamesFull = [
                    "Sunday",
                    "Monday",
                    "Tuesday",
                    "Wednesday",
                    "Thursday",
                    "Friday",
                    "Saturday",
                ];

                const dayCount = getDayCount();
                updateDateInputs();

                const currentWeekEl = document.getElementById("currentWeek");
                if (currentWeekEl) {
                    const startLabel = currentStartDate.toLocaleDateString(
                        "en-US",
                        { month: "short", day: "numeric" },
                    );
                    const endLabel = currentEndDate.toLocaleDateString(
                        "en-US",
                        { month: "short", day: "numeric" },
                    );
                    currentWeekEl.innerHTML = `${startLabel} - ${endLabel}<br>(${dayCount} days)`;
                }

                let calendarHTML = "";

                // Calculate how many cells we need (round up to nearest week)
                const totalCells = Math.ceil(dayCount / 7) * 7;

                // Add day headers based on the actual start date
                const startDayOfWeek = currentStartDate.getDay(); // 0 = Sunday, 1 = Monday, etc.
                for (let i = 0; i < 7; i++) {
                    const dayIndex = (startDayOfWeek + i) % 7;
                    calendarHTML += `
                    <div class="day-header" style="min-height: auto; padding: 10px; font-weight: 700;">
                        ${dayNames[dayIndex]}
                    </div>
                `;
                }

                const isMobile = window.innerWidth <= 768;

                // Add date cells
                for (let i = 0; i < totalCells; i++) {
                    if (i < dayCount) {
                        const date = new Date(currentStartDate);
                        date.setDate(date.getDate() + i);
                        const dateStr = formatDate(date);

                        let dateDisplay;
                        if (isMobile) {
                            const dayName = dayNamesFull[date.getDay()];
                            const monthName = date.toLocaleDateString("en-US", {
                                month: "short",
                            });
                            dateDisplay = `${dayName}, ${monthName} ${date.getDate()}`;
                        } else {
                            dateDisplay = `${date.getDate()} ${date.toLocaleDateString("en-US", { month: "short" })}`;
                        }

                        const dayIsClosed = isClosedDate(dateStr);

                        // Filter shifts by date AND selected employees AND day off preference
                        const dayShifts = shifts
                            .filter((s) => {
                                if (dayIsClosed) return false;
                                if (s.date !== dateStr) return false;

                                // FILTER OUT DENIED REQUESTS - don't show on calendar
                                if (s.requestStatus === "denied") return false;

                                if (
                                    !showDayOffs &&
                                    s.isDayOff &&
                                    !s.isTimeOffRequest
                                )
                                    return false;
                                if (
                                    !showDayOffs &&
                                    s.isTimeOffRequest &&
                                    s.requestStatus === "pending"
                                )
                                    return false;

                                // If no employees selected, show no shifts
                                if (selectedEmployees.size === 0) return false;
                                return selectedEmployees.has(s.employeeId);
                            })
                            .sort((a, b) => {
                                // Pending time-off requests at top
                                if (
                                    a.isTimeOffRequest &&
                                    a.requestStatus === "pending" &&
                                    !(
                                        b.isTimeOffRequest &&
                                        b.requestStatus === "pending"
                                    )
                                )
                                    return -1;
                                if (
                                    b.isTimeOffRequest &&
                                    b.requestStatus === "pending" &&
                                    !(
                                        a.isTimeOffRequest &&
                                        a.requestStatus === "pending"
                                    )
                                )
                                    return 1;

                                // Both are pending time-off requests - sort by creation time
                                if (
                                    a.isTimeOffRequest &&
                                    a.requestStatus === "pending" &&
                                    b.isTimeOffRequest &&
                                    b.requestStatus === "pending"
                                ) {
                                    // Try requestDate first if available, otherwise use id
                                    if (a.requestDate && b.requestDate) {
                                        return (
                                            new Date(a.requestDate) -
                                            new Date(b.requestDate)
                                        ); // Earlier dates first
                                    }
                                    return a.id - b.id; // Lower id = created first = appears first
                                }

                                // Regular shifts in middle (by time)
                                if (
                                    !a.isDayOff &&
                                    !a.isTimeOffRequest &&
                                    !b.isDayOff &&
                                    !b.isTimeOffRequest
                                ) {
                                    return (a.startTime || "").localeCompare(
                                        b.startTime || "",
                                    );
                                }

                                // Day offs at bottom
                                if (a.isDayOff && !b.isDayOff) return 1;
                                if (!a.isDayOff && b.isDayOff) return -1;

                                // Both are day offs - sort by creation time for approved time-off requests
                                if (a.isDayOff && b.isDayOff) {
                                    if (a.requestDate && b.requestDate) {
                                        return (
                                            new Date(a.requestDate) -
                                            new Date(b.requestDate)
                                        );
                                    }
                                    return a.id - b.id;
                                }

                                return 0;
                            });

                        const dayAvailability = availability
                            .filter((item) => {
                                if (dayIsClosed) return false;
                                if (!showAvailability) return false;
                                if (item.date !== dateStr) return false;
                                if (selectedEmployees.size === 0) return false;
                                return selectedEmployees.has(item.employeeId);
                            })
                            .sort((a, b) => {
                                const employeeCompare =
                                    a.employeeName.localeCompare(
                                        b.employeeName,
                                    );
                                if (employeeCompare !== 0) {
                                    return employeeCompare;
                                }
                                return getPeriodSortValue(
                                    a.availabilityPeriod,
                                ) - getPeriodSortValue(b.availabilityPeriod);
                            });

                        calendarHTML += `
                        <div class="day-column">
                            <div style="padding: 8px; font-weight: 600; color: #2d3748; border-bottom: 1px solid #e2e8f0;">
                                ${dateDisplay}
                            </div>
                            <div class="shifts-container" style="padding: 8px;"
                                  ondragover="handleDragOver(event)"
                                  ondragenter="handleDragEnter(event)"
                                  ondragleave="handleDragLeave(event)"
                                  ondrop="handleDrop(event, '${dateStr}')">
                                ${
                                    dayIsClosed
                                        ? `<div class="closed-day-message">C<br>L<br>O<br>S<br>E<br>D</div>
                                           <button class="reopen-day-btn" onclick="reopenBusinessDay('${dateStr}')">Reopen</button>`
                                        : dayShifts
                                              .map((shift, index) => {
                                         const employee = employees.find(
                                             (e) => e.id === shift.employeeId,
                                         );
                                        let bgColor;
                                        let shiftText;

                                        // Check approved FIRST (before checking pending)
                                        if (
                                            shift.requestStatus ===
                                                "approved" ||
                                            shift.isDayOff
                                        ) {
                                            bgColor =
                                                "linear-gradient(135deg, #f56565 0%, #c53030 100%)";
                                            const periodLabel =
                                                formatTimeOffPeriod(
                                                    shift.timeOffPeriod,
                                                );
                                            shiftText =
                                                periodLabel === "Full Day"
                                                    ? "DAY OFF"
                                                    : `${periodLabel.toUpperCase()} OFF`;
                                        } else if (
                                            shift.isTimeOffRequest &&
                                            shift.requestStatus === "pending"
                                        ) {
                                            // Count total pending/approved time-off requests for this day
                                            const totalTimeOffRequests =
                                                shifts.filter(
                                                    (s) =>
                                                        s.date === dateStr &&
                                                        s.isTimeOffRequest &&
                                                        (s.requestStatus ===
                                                            "pending" ||
                                                            s.requestStatus ===
                                                                "approved"),
                                                ).length;

                                            // Count how many pending requests come before this one in the sorted list
                                            const pendingRequestsBefore =
                                                dayShifts
                                                    .slice(0, index)
                                                    .filter(
                                                        (s) =>
                                                            s.isTimeOffRequest &&
                                                            s.requestStatus ===
                                                                "pending",
                                                    ).length;

                                            // If 4+ total requests and this is the 4th+ pending request, use purple
                                            if (
                                                totalTimeOffRequests >= 4 &&
                                                pendingRequestsBefore >= 3
                                            ) {
                                                bgColor = "#9333EA"; // Purple
                                            } else {
                                                bgColor = "#FDB913"; // Yellow
                                            }

                                            shiftText = `PENDING TIME OFF - ${formatTimeOffPeriod(
                                                shift.timeOffPeriod,
                                            ).toUpperCase()}`;
                                        } else {
                                            bgColor =
                                                employee?.color || "#7F6C50";
                                            shiftText =
                                                formatTime12Hour(
                                                    shift.startTime,
                                                ) +
                                                " - " +
                                                formatTime12Hour(shift.endTime);
                                        }

                                        return `
                                    <div class="shift-card"
                                        draggable="true"
                                        ondragstart="handleDragStart(event, ${shift.id})"
                                        ondragend="handleDragEnd(event)"
                                        onclick="openEditShiftModal(${shift.id})"
                                        style="background: ${bgColor};">
                                        <div class="shift-employee">${shift.employeeName}</div>
                                        <div class="shift-time">${shiftText}</div>
                                     </div>
                                 `;
                                              })
                                              .join("") +
                                          dayAvailability
                                              .map((item) => {
                                                  const isPendingAvailability =
                                                      item.requestStatus ===
                                                      "pending";
                                                  const availabilityText =
                                                      isPendingAvailability
                                                          ? "PENDING AVAILABILITY"
                                                          : "AVAILABLE";
                                                  return `
                                    <div class="shift-card availability-card ${isPendingAvailability ? "pending-availability" : ""}">
                                        <div class="shift-employee">${item.employeeName}</div>
                                        <div class="shift-time">${availabilityText} - ${formatTimeOffPeriod(
                                            item.availabilityPeriod,
                                        ).toUpperCase()}</div>
                                     </div>
                                 `;
                                              })
                                              .join("") +
                                          `<button class="add-shift-btn" onclick="openShiftModal('${dateStr}')">+ Add</button>`
                                }
                            </div>
                        </div>
                    `;
                    } else {
                        // Empty cells to complete the week
                        calendarHTML +=
                            '<div class="day-column" style="background: #f7fafc;"></div>';
                    }
                }

                calendar.innerHTML = calendarHTML;
            }

            // Wix Database Sync Functions (manual save - shows loading overlay)
            function syncToDatabase() {
                if (IS_MOCK_MODE) {
                    updateSaveStatus("saved");
                    updateMaintenanceStatus();
                    renderTimeOffDrawer();
                    showToast(
                        "Mock Save",
                        "Changes are local to this demo session",
                        "info",
                    );
                    return;
                }

                // Clear any pending auto-save
                if (autoSaveTimeout) {
                    clearTimeout(autoSaveTimeout);
                }

                showLoading("Saving...");
                isSaving = true;
                updateSaveStatus("saving");
                updateEmployeeDisplayOrder();

                const data = {
                    employees: employees,
                    shifts: shifts,
                    closedDays: closedDays,
                };

                // Send to Wix parent page
                window.parent.postMessage(
                    {
                        action: "SYNC_TO_DATABASE",
                        data: data,
                    },
                    "*",
                );
                renderTimeOffDrawer();
            }

            function deduplicateShifts() {
                if (IS_MOCK_MODE) {
                    showToast(
                        "Mock Mode",
                        "Duplicate cleanup only runs against the Wix database",
                        "info",
                    );
                    return;
                }

                if (
                    !confirm(
                        "Remove exact duplicate schedule records from the database? This keeps one copy of each matching shift, day off, or request.",
                    )
                ) {
                    return;
                }

                showLoading("Removing duplicates...");
                window.parent.postMessage(
                    {
                        action: "DEDUPLICATE_SHIFTS",
                    },
                    "*",
                );
            }

            function loadFromDatabase() {
                if (IS_MOCK_MODE) {
                    loadMockData();
                    return;
                }

                showLoading("Loading...");

                // Request data from Wix parent page
                window.parent.postMessage(
                    {
                        action: "LOAD_FROM_DATABASE",
                    },
                    "*",
                );
            }

            // Listen for messages from Wix parent page
            window.addEventListener("message", function (event) {
                if (event.data && event.data.action) {
                    if (event.data.action === "SYNC_COMPLETE") {
                        const wasManualSave = document
                            .getElementById("loadingOverlay")
                            .classList.contains("active");

                        applySyncResult(event.data.syncResult);
                        isSaving = false;
                        updateSaveStatus("saved");
                        updateMaintenanceStatus(
                            event.data.cleanup,
                            event.data.appVersion,
                        );
                        hideLoading();
                        // Only show toast for manual saves (when loading overlay was shown)
                        if (wasManualSave) {
                            showToast(
                                "Saved to Database",
                                "Your schedule has been backed up successfully",
                                "success",
                            );
                        }
                    } else if (event.data.action === "SYNC_ERROR") {
                        isSaving = false;
                        updateSaveStatus("error");
                        hideLoading();
                        showToast(
                            "Save Failed",
                            "There was an error saving your changes",
                            "error",
                        );
                    } else if (event.data.action === "DELETE_SHIFT_ERROR") {
                        showToast(
                            "Delete Failed",
                            event.data.message ||
                                "There was an error deleting this shift",
                            "error",
                        );
                    } else if (
                        event.data.action === "DELETE_TIME_OFF_REQUESTS_ERROR"
                    ) {
                        showToast(
                            "Delete Failed",
                            event.data.message ||
                                "There was an error deleting this time-off request",
                            "error",
                        );
                    } else if (
                        event.data.action ===
                            "APPROVE_AVAILABILITY_REQUEST_COMPLETE" ||
                        event.data.action ===
                            "DENY_AVAILABILITY_REQUEST_COMPLETE"
                    ) {
                        loadFromDatabase();
                    } else if (
                        event.data.action ===
                            "APPROVE_AVAILABILITY_REQUEST_ERROR" ||
                        event.data.action ===
                            "DENY_AVAILABILITY_REQUEST_ERROR"
                    ) {
                        showToast(
                            "Availability Update Failed",
                            event.data.message ||
                                "There was an error updating this availability request",
                            "error",
                        );
                        loadFromDatabase();
                    } else if (event.data.action === "DELETE_EMPLOYEE_ERROR") {
                        showToast(
                            "Delete Failed",
                            event.data.message ||
                                "There was an error deleting this employee",
                            "error",
                        );
                    } else if (
                        event.data.action === "DEDUPLICATE_SHIFTS_COMPLETE"
                    ) {
                        const deletedCount =
                            event.data.result?.deletedCount || 0;
                        hideLoading();
                        showToast(
                            "Duplicate Cleanup Complete",
                            `${deletedCount} duplicate shift${deletedCount === 1 ? "" : "s"} removed`,
                            "success",
                        );
                        loadFromDatabase();
                    } else if (
                        event.data.action === "DEDUPLICATE_SHIFTS_ERROR"
                    ) {
                        hideLoading();
                        showToast(
                            "Cleanup Failed",
                            event.data.message ||
                                "There was an error removing duplicate shifts",
                            "error",
                        );
                    } else if (event.data.action === "LOAD_COMPLETE") {
                        updateLoadingDetails("Processing data...");
                        updateMaintenanceStatus(
                            event.data.cleanup,
                            event.data.appVersion,
                        );

                        console.log(
                            "Received from Wix:",
                            event.data.employees.length,
                            "employees",
                            event.data.shifts.length,
                            "shifts",
                        );

                        updateLoadingDetails("Rendering calendar...");

                        applyLoadedScheduleData(event.data);

                        console.log(
                            "After render - shifts in calendar should show",
                        );

                        hideLoading();
                        showToast(
                            "Loaded from Database",
                            `${employees.length} employees, ${shifts.length} shifts`,
                            "success",
                        );
                    } else if (
                        event.data.action === "TIME_OFF_REQUEST_SUBMITTED"
                    ) {
                        // Reload data to show new pending request
                        loadFromDatabase();
                    } else if (
                        event.data.action === "TIME_OFF_REQUEST_CANCELLED"
                    ) {
                        // Reload data to remove cancelled request
                        loadFromDatabase();
                    }
                }
            });

            // Initialize - Auto-load on page load
            window.addEventListener("load", function () {
                updateMaintenanceStatus();
                if (IS_MOCK_MODE) {
                    loadMockData();
                } else {
                    // Give the iframe time to establish connection with parent
                    setTimeout(() => {
                        loadFromDatabase();
                    }, 500);
                }
                renderTimeOffDrawer();
            });

            document.addEventListener("click", closeToolsMenu);
            document.addEventListener("keydown", function (event) {
                if (event.key === "Escape") {
                    closeToolsMenu();
                }
            });

            // Re-render calendar on resize/orientation change for mobile responsiveness
            let resizeTimeout;
            window.addEventListener("resize", function () {
                clearTimeout(resizeTimeout);
                resizeTimeout = setTimeout(() => {
                    renderCalendar();
                }, 250);
            });

            // Request Management Functions
            function renderTimeOffDrawer() {
                const individualRequests = getIndividualRequests();

                const pending = individualRequests.filter(
                    (r) => r.status === "pending",
                );
                const approved = individualRequests.filter(
                    (r) => r.status === "approved",
                );

                // Show count of individual days, not grouped requests
                document.getElementById("pendingCount").textContent =
                    pending.length;

                renderRequestList("pendingRequestsList", pending, true);
                renderRequestList("approvedRequestsList", approved, false);
            }

            function getIndividualRequests() {
                const timeOffRequests = shifts
                    .filter((shift) => {
                        if (
                            shift.isTimeOffRequest &&
                            shift.requestStatus === "pending"
                        ) {
                            return true;
                        }
                        if (shift.requestStatus === "approved") {
                            return true;
                        }
                        return false;
                    })
                    .map((shift) => ({
                        type: "time-off",
                        typeLabel: "Time Off",
                        shiftId: shift.id,
                        employeeName: shift.employeeName,
                        employeeId: shift.employeeId,
                        requestDate: shift.requestDate,
                        status: shift.requestStatus,
                        date: shift.date,
                        timeOffPeriod: shift.timeOffPeriod,
                    }));

                const availabilityRequests = availability
                    .filter(
                        (item) =>
                            item.requestStatus === "pending" ||
                            item.requestStatus === "approved",
                    )
                    .map((item) => ({
                        type: "availability",
                        typeLabel: "Availability",
                        availabilityId: item.id,
                        employeeName: item.employeeName,
                        employeeId: item.employeeId,
                        requestDate: item.requestDate,
                        status: item.requestStatus,
                        date: item.date,
                        availabilityPeriod: item.availabilityPeriod,
                    }));

                return timeOffRequests
                    .concat(availabilityRequests)
                    .sort((a, b) => {
                        const typeOrder = {
                            "time-off": 0,
                            availability: 1,
                        };
                        const dateCompare = a.date.localeCompare(b.date);
                        if (dateCompare !== 0) return dateCompare;
                        const employeeCompare = a.employeeName.localeCompare(
                            b.employeeName,
                        );
                        if (employeeCompare !== 0) return employeeCompare;
                        return typeOrder[a.type] - typeOrder[b.type];
                    });
            }

            function renderRequestList(containerId, requests, showActions) {
                const container = document.getElementById(containerId);

                if (requests.length === 0) {
                    container.innerHTML =
                        '<div class="empty-state">No requests</div>';
                    return;
                }

                container.innerHTML = requests
                    .map((req) => {
                        const dateObj = new Date(req.date + "T00:00:00");
                        const formattedDate = dateObj.toLocaleDateString(
                            "en-US",
                            {
                                weekday: "short",
                                month: "short",
                                day: "numeric",
                            },
                        );

                        const requestDate = req.requestDate
                            ? new Date(req.requestDate)
                            : null;
                        const formattedRequestDate = requestDate
                            ? requestDate.toLocaleDateString("en-US", {
                                  month: "short",
                                  day: "numeric",
                                  year: "numeric",
                              })
                            : "Unknown";

                        return `
                    <div class="request-item request-item-${req.type}">
                        <div class="request-header">
                            <strong>${req.employeeName}</strong>
                            <span class="request-date">Requested: ${formattedRequestDate}</span>
                        </div>
                        <div class="request-dates">
                            <span class="request-type-pill">${req.typeLabel}</span>
                            <span>${formattedDate} - ${formatTimeOffPeriod(
                                req.type === "availability"
                                    ? req.availabilityPeriod
                                    : req.timeOffPeriod,
                            )}</span>
                        </div>
                        ${
                            showActions
                                ? `
                            <div class="request-actions">
                                <button onclick="${req.type === "availability" ? `approveAvailabilityRequest(${req.availabilityId})` : `approveTimeOffRequest(${req.shiftId})`}"
                                        class="btn btn-success"
                                        style="flex: 1; padding: 6px; font-size: 13px;">
                                    Approve
                                </button>
                                <button onclick="${req.type === "availability" ? `denyAvailabilityRequest(${req.availabilityId})` : `denyTimeOffRequest(${req.shiftId})`}"
                                        class="btn btn-delete"
                                        style="flex: 1; padding: 6px; font-size: 13px;">
                                    Deny
                                </button>
                            </div>
                        `
                                : ""
                        }
                    </div>
                `;
                    })
                    .join("");
            }

            function showRequestTab(tabName) {
                document.querySelectorAll(".request-tab").forEach((btn) => {
                    btn.classList.remove("active");
                });
                document
                    .getElementById(tabName + "Tab")
                    .classList.add("active");

                document.getElementById("pendingRequestsList").style.display =
                    tabName === "pending" ? "block" : "none";
                document.getElementById("approvedRequestsList").style.display =
                    tabName === "approved" ? "block" : "none";
            }

            function approveTimeOffRequest(shiftIds) {
                if (!Array.isArray(shiftIds)) shiftIds = [shiftIds];

                const requestsToApprove = shifts.filter((shift) =>
                    shiftIds.includes(shift.id),
                );
                const conflicts = [];

                requestsToApprove.forEach((request) => {
                    getShiftsConflictingWithTimeOffRequest(request).forEach(
                        (shift) => {
                            conflicts.push({ request, shift });
                        },
                    );
                });

                if (
                    conflicts.length > 0 &&
                    !confirm(buildTimeOffApprovalConflictMessage(conflicts))
                ) {
                    return false;
                }

                saveState();

                let employeeName = "";
                const removedConflictCount = deleteConflictingShifts(conflicts);

                requestsToApprove.forEach((request) => {
                    const shift = shifts.find((s) => s.id === request.id);
                    if (!shift) return;

                    employeeName = shift.employeeName;
                    shift.requestStatus = "approved";
                    shift.isTimeOffRequest = false;
                    shift.isDayOff = true;
                });

                saveData();
                renderCalendar();
                renderTimeOffDrawer();
                renderEmployees();

                const message =
                    shiftIds.length === 1
                        ? `Day off approved for ${employeeName}`
                        : `${shiftIds.length} days approved`;
                const removalMessage =
                    removedConflictCount > 0
                        ? `${message}; ${removedConflictCount} conflicting shift${removedConflictCount === 1 ? "" : "s"} removed`
                        : message;
                showToast("Time Off Approved", removalMessage, "success");
                return true;
            }

            function denyTimeOffRequest(shiftIds) {
                if (!Array.isArray(shiftIds)) shiftIds = [shiftIds];

                const shift = shifts.find(
                    (s) =>
                        s.id ===
                        (Array.isArray(shiftIds) ? shiftIds[0] : shiftIds),
                );
                const employeeName = shift ? shift.employeeName : "";
                const confirmMsg =
                    shiftIds.length === 1
                        ? `Deny ${employeeName}'s time-off request for this day? This will delete the request.`
                        : `Deny ${shiftIds.length} time-off requests? This will delete the requests.`;

                if (!confirm(confirmMsg)) {
                    return;
                }

                saveState();

                // Delete the denied requests entirely instead of keeping them
                const requestsToDelete = shifts.filter((s) =>
                    shiftIds.includes(s.id),
                );
                deleteTimeOffRequestsFromWix(requestsToDelete);
                shifts = shifts.filter((s) => !shiftIds.includes(s.id));

                saveData();
                renderCalendar();
                renderTimeOffDrawer();
                renderEmployees();

                const message =
                    shiftIds.length === 1
                        ? `Request denied and removed for ${employeeName}`
                        : `${shiftIds.length} requests denied and removed`;
                showToast("Time Off Denied", message, "info");
            }

            function approveAvailabilityRequest(availabilityId) {
                const item = availability.find((a) => a.id === availabilityId);
                if (!item) return false;

                saveState();
                item.requestStatus = "approved";
                approveAvailabilityRequestInWix(item);
                renderCalendar();
                renderTimeOffDrawer();

                showToast(
                    "Availability Approved",
                    `Availability approved for ${item.employeeName}`,
                    "success",
                );
                return true;
            }

            function denyAvailabilityRequest(availabilityId) {
                const item = availability.find((a) => a.id === availabilityId);
                if (!item) return;

                if (
                    !confirm(
                        `Deny ${item.employeeName}'s availability request for this day? This will delete the request.`,
                    )
                ) {
                    return;
                }

                saveState();
                denyAvailabilityRequestInWix(item);
                availability = availability.filter((a) => a.id !== availabilityId);
                renderCalendar();
                renderTimeOffDrawer();

                showToast(
                    "Availability Denied",
                    `Request denied and removed for ${item.employeeName}`,
                    "info",
                );
            }
        </script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
    </body>
