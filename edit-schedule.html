            function exportToPDF() {
                // Wait for jsPDF to load
                if (typeof window.jspdf === "undefined") {
                    alert(
                        "PDF library is loading, please try again in a moment...",
                    );
                    return;
                }

                const { jsPDF } = window.jspdf;
                const doc = new jsPDF("l", "mm", "a4"); // landscape orientation

                // Add title with better styling
                doc.setFontSize(18);
                doc.setFont("helvetica", "bold");
                doc.text("Mad Potter Schedule", 148, 15, { align: "center" });
                doc.setTextColor(0, 0, 0);

                // Organize data by weeks
                const dayCount = getDayCount();
                const weeks = [];

                for (let weekStart = 0; weekStart < dayCount; weekStart += 7) {
                    const weekDays = [];
                    const weekDates = [];

                    for (let i = 0; i < 7 && weekStart + i < dayCount; i++) {
                        const date = new Date(currentStartDate);
                        date.setDate(date.getDate() + weekStart + i);
                        weekDays.push(
                            date.toLocaleDateString("en-US", {
                                weekday: "short",
                            }),
                        );
                        weekDates.push(date);
                    }

                    weeks.push({ weekDays, weekDates, weekStart });
                }

                let yPosition = 25;

                // Calculate uniform column width
                // Total page width minus margins: 297mm - 28mm (14mm each side) = 269mm
                // Divide by 8 columns (1 name + 7 days)
                const columnWidth = 269 / 8;

                // Process each week
                weeks.forEach((week, weekIndex) => {
                    // Add page break before each table except the first one
                    if (weekIndex > 0) {
                        doc.addPage();
                        yPosition = 15;
                    }

                    // Prepare table data
                    const tableData = [];

                    // Filter employees based on current filter
                    // If no employees selected, show none
                    const displayEmployees = employees.filter((emp) =>
                        selectedEmployees.has(emp.id),
                    );

                    displayEmployees.forEach((emp) => {
                        const row = [emp.name];

                        // Add shift info for each day of the week
                        week.weekDates.forEach((date) => {
                            const dateStr = formatDate(date);
                            if (isClosedDate(dateStr)) {
                                row.push("CLOSED");
                                return;
                            }

                            const dayShifts = shifts.filter(
                                (s) =>
                                    s.date === dateStr &&
                                    s.employeeId === emp.id,
                            );

                            if (dayShifts.length > 0) {
                                // Combine multiple shifts on same day
                                const shiftTexts = dayShifts.map((shift) => {
                                    if (shift.isDayOff) {
                                        return "OFF";
                                    }
                                    if (shift.isTimeOffRequest) {
                                        return shift.requestStatus === "pending"
                                            ? "PENDING"
                                            : "OFF";
                                    }
                                    return `${formatTime12Hour(shift.startTime)} - ${formatTime12Hour(shift.endTime)}`;
                                });
                                row.push(shiftTexts.join(", "));
                            } else {
                                row.push("—");
                            }
                        });

                        tableData.push(row);
                    });

                    // Create week header with dates - make "Week of" dynamic
                    const firstDate = week.weekDates[0];
                    const lastDate = week.weekDates[week.weekDates.length - 1];
                    const weekOfText = `Week of\n${firstDate.toLocaleDateString("en-US", { month: "short", day: "numeric" })} - ${lastDate.toLocaleDateString("en-US", { month: "short", day: "numeric" })}`;

                    const weekHeader = [
                        weekOfText,
                        ...week.weekDays.map((day, idx) => {
                            const date = week.weekDates[idx];
                            return `${day}\n${date.getMonth() + 1}/${date.getDate()}`;
                        }),
                    ];

                    // Create column styles with uniform widths
                    const columnStyles = {};
                    for (let i = 0; i < 8; i++) {
                        columnStyles[i] = {
                            cellWidth: columnWidth,
                            halign: "center",
                            valign: "middle",
                            overflow: "linebreak",
                            cellPadding: {
                                top: 4,
                                right: 2,
                                bottom: 4,
                                left: 2,
                            },
                        };
                        if (i === 0) {
                            columnStyles[i].fontStyle = "bold";
                            columnStyles[i].fillColor = [245, 247, 250];
                            columnStyles[i].fontSize = 9;
                        }
                    }

                    // Draw table with professional styling
                    doc.autoTable({
                        startY: yPosition,
                        head: [weekHeader],
                        body: tableData,
                        theme: "striped",
                        styles: {
                            fontSize: 9,
                            cellPadding: {
                                top: 4,
                                right: 2,
                                bottom: 4,
                                left: 2,
                            },
                            lineColor: [200, 200, 200],
                            lineWidth: 0.1,
                            font: "helvetica",
                            overflow: "linebreak",
                            cellWidth: "wrap",
                            halign: "center",
                            valign: "middle",
                        },
                        headStyles: {
                            fillColor: [110, 95, 74],
                            textColor: [255, 255, 255],
                            fontStyle: "bold",
                            halign: "center",
                            valign: "middle",
                            fontSize: 9,
                            cellPadding: 4,
                        },
                        columnStyles: columnStyles,
                        alternateRowStyles: {
                            fillColor: [250, 250, 252],
                        },
                        bodyStyles: {
                            valign: "middle",
                            halign: "center",
                        },
                        margin: { left: 14, right: 14 },
                    });

                    yPosition = doc.lastAutoTable.finalY + 12;
                });

                // Add footer with page numbers
                const pageCount = doc.internal.getNumberOfPages();
                doc.setFontSize(8);
                doc.setTextColor(150, 150, 150);
                for (let i = 1; i <= pageCount; i++) {
                    doc.setPage(i);
                    doc.text(`Page ${i} of ${pageCount}`, 148, 200, {
                        align: "center",
                    });
                }

                // Save the PDF
                const monthNames = [
                    "jan",
                    "feb",
                    "mar",
                    "apr",
                    "may",
                    "jun",
                    "jul",
                    "aug",
                    "sep",
                    "oct",
                    "nov",
                    "dec",
                ];
                const startMonth = monthNames[currentStartDate.getMonth()];
                const startDay = currentStartDate.getDate();
                const endMonth = monthNames[currentEndDate.getMonth()];
                const endDay = currentEndDate.getDate();

                const filename = `schedule-${startMonth}-${startDay}-${endMonth}-${endDay}.pdf`;
                doc.save(filename);
            }

            function setCustomDates() {
                const startInput = document.getElementById("customStartDate");
                const endInput = document.getElementById("customEndDate");

                if (startInput.value && endInput.value) {
                    const newStart = new Date(startInput.value + "T00:00:00");
                    const newEnd = new Date(endInput.value + "T00:00:00");

                    if (newEnd < newStart) {
                        alert("End date must be after start date");
                        updateDateInputs();
                        return;
                    }

                    currentStartDate = newStart;
                    currentEndDate = newEnd;
                    saveData();
                    renderCalendar();
                    renderEmployees(); // Refresh employee hours for new date range
                } else if (startInput.value) {
                    currentStartDate = new Date(startInput.value + "T00:00:00");
                    currentEndDate = new Date(currentStartDate);
                    currentEndDate.setDate(currentEndDate.getDate() + 34);
                    updateDateInputs();
                    saveData();
                    renderCalendar();
                    renderEmployees(); // Refresh employee hours for new date range
                } else if (endInput.value) {
                    currentEndDate = new Date(endInput.value + "T00:00:00");
                    currentStartDate = new Date(currentEndDate);
                    currentStartDate.setDate(currentStartDate.getDate() - 34);
                    updateDateInputs();
                    saveData();
                    renderCalendar();
                    renderEmployees(); // Refresh employee hours for new date range
                }
            }

            function updateDateInputs() {

                    const day = String(date.getDate()).padStart(2, "0");
                    return `${year}-${month}-${day}`;

                startInput.value = formatDate(currentStartDate);
                endInput.value = formatDate(currentEndDate);

                e.preventDefault();

                if (draggedShiftId && newDate) {
                    if (isClosedDate(newDate)) {

                    const shift = shifts.find((s) => s.id === draggedShiftId);
                    if (shift) {
                        if (!shift.isDayOff && !shift.isTimeOffRequest) {
                            const conflicts = getShiftSubmissionConflicts({
                                employeeIds: [shift.employeeId],
                                dates: [newDate],
                                startTime: shift.startTime,
                                endTime: shift.endTime,
                                ignoreShiftId: shift.id,
                            });

                            if (conflicts.length > 0) {

                        saveState(); // Save state before drag

            function getEmployeeRateForDate(employee, dateStr) {
                // Return null if employee has no rates
                if (!employee.rates || employee.rates.length === 0) {
                    return null;
                }

                const date = new Date(dateStr + "T00:00:00");

                // Find the applicable rate for this date
                for (let rateInfo of employee.rates) {
                    const startDate = rateInfo.startDate
                        ? new Date(rateInfo.startDate + "T00:00:00")
                        : null;
                    const endDate = rateInfo.endDate
                        ? new Date(rateInfo.endDate + "T00:00:00")
                        : null;

                    const afterStart = !startDate || date >= startDate;
                    const beforeEnd = !endDate || date <= endDate;

                    if (afterStart && beforeEnd) {
                        return rateInfo.rate;
                    }
                }

                // Default to first rate if no match found
                return employee.rates.length > 0
                    ? employee.rates[0].rate
                    : null;
            }

            function getCurrentRateDisplay(employee) {
                // Handle employees with no rates
                if (!employee.rates || employee.rates.length === 0) {
                    return "No rate set";
                }

                // Find rates that apply to the current date range
                const applicableRates = new Set();

                employee.rates.forEach((rateInfo) => {
                    const rateStart = rateInfo.startDate
                        ? new Date(rateInfo.startDate + "T00:00:00")
                        : new Date("1900-01-01");
                    const rateEnd = rateInfo.endDate
                        ? new Date(rateInfo.endDate + "T00:00:00")
                        : new Date("2100-01-01");

                    // Check if this rate overlaps with current date range
                    if (
                        rateEnd >= currentStartDate &&
                        rateStart <= currentEndDate
                    ) {
                        applicableRates.add(rateInfo.rate);
                    }
                });

                if (applicableRates.size === 0) {
                    return employee.rates.length > 0
                        ? `$${employee.rates[0].rate.toFixed(2)}/hr`
                        : "No rate set";
                } else if (applicableRates.size === 1) {
                    return `$${[...applicableRates][0].toFixed(2)}/hr`;
                } else {
                    const rates = [...applicableRates].sort((a, b) => a - b);
                    return `$${rates[0].toFixed(2)}-$${rates[rates.length - 1].toFixed(2)}/hr`;
                }
            }

            function calculateEmployeeShiftCount(employeeId) {
                const employeeShifts = shifts.filter((s) => {
                    if (s.employeeId !== employeeId) return false;
                    if (s.isDayOff) return false; // Don't count day offs

                    const shiftDate = new Date(s.date + "T00:00:00");
                    const startDate = new Date(currentStartDate);
                    const endDate = new Date(currentEndDate);

                    // Normalize all dates to midnight for comparison
                    shiftDate.setHours(0, 0, 0, 0);
                    startDate.setHours(0, 0, 0, 0);
                    endDate.setHours(0, 0, 0, 0);

                    return shiftDate >= startDate && shiftDate <= endDate;
                });

                return employeeShifts.length;
            }

            function calculateEmployeeHours(employeeId) {
                const employeeShifts = shifts.filter((s) => {
                    if (s.employeeId !== employeeId) return false;
                    if (s.isDayOff) return false; // Exclude day offs from hours
                    if (s.isTimeOffRequest) return false; // Exclude time-off requests from hours
                    if (!s.startTime || !s.endTime) return false; // Exclude shifts without valid times

                    const shiftDate = new Date(s.date + "T00:00:00");
                    const startDate = new Date(currentStartDate);
                    const endDate = new Date(currentEndDate);

                    // Normalize all dates to midnight for comparison
                    shiftDate.setHours(0, 0, 0, 0);
                    startDate.setHours(0, 0, 0, 0);
                    endDate.setHours(0, 0, 0, 0);

                    return shiftDate >= startDate && shiftDate <= endDate;
                });

                let totalMinutes = 0;
                employeeShifts.forEach((shift) => {
                    const [startHours, startMinutes] = shift.startTime
                        .split(":")
                        .map(Number);
                    const [endHours, endMinutes] = shift.endTime
                        .split(":")
                        .map(Number);

                    const startTotalMinutes = startHours * 60 + startMinutes;
                    let endTotalMinutes = endHours * 60 + endMinutes;

                    // Handle overnight shifts (end time is midnight or earlier than start)
                    if (endTotalMinutes <= startTotalMinutes) {
                        endTotalMinutes += 24 * 60; // Add 24 hours
                    }

                    totalMinutes += endTotalMinutes - startTotalMinutes;
                });

                return (totalMinutes / 60).toFixed(1);
            }

            function formatDate(date) {
                return date.toISOString().split("T")[0];
            }

            function normalizeTimeOffPeriod(period) {
                return TIME_OFF_PERIOD_LABELS[period] ? period : "full-day";
            }

            function formatTimeOffPeriod(period) {
                return TIME_OFF_PERIOD_LABELS[normalizeTimeOffPeriod(period)];
            }

            function getPeriodSortValue(period) {
                const normalized = normalizeTimeOffPeriod(period);
                if (normalized === "full-day") return 0;
                if (normalized === "morning") return 1;
                return 2;
            }

            function timeOffPeriodsConflict(requestedPeriod, existingPeriod) {
                const requested = normalizeTimeOffPeriod(requestedPeriod);
                const existing = normalizeTimeOffPeriod(existingPeriod);

                return (
                    requested === "full-day" ||
                    existing === "full-day" ||
                    requested === existing
                );
            }

            function getTimeMinutes(time) {
                if (!time) return null;
                const [hours, minutes] = time.split(":").map(Number);
                if (Number.isNaN(hours) || Number.isNaN(minutes)) return null;
                return hours * 60 + minutes;
            }

            function getShiftInterval(startTime, endTime) {
                const start = getTimeMinutes(startTime);
                let end = getTimeMinutes(endTime);
                if (start === null || end === null) return null;
                if (end <= start) {
                    end += 24 * 60;
                }
                return { start, end };
            }

            function doShiftIntervalsOverlap(first, second) {
                if (!first || !second) return false;
                return first.start < second.end && second.start < first.end;
            }

            function getApprovedTimeOffShiftConflict(shift, startTime) {
                const period = normalizeTimeOffPeriod(shift.timeOffPeriod);
                if (period === "full-day") {
                    return "approved full-day time off";
                }

                const start = getTimeMinutes(startTime);
                if (start === null) return null;

                if (period === "morning" && start < 17 * 60) {
                    return "approved morning time off";
                }

                if (period === "evening" && start >= 17 * 60) {
                    return "approved evening time off";
                }

                return null;
            }

            function timeOffPeriodConflictsWithShiftStart(period, startTime) {
                const normalizedPeriod = normalizeTimeOffPeriod(period);
                if (normalizedPeriod === "full-day") return true;

                const start = getTimeMinutes(startTime);
                if (start === null) return false;

                if (normalizedPeriod === "morning") {
                    return start < 17 * 60;
                }

                if (normalizedPeriod === "evening") {
                    return start >= 17 * 60;
                }

                return false;
            }

            function findShiftConflict({
                employeeId,
                date,
                startTime,
                endTime,
                ignoreShiftId = null,
            }) {
                const requestedInterval = getShiftInterval(startTime, endTime);

                for (const shift of shifts) {
                    if (
                        shift.id === ignoreShiftId ||
                        shift.employeeId !== employeeId ||
                        shift.date !== date
                    ) {
                        continue;
                    }

                    if (shift.requestStatus === "approved") {
                        const reason = getApprovedTimeOffShiftConflict(
                            shift,
                            startTime,
                        );
                        if (reason) {
                            return { type: "time-off", shift, reason };
                        }
                        continue;
                    }

                    if (shift.isDayOff || shift.isTimeOffRequest) {
                        continue;
                    }

                    if (
                        doShiftIntervalsOverlap(
                            requestedInterval,
                            getShiftInterval(shift.startTime, shift.endTime),
                        )
                    ) {
                        return { type: "shift", shift };
                    }
                }

                return null;
            }

            function formatDateLong(dateStr) {
                const date = new Date(dateStr + "T00:00:00");
                return date.toLocaleDateString("en-US", {
                    month: "short",
                    day: "numeric",
                    year: "numeric",
                });
            }

            function groupConflictsByDateEmployee(conflicts, getShift) {
                const dateGroups = [];
                const dateMap = new Map();

                conflicts.forEach((conflict) => {
                    const shift = getShift(conflict);
                    const employeeName =
                        conflict.employeeName ||
                        conflict.request?.employeeName ||
                        "Unknown";
                    const date = conflict.date || conflict.request?.date;

                    if (!dateMap.has(date)) {
                        const dateGroup = {
                            date,
                            employeeGroups: [],
                            employeeMap: new Map(),
                        };
                        dateMap.set(date, dateGroup);
                        dateGroups.push(dateGroup);
                    }

                    const dateGroup = dateMap.get(date);
                    if (!dateGroup.employeeMap.has(employeeName)) {
                        const employeeGroup = {
                            employeeName,
                            shifts: [],
                        };
                        dateGroup.employeeMap.set(employeeName, employeeGroup);
                        dateGroup.employeeGroups.push(employeeGroup);
                    }

                    dateGroup.employeeMap.get(employeeName).shifts.push(shift);
                });

                return dateGroups;
            }

            function formatShiftTimeRange(shift) {
                return `${formatTime12Hour(shift.startTime)} - ${formatTime12Hour(shift.endTime)}`;
            }

            function buildDateEmployeeShiftLines(dateGroups) {
                return dateGroups.map((dateGroup) => {
                    const employeeLines = dateGroup.employeeGroups.flatMap(
                        (employeeGroup) =>
                            employeeGroup.shifts.map(
                                (shift) =>
                                    `  - ${employeeGroup.employeeName}: ${formatShiftTimeRange(shift)}`,
                            ),
                    );

                    return `${formatDateLong(dateGroup.date)}\n${employeeLines.join("\n")}`;
                });
            }

            function buildGroupedShiftLines(conflicts) {
                const dateGroups = groupConflictsByDateEmployee(
                    conflicts,
                    (conflict) => conflict.conflict.shift,
                );

                return buildDateEmployeeShiftLines(dateGroups);
            }

            function getHiddenShiftCount(dateGroups, visibleGroupCount) {
                return dateGroups.slice(visibleGroupCount).reduce(
                    (count, dateGroup) =>
                        count +
                        dateGroup.employeeGroups.reduce(
                            (employeeCount, employeeGroup) =>
                                employeeCount + employeeGroup.shifts.length,
                            0,
                        ),
                    0,
                );
            }

            function getGroupedReplacementLines(conflicts) {
                const groups = groupConflictsByDateEmployee(
                    conflicts,
                    ({ shift }) => shift,
                );

                const lines = buildDateEmployeeShiftLines(groups);

                return { groups, lines };
            }

            function buildShiftConflictMessage(conflicts) {
                const shiftConflicts = conflicts.filter(
                    (conflict) => conflict.conflict.type === "shift",
                );
                const timeOffConflicts = conflicts.filter(
                    (conflict) => conflict.conflict.type !== "shift",
                );
                const allLines = buildGroupedShiftLines(shiftConflicts).concat(
                    timeOffConflicts.map((conflict) => {
                        return `${conflict.employeeName} already has ${conflict.conflict.reason} on ${formatDateLong(conflict.date)}.`;
                    }),
                );
                const lines = allLines.slice(0, 8);

                if (allLines.length > lines.length) {
                    lines.push(
                        `${allLines.length - lines.length} more conflict${allLines.length - lines.length === 1 ? "" : "s"} not shown.`,
                    );
                }

                return `This shift cannot be saved because it conflicts with existing schedule items:\n\n${lines.join("\n\n")}`;
            }

            function getShiftSubmissionConflicts({
                employeeIds,
                dates,
                startTime,
                endTime,
                ignoreShiftId = null,
            }) {
                const conflicts = [];

                dates.forEach((date) => {
                    employeeIds.forEach((employeeId) => {
                        const conflict = findShiftConflict({
                            employeeId,
                            date,
                            startTime,
                            endTime,
                            ignoreShiftId,
                        });

                        if (conflict) {
                            const employee = employees.find(
                                (e) => e.id === employeeId,
                            );
                            conflicts.push({
                                employeeId,
                                employeeName: employee?.name || "Unknown",
                                date,
                                startTime,
                                endTime,
                                conflict,
                            });
                        }
                    });
                });

                return conflicts;
            }

            function getShiftsConflictingWithTimeOffRequest(request) {
                if (!request) return [];
                const period = normalizeTimeOffPeriod(request.timeOffPeriod);

                return shifts.filter((shift) => {
                    if (
                        shift.id === request.id ||
                        shift.employeeId !== request.employeeId ||
                        shift.date !== request.date ||
                        shift.isDayOff ||
                        shift.isTimeOffRequest ||
                        !shift.startTime
                    ) {
                        return false;
                    }

                    return timeOffPeriodConflictsWithShiftStart(
                        period,
                        shift.startTime,
                    );
                });
            }

            function buildTimeOffApprovalConflictMessage(conflicts) {
                const { groups, lines: allLines } = getGroupedReplacementLines(
                    conflicts,
                );
                const lines = allLines.slice(0, 8);
                const hiddenShiftCount = getHiddenShiftCount(
                    groups,
                    lines.length,
                );

                if (hiddenShiftCount > 0) {
                    lines.push(
                        `${hiddenShiftCount} more conflicting shift${hiddenShiftCount === 1 ? "" : "s"} not shown.`,
                    );
                }

                return `Approving this time off will DELETE existing shifts that conflict:\n\n${lines.join("\n\n")}\n\nContinue?`;
            }

            function getDayOffConflicts(
                employeeIds,
                dates,
                period = "full-day",
                ignoreShiftId = null,
            ) {
                const conflicts = [];
                const timeOffPeriod = normalizeTimeOffPeriod(period);

                dates.forEach((date) => {
                    employeeIds.forEach((employeeId) => {
                        const employee = employees.find((e) => e.id === employeeId);
                        const request = {
                            id: ignoreShiftId,
                            employeeId,
                            employeeName: employee?.name || "Unknown",
                            date,
                            timeOffPeriod,
                        };

                        getShiftsConflictingWithTimeOffRequest(request).forEach(
                            (shift) => {
                                conflicts.push({ request, shift });
                            },
                        );
                    });
                });

                return conflicts;
            }

            function buildDayOffConflictMessage(conflicts) {
                const { groups, lines: allLines } = getGroupedReplacementLines(
                    conflicts,
                );
                const lines = allLines.slice(0, 8);
                const hiddenShiftCount = getHiddenShiftCount(
                    groups,
                    lines.length,
                );

                if (hiddenShiftCount > 0) {
                    lines.push(
                        `${hiddenShiftCount} more conflicting shift${hiddenShiftCount === 1 ? "" : "s"} not shown.`,
                    );
                }

                return `Adding this day off will DELETE existing shifts that conflict:\n\n${lines.join("\n\n")}\n\nContinue?`;
            }

            function getDuplicateDayOffConflicts(
                employeeIds,
                dates,
                period,
                ignoreShiftId = null,
            ) {
                const requestedPeriod = normalizeTimeOffPeriod(period);
                const employeeIdSet = new Set(employeeIds);
                const dateSet = new Set(dates);

                return shifts.filter((shift) => {
                    if (
                        shift.id === ignoreShiftId ||
                        !employeeIdSet.has(shift.employeeId) ||
                        !dateSet.has(shift.date) ||
                        shift.requestStatus === "denied"
                    ) {
                        return false;
                    }

                    const isExistingDayOff =
                        shift.isDayOff || shift.requestStatus === "approved";
                    if (!isExistingDayOff) return false;

                    return timeOffPeriodsConflict(
                        requestedPeriod,
                        shift.timeOffPeriod,
                    );
                });
            }

            function buildDuplicateDayOffMessage(conflicts, requestedPeriod) {
                const requestedLabel = formatTimeOffPeriod(requestedPeriod);
                const lines = conflicts.slice(0, 8).map((shift) => {
                    return `${shift.employeeName} already has ${formatTimeOffPeriod(
                        shift.timeOffPeriod,
                    )} off on ${formatDateLong(shift.date)}.`;
                });

                if (conflicts.length > lines.length) {
                    lines.push(
                        `${conflicts.length - lines.length} more duplicate${conflicts.length - lines.length === 1 ? "" : "s"} not shown.`,
                    );
                }

                return `This ${requestedLabel} day off cannot be added because it overlaps existing day off:\n\n${lines.join("\n")}`;
            }

            function deleteConflictingShifts(conflicts) {
                const conflictingShiftIds = [
                    ...new Set(conflicts.map(({ shift }) => shift.id)),
                ];
                const conflictingShifts = shifts.filter((shift) =>
                    conflictingShiftIds.includes(shift.id),
                );

                conflictingShifts.forEach((shift) => {
                    deleteShiftFromWix(shift);
                });

                shifts = shifts.filter(
                    (shift) => !conflictingShiftIds.includes(shift.id),
                );

                return conflictingShiftIds.length;
            }

            function updateTempRate(index, field, value) {
                if (field === "rate") {
                    tempRates[index][field] = parseFloat(value) || 0;
                } else {
                    tempRates[index][field] = value || null;
                }
            }

            function checkRateOverlap(rates) {
                for (let i = 0; i < rates.length; i++) {
                    for (let j = i + 1; j < rates.length; j++) {
                        const rate1 = rates[i];
                        const rate2 = rates[j];

                        const start1 = rate1.startDate
                            ? new Date(rate1.startDate)
                            : new Date("1900-01-01");
                        const end1 = rate1.endDate
                            ? new Date(rate1.endDate)
                            : new Date("2100-01-01");
                        const start2 = rate2.startDate
                            ? new Date(rate2.startDate)
                            : new Date("1900-01-01");
                        const end2 = rate2.endDate
                            ? new Date(rate2.endDate)
                            : new Date("2100-01-01");

                        // Check if ranges overlap
                        if (start1 <= end2 && start2 <= end1) {
                            return true; // Overlap found
                        }
                    }
                }
                return false; // No overlap
            }

            function updateEmployee() {
                const name = document
                    .getElementById("editEmployeeName")
                    .value.trim();
                const color =
                    document.getElementById("editEmployeeColor").value;

                if (!name) {
                    alert("Please enter an employee name");
                    return;
                }

                // Filter out any empty rates and validate remaining ones
                const validRates = tempRates.filter((rate) => {
                    // If rate is 0 or empty, skip it
                    if (!rate.rate || rate.rate <= 0) {
                        return false;
                    }
                    return true;
                });

                // Validate remaining rates
                for (let rate of validRates) {
                    if (rate.startDate && rate.endDate) {
                        const start = new Date(rate.startDate);
                        const end = new Date(rate.endDate);
                        if (end < start) {
                            alert(
                                "End date must be after start date for all rate periods",
                            );
                            return;
                        }
                    }
                }

                // Check for overlapping rates
                if (checkRateOverlap(validRates)) {

            function updateShift() {

                    document.getElementById("editShiftEmployee").value,

                const isDayOff =
                    document.getElementById("editIsDayOff").checked;

                if (!employeeId || !date) {
                    alert("Please fill in employee and date");

                }

                let startTime, endTime;

                if (!isDayOff) {
                    startTime = document.getElementById("editShiftStart").value;
                    endTime = document.getElementById("editShiftEnd").value;

                    if (!startTime || !endTime) {
                        alert("Please fill in start and end times");
                        return;
                    }
                } else {
                    startTime = "00:00";
                    endTime = "00:00";
                }

                if (!isDayOff) {
                    const conflicts = getShiftSubmissionConflicts({
                        employeeIds: [employeeId],
                        dates: [date],
                        startTime,
                        endTime,
                        ignoreShiftId: editingShiftId,
                    });

                    if (conflicts.length > 0) {
                        alert(buildShiftConflictMessage(conflicts));
                        return;
                    }
                }

                const duplicateDayOffConflicts = isDayOff
                    ? getDuplicateDayOffConflicts(
                          [employeeId],
                          [date],
                          "full-day",
                          editingShiftId,
                      )
                    : [];
                if (duplicateDayOffConflicts.length > 0) {
                    alert(
                        buildDuplicateDayOffMessage(
                            duplicateDayOffConflicts,
                            "full-day",
                        ),
                    );
                    return;
                }

                const dayOffConflicts = isDayOff
                    ? getDayOffConflicts(
                          [employeeId],
                          [date],
                          "full-day",
                          editingShiftId,
                      )
                    : [];
                if (
                    dayOffConflicts.length > 0 &&
                    !confirm(buildDayOffConflictMessage(dayOffConflicts))
                ) {
                    return;
                }

                saveState(); // Save state before update

                const removedConflictCount =
                    dayOffConflicts.length > 0
                        ? deleteConflictingShifts(dayOffConflicts)
                        : 0;

                const employee = employees.find((e) => e.id === employeeId);
                const shift = shifts.find((s) => s.id === editingShiftId);

                if (shift) {
                    shift.employeeId = employeeId;
                    shift.employeeName = employee.name;

                    shift.endTime = endTime;
                    shift.isDayOff = isDayOff;

            // Shift Date Picker Functions
            function renderShiftDatePicker() {
                const grid = document.getElementById("shiftDatePickerGrid");
                const year = shiftPickerMonth.getFullYear();
                const month = shiftPickerMonth.getMonth();

                document.getElementById("shiftPickerMonthLabel").textContent =
                    shiftPickerMonth.toLocaleDateString("en-US", {
                        month: "long",
                        year: "numeric",
                    });

                const firstDay = new Date(year, month, 1);
                const lastDay = new Date(year, month + 1, 0);
                const daysInMonth = lastDay.getDate();
                const startDayOfWeek = firstDay.getDay();

                let html = "";

                // Day headers
                const dayNames = [
                    "Sun",
                    "Mon",
                    "Tue",
                    "Wed",
                    "Thu",
                    "Fri",
                    "Sat",
                ];
                dayNames.forEach((day) => {
                    html += `<div class="date-picker-day-header">${day}</div>`;
                });

                // Empty cells before first day
                for (let i = 0; i < startDayOfWeek; i++) {
                    html += "<div></div>";
                }

                // Date buttons
                for (let day = 1; day <= daysInMonth; day++) {
                    const date = new Date(year, month, day);
                    const dateStr = formatDate(date);
                    const isSelected = selectedShiftDates.includes(dateStr);
                    const isClosed = isClosedDate(dateStr);
                    const isClosedMode = selectedAddItemType === "closed";
                    const isDisabled = isClosed && !isClosedMode;

                    html += `
                    <button type="button" class="date-picker-date ${selectedClass}"
                            onclick="toggleShiftDateSelection('${dateStr}')"
                            title="${isClosed ? "Closed for business" : ""}"
                            ${isDisabled ? "disabled" : ""}>

                `;

                grid.innerHTML = html;
                renderShiftSelectedDatesChips();
            }

                const index = selectedShiftDates.indexOf(dateStr);
