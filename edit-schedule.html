<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta name="apple-mobile-web-app-capable" content="yes" />
        <meta
            name="apple-mobile-web-app-status-bar-style"
            content="black-translucent"
        />
        <title>Employee Shift Scheduler</title>
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            html,
            body {
                overflow: visible;
                height: auto;
            }

            body {
                font-family:
                    -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                    Oxygen, Ubuntu, Cantarell, sans-serif;
                min-height: 100vh;
                -webkit-text-size-adjust: 100%;
            }

            .container {
                max-width: 1400px;
                margin: 0 auto;
            }

            .header {
                color: white;
                text-align: center;
            }

            .toolbar,
            .toolbar-group,
            .toolbar-btn,
            .btn,
            .drawer-header,
            .sidebar-toggle,
            .filter-checkbox-item,
            .rate-item-header,
            .request-header,
            .request-actions,
            .date-chip,
            .date-chip-remove {
                display: flex;
                align-items: center;
            }

            .toolbar {
                justify-content: center;
                flex-wrap: wrap;
            }

            .toolbar-group,
            .request-actions,
            .selected-dates-chips {
                gap: 8px;
            }

            .toolbar-divider {
                width: 1px;
                height: 24px;
                background: rgba(255, 255, 255, 0.3);
                margin: 0 8px;
            }

            .toolbar-btn,
            .btn,
            .week-navigation button,
            .date-picker-nav button,
            .add-shift-btn,
            .request-tab,
            .date-picker-date,
            .shift-delete,
            .btn-small-delete,
            .btn-archive,
            .approve-deny-btn,
            .date-chip-remove {
                border: none;
                cursor: pointer;
                font-weight: 600;
                -webkit-tap-highlight-color: transparent;
            }

            .toolbar-btn,
            .btn {
                justify-content: center;
                gap: 6px;
            }

            .toolbar-btn svg {
                width: 16px;
                height: 16px;
            }

            .toolbar-btn:disabled {
                opacity: 0.5;
                cursor: not-allowed;
                transform: none;
            }

            .main-content {
                display: grid;
                grid-template-columns: 300px 1fr;
            }

            .section {
                margin-bottom: 16px;
            }

            .input-group {
                margin-bottom: 12px;
            }

            .input-group label,
            .filter-checkbox-item label {
                display: block;
                cursor: pointer;
            }

            .input-group input,
            .input-group select {
                width: 100%;
                font-size: 14px;
            }

            .input-group input[type="color"] {
                width: 80px;
                height: 80px;
                padding: 5px;
                cursor: pointer;
            }

            .btn {
                width: 100%;
                padding: 10px 14px;
                font-size: 13px;
            }

            .employee-list {
                margin-top: 12px;
            }

            .employee-item {
                display: flex;
                justify-content: space-between;
                align-items: center;
                padding: 12px 14px;
                margin-bottom: 8px;
                cursor: move;
            }

            .employee-item.archived {
                opacity: 0.5;
            }

            .employee-item.archived .employee-name::after {
                content: " (Archived)";
                font-size: 10px;
                color: #999;
                font-weight: normal;
                margin-left: 4px;
            }

            .employee-item.dragging,
            .shift-card.dragging {
                opacity: 0.5;
            }

            .employee-name {
                font-weight: 600;
                font-size: 14px;
            }

            .employee-role,
            .shift-time {
                font-size: 11px;
            }

            .rate-item {
                padding: 12px;
                margin-bottom: 10px;
            }

            .rate-item-header {
                justify-content: space-between;
                margin-bottom: 10px;
            }

            .rate-fields {
                display: grid;
                grid-template-columns: repeat(3, 1fr);
                gap: 10px;
            }

            .rate-fields input {
                padding: 8px;
                font-size: 13px;
            }

            .btn-small-delete,
            .btn-archive,
            .approve-deny-btn {
                color: white;
            }

            .btn-small-delete {
                padding: 4px 10px;
                font-size: 12px;
            }

            .btn-archive {
                min-width: 36px;
                padding: 6px 12px;
                font-size: 16px;
            }

            .drawer-header {
                justify-content: space-between;
                cursor: pointer;
                margin-bottom: 0;
            }

            .drawer-header h3 {
                margin: 0;
                color: white;
                font-size: 14px;
                display: flex;
                align-items: center;
                gap: 8px;
            }

            .drawer-toggle {
                transition: transform 0.3s;
            }

            .drawer-toggle.open {
                transform: rotate(180deg);
            }

            .drawer-content {
                max-height: 0;
                overflow: hidden;
                padding: 0;
                transition: max-height 0.3s ease-out;
            }

            .drawer-content.open {
                max-height: 2000px;
                padding: 14px;
                transition: max-height 0.5s ease-in;
            }

            .sidebar-toggle,
            .filter-checkbox-item {
                cursor: pointer;
                padding: 12px 14px;
            }

            .sidebar-toggle input[type="checkbox"],
            .filter-checkbox-item input[type="checkbox"] {
                width: 18px;
                height: 18px;
                margin: 0 10px 0 0;
                cursor: pointer;
                accent-color: #6b5a42;
            }

            .sidebar-toggle .toggle-label,
            .filter-checkbox-item label {
                flex: 1;
                font-size: 13px;
                font-weight: 600;
            }

            .filter-checkbox-item {
                margin-bottom: 6px;
            }

            .week-navigation {
                display: flex;
                justify-content: space-between;
                align-items: center;
            }

            .current-week {
                font-weight: 600;
            }

            .calendar {
                display: grid;
                grid-template-columns: repeat(7, 1fr);
            }

            .day-column {
                display: flex;
                flex-direction: column;
                min-height: 120px;
            }

            .day-header {
                padding: 15px;
                text-align: center;
                font-weight: 600;
            }

            .shifts-container {
                flex: 1;
                display: flex;
                flex-direction: column;
                padding: 10px;
            }

            .shift-card {
                position: relative;
                color: white;
                cursor: grab;
                touch-action: none;
            }

            .shift-card:active {
                cursor: grabbing;
            }

            .shift-delete {
                position: absolute;
                top: 8px;
                right: 8px;
                width: 20px;
                height: 20px;
                color: white;
                border-radius: 50%;
            }

            .add-shift-btn {
                width: 100%;
                padding: 6px;
            }

            .closed-day-message {
                flex: 1;
                display: flex;
                align-items: center;
                justify-content: center;
                min-height: 160px;
                padding: 18px 10px;
                border-radius: 12px;
                background: linear-gradient(135deg, #8fae8b 0%, #6f906b 100%);
                color: white;
                text-align: center;
                font-size: 20px;
                font-weight: 800;
                letter-spacing: 0.12em;
                line-height: 1.45;
            }

            .reopen-day-btn {
                width: 100%;
                margin-top: 8px;
                padding: 6px;
                border: none;
                border-radius: 8px;
                background: #48bb78;
                color: white;
                cursor: pointer;
                font-weight: 700;
            }

            .modal-overlay,
            .modal,
            .loading-overlay {
                display: none;
            }

            .modal-overlay {
                position: fixed;
                inset: 0;
                z-index: 999;
            }

            .modal-overlay.active {
                display: block;
            }

            .modal {
                position: absolute;
                z-index: 1000;
            }

            .modal.active {
                display: block;
            }

            .modal-content {
                width: 500px;
                max-height: 70vh;
                padding: 25px;
                overflow-y: auto;
                -webkit-overflow-scrolling: touch;
            }

            .modal-header {
                margin-bottom: 20px;
            }

            .modal-actions {
                display: flex;
                gap: 10px;
                align-items: center;
                margin-top: 20px;
            }

            .empty-state {
                text-align: center;
                padding: 30px 20px;
                font-size: 13px;
                font-style: italic;
            }

            .loading-overlay {
                position: fixed;
                inset: 0;
                z-index: 10000;
                justify-content: flex-start;
                align-items: center;
                flex-direction: column;
                padding-top: 60px;
            }

            .loading-overlay.active {
                display: flex;
            }

            .loading-content {
                min-width: 300px;
                padding: 40px;
                text-align: center;
            }

            .loading-spinner {
                width: 50px;
                height: 50px;
                border: 5px solid transparent;
                border-radius: 50%;
                animation: spin 1s linear infinite;
                margin: 0 auto 20px;
            }

            @keyframes spin {
                to {
                    transform: rotate(360deg);
                }
            }

            .toast {
                position: fixed;
                top: 20px;
                right: 20px;
                z-index: 9999;
                display: flex;
                align-items: center;
                gap: 12px;
                max-width: 400px;
                padding: 16px 24px;
                opacity: 0;
                transform: translateX(400px);
                transition: all 0.3s ease;
            }

            .toast.show {
                opacity: 1;
                transform: translateX(0);
            }

            .toast-content {
                flex: 1;
            }

            .toast-title {
                font-weight: 600;
                font-size: 14px;
                margin-bottom: 2px;
            }

            .toast-message {
                font-size: 13px;
            }

            .request-tabs,
            .selected-dates-chips {
                display: flex;
            }

            .request-tabs {
                gap: 4px;
                margin-bottom: 12px;
                padding: 4px;
            }

            .request-tab {
                flex: 1;
                padding: 8px 12px;
                font-size: 12px;
            }

            .request-list {
                max-height: 400px;
                overflow-y: auto;
            }

            .request-item {
                padding: 12px;
                margin-bottom: 8px;
            }

            .request-header {
                justify-content: space-between;
                align-items: start;
                margin-bottom: 8px;
            }

            .request-date {
                font-size: 11px;
            }

            .request-dates {
                font-size: 13px;
                margin-bottom: 8px;
            }

            .approve-deny-btn {
                position: absolute;
                bottom: 8px;
                padding: 4px 8px;
                font-size: 11px;
            }

            .approve-btn {
                left: 8px;
            }

            .deny-btn {
                right: 32px;
            }

            .date-picker-nav {
                display: flex;
                justify-content: space-between;
                align-items: center;
                margin-bottom: 15px;
            }

            .date-picker-nav button {
                padding: 8px 16px;
            }

            .date-picker-grid {
                display: grid;
                grid-template-columns: repeat(7, 1fr);
                gap: 4px;
                margin-bottom: 15px;
            }

            .date-picker-day-header,
            .date-picker-date {
                display: flex;
                align-items: center;
                justify-content: center;
            }

            .date-picker-day-header {
                padding: 8px;
                font-size: 12px;
                font-weight: 600;
            }

            .date-picker-date {
                aspect-ratio: 1;
                font-size: 14px;
            }

            .date-picker-date:disabled {
                cursor: not-allowed;
                opacity: 0.5;
            }

            .selected-dates-container {
                margin-top: 15px;
                padding: 15px;
                min-height: 60px;
            }

            .selected-dates-label {
                margin-bottom: 10px;
            }

            .selected-dates-chips {
                flex-wrap: wrap;
            }

            .date-chip {
                gap: 8px;
                padding: 6px 12px;
                font-size: 13px;
            }

            .date-chip-remove {
                width: 20px;
                height: 20px;
                justify-content: center;
                background: transparent;
                color: white;
                font-size: 18px;
                line-height: 1;
            }

            @media (max-width: 1024px) {
                .main-content {
                    grid-template-columns: 1fr;
                }
            }

            @media (max-width: 768px) {
                .toolbar,
                .toolbar-group,
                .week-navigation,
                .modal-actions {
                    flex-direction: column;
                }

                .toolbar-group,
                .toolbar-btn,
                .save-status,
                .week-navigation > div,
                .week-navigation button,
                .week-navigation input[type="date"],
                .modal-actions .btn {
                    width: 100%;
                }

                .btn,
                .toolbar-btn,
                .week-navigation button,
                .week-navigation input[type="date"] {
                    min-height: 48px;
                }

                .input-group input,
                .input-group select {
                    font-size: 16px;
                }

                .input-group input[type="color"] {
                    width: 100px;
                    height: 100px;
                }

                .rate-fields {
                    grid-template-columns: 1fr;
                }

                .calendar {
                    grid-template-columns: repeat(2, 1fr);
                }

                .day-header {
                    display: none;
                }

                .modal-content {
                    width: 300px;
                    max-height: 60vh;
                }

                .toast {
                    top: 10px;
                    left: 10px;
                    right: 10px;
                    max-width: none;
                    transform: translateY(-100px);
                }

                .toast.show {
                    transform: translateY(0);
                }
            }

            :root {
                --clay-950: #21170f;
                --clay-900: #352619;
                --clay-800: #4c3725;
                --clay-700: #6b4f36;
                --clay-600: #846f52;
                --clay-500: #a1825d;
                --clay-200: #eadfce;
                --clay-100: #f6efe4;
                --cream: #fffaf1;
                --paper: rgba(255, 252, 246, 0.93);
                --ink: #2b2219;
                --muted: #7d6f61;
                --line: rgba(91, 65, 40, 0.14);
                --gold: #d8a94f;
                --green: #3f9a6b;
                --red: #cf5448;
                --blue: #3d7e9f;
                --shadow-soft: 0 18px 50px rgba(58, 39, 21, 0.13);
                --shadow-card: 0 10px 26px rgba(58, 39, 21, 0.1);
                --radius-xl: 28px;
                --radius-lg: 20px;
                --radius-md: 14px;
            }

            body {
                color: var(--ink);
                background:
                    radial-gradient(
                        circle at top left,
                        rgba(216, 169, 79, 0.26),
                        transparent 34rem
                    ),
                    radial-gradient(
                        circle at 92% 18%,
                        rgba(132, 111, 82, 0.24),
                        transparent 28rem
                    ),
                    linear-gradient(
                        135deg,
                        #fff9ed 0%,
                        #f4eadb 42%,
                        #eadfce 100%
                    );
                padding: 26px;
            }

            body::before {
                content: "";
                position: fixed;
                inset: 0;
                pointer-events: none;
                background-image:
                    linear-gradient(
                        rgba(255, 255, 255, 0.32) 1px,
                        transparent 1px
                    ),
                    linear-gradient(
                        90deg,
                        rgba(255, 255, 255, 0.24) 1px,
                        transparent 1px
                    );
                background-size: 38px 38px;
                mask-image: linear-gradient(
                    to bottom,
                    rgba(0, 0, 0, 0.55),
                    transparent 70%
                );
            }

            .container {
                position: relative;
                background: var(--paper);
                border: 1px solid rgba(255, 255, 255, 0.72);
                border-radius: var(--radius-xl);
                box-shadow: var(--shadow-soft);
                overflow: hidden;
                backdrop-filter: blur(16px);
            }

            .header {
                position: relative;
                overflow: hidden;
                background:
                    linear-gradient(
                        135deg,
                        rgba(33, 23, 15, 0.94),
                        rgba(76, 55, 37, 0.92)
                    ),
                    radial-gradient(
                        circle at 22% 20%,
                        rgba(216, 169, 79, 0.52),
                        transparent 22rem
                    );
                padding: 36px 32px 28px;
            }

            .header::before {
                content: "";
                position: absolute;
                inset: auto -8% -80% -8%;
                height: 170px;
                background: radial-gradient(
                    ellipse at center,
                    rgba(255, 250, 241, 0.22),
                    transparent 68%
                );
            }

            .header h1 {
                position: relative;
                font-size: clamp(28px, 4vw, 48px);
                line-height: 1;
                letter-spacing: -0.04em;
                text-shadow: 0 8px 28px rgba(0, 0, 0, 0.28);
            }

            .header p {
                position: relative;
                max-width: 620px;
                margin: 12px auto 0;
                color: rgba(255, 250, 241, 0.76);
                font-size: 15px;
                line-height: 1.5;
            }

            .toolbar {
                background: rgba(53, 38, 25, 0.94);
                border-top: 1px solid rgba(255, 255, 255, 0.08);
                border-bottom: 1px solid rgba(255, 255, 255, 0.1);
                padding: 14px 22px;
                gap: 10px;
            }

            .toolbar-btn,
            .btn,
            .week-navigation button,
            .date-picker-nav button,
            .add-shift-btn,
            .request-tab {
                border-radius: 999px;
                transition:
                    transform 0.18s ease,
                    box-shadow 0.18s ease,
                    background 0.18s ease,
                    border-color 0.18s ease;
            }

            .toolbar-btn-primary {
                background: var(--cream);
                color: var(--clay-900);
                box-shadow: 0 8px 18px rgba(0, 0, 0, 0.12);
            }

            .toolbar-btn-secondary {
                background: rgba(255, 250, 241, 0.12);
                color: #fffaf1;
                border: 1px solid rgba(255, 255, 255, 0.14);
            }

            .toolbar-btn:hover:not(:disabled),
            .btn:hover,
            .week-navigation button:hover,
            .date-picker-nav button:hover,
            .add-shift-btn:hover {
                transform: translateY(-2px);
            }

            .save-status {
                background: rgba(255, 250, 241, 0.12);
                border: 1px solid rgba(255, 255, 255, 0.14);
                border-radius: 999px;
                padding: 7px 12px;
            }

            .main-content {
                background: rgba(255, 250, 241, 0.34);
            }

            .sidebar {
                background: linear-gradient(
                    180deg,
                    rgba(255, 250, 241, 0.78),
                    rgba(246, 239, 228, 0.86)
                );
                border-right: 1px solid var(--line);
                padding: 22px;
            }

            .section {
                margin-bottom: 18px;
            }

            .drawer-header,
            .sidebar-toggle {
                border: 1px solid rgba(255, 255, 255, 0.65);
                box-shadow: var(--shadow-card);
            }

            .drawer-header {
                background: linear-gradient(
                    135deg,
                    var(--clay-800),
                    var(--clay-600)
                );
                padding: 14px 16px;
                border-radius: var(--radius-md);
            }

            .drawer-header:hover {
                background: linear-gradient(
                    135deg,
                    var(--clay-900),
                    var(--clay-700)
                );
            }

            .drawer-content.open {
                background: rgba(255, 252, 246, 0.92);
                border: 1px solid var(--line);
                border-top: none;
                box-shadow: var(--shadow-card);
                border-radius: 0 0 var(--radius-md) var(--radius-md);
            }

            .sidebar-toggle,
            .filter-checkbox-item,
            .employee-item,
            .request-item,
            .rate-item,
            .selected-dates-container,
            .input-group input,
            .input-group select {
                background: rgba(255, 252, 246, 0.82);
                border-color: var(--line);
                border-radius: var(--radius-md);
            }

            .employee-item,
            .filter-checkbox-item,
            .request-item,
            .rate-item {
                box-shadow: 0 8px 18px rgba(58, 39, 21, 0.06);
            }

            .employee-item:hover,
            .filter-checkbox-item:hover,
            .sidebar-toggle:hover {
                background: #fffaf1;
                border-color: rgba(132, 111, 82, 0.28);
            }

            #employeeFilterList {
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
                gap: 8px;
            }

            #employeeFilterList .filter-checkbox-item {
                min-width: 0;
                margin-bottom: 0;
            }

            #employeeFilterList .filter-checkbox-item label {
                min-width: 0;
                overflow: hidden;
                text-overflow: ellipsis;
                white-space: nowrap;
            }

            .input-group label,
            .selected-dates-label {
                color: var(--clay-800);
                font-weight: 700;
                letter-spacing: -0.01em;
            }

            .input-group input,
            .input-group select,
            .rate-fields input,
            #customStartDate,
            #customEndDate {
                background: rgba(255, 252, 246, 0.92) !important;
                border: 1px solid var(--line) !important;
                border-radius: 12px !important;
                color: var(--ink);
                box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.78);
                outline: none;
            }

            .input-group input:focus,
            .input-group select:focus,
            #customStartDate:focus,
            #customEndDate:focus {
                border-color: rgba(216, 169, 79, 0.78) !important;
                box-shadow: 0 0 0 4px rgba(216, 169, 79, 0.18);
            }

            .btn-primary,
            .week-navigation button {
                background: linear-gradient(
                    135deg,
                    var(--clay-800),
                    var(--clay-600)
                );
                color: #fffaf1;
                box-shadow: 0 12px 24px rgba(76, 55, 37, 0.2);
            }

            .btn-secondary,
            .date-picker-nav button {
                background: #efe4d2;
                color: var(--clay-900);
            }

            .btn-success {
                background: linear-gradient(135deg, #2f855f, var(--green));
            }

            .btn-delete,
            .btn-small-delete {
                background: linear-gradient(135deg, #b84238, var(--red));
            }

            .schedule-area {
                padding: clamp(18px, 3vw, 34px);
            }

            .week-navigation {
                background: rgba(255, 252, 246, 0.82);
                border: 1px solid rgba(255, 255, 255, 0.75);
                border-radius: var(--radius-lg);
                padding: 16px;
                box-shadow: var(--shadow-card);
                margin-bottom: 22px;
            }

            .current-week {
                color: var(--clay-900);
                font-size: clamp(17px, 2vw, 23px);
                font-weight: 800;
                letter-spacing: -0.03em;
            }

            .week-navigation label {
                color: var(--muted) !important;
                font-weight: 700;
            }

            .calendar {
                gap: 12px;
                background: transparent;
                border: none;
                border-radius: 0;
                overflow: visible;
            }

            .day-header {
                background: rgba(76, 55, 37, 0.09);
                border: 1px solid var(--line);
                border-radius: 14px;
                color: var(--clay-800);
                text-transform: uppercase;
                letter-spacing: 0.12em;
                font-size: 11px;
            }

            .day-column {
                min-height: 178px;
                background: rgba(255, 252, 246, 0.86) !important;
                border: 1px solid rgba(255, 255, 255, 0.74);
                border-radius: var(--radius-lg);
                box-shadow: var(--shadow-card);
                overflow: hidden;
            }

            .day-column > div:first-child {
                background: linear-gradient(
                    180deg,
                    rgba(255, 250, 241, 0.98),
                    rgba(246, 239, 228, 0.68)
                );
                border-bottom: 1px solid var(--line) !important;
                color: var(--clay-900) !important;
                font-weight: 800 !important;
                letter-spacing: -0.01em;
            }

            .shifts-container {
                min-height: 128px;
            }

            .shifts-container.drag-over {
                background: rgba(61, 126, 159, 0.12);
                border: 2px dashed rgba(61, 126, 159, 0.55);
                border-radius: 16px;
            }

            .shift-card {
                border-radius: 14px;
                padding: 10px 11px;
                margin-bottom: 8px;
                border: 1px solid rgba(255, 255, 255, 0.26);
                box-shadow: 0 10px 20px rgba(33, 23, 15, 0.18);
                overflow: hidden;
            }

            .shift-card::before {
                content: "";
                position: absolute;
                inset: 0;
                background: linear-gradient(
                    135deg,
                    rgba(255, 255, 255, 0.2),
                    transparent 42%
                );
                pointer-events: none;
            }

            .shift-employee,
            .shift-time {
                position: relative;
            }

            .shift-employee {
                font-size: 12px;
                letter-spacing: -0.01em;
            }

            .shift-time {
                font-size: 10px;
                text-transform: uppercase;
                letter-spacing: 0.06em;
                opacity: 0.88;
            }

            .shift-card.day-off,
            .shift-card.pending-time-off {
                color: #24190f;
            }

            .add-shift-btn {
                background: rgba(255, 250, 241, 0.72);
                border: 1px dashed rgba(132, 111, 82, 0.42);
                color: var(--clay-700);
                font-weight: 800;
            }

            .modal-overlay {
                background: rgba(33, 23, 15, 0.36);
                backdrop-filter: blur(6px);
            }

            .modal-content,
            .loading-content {
                background: rgba(255, 252, 246, 0.96);
                border: 1px solid rgba(255, 255, 255, 0.82);
                border-radius: 24px;
                box-shadow: 0 30px 80px rgba(33, 23, 15, 0.26);
            }

            .modal-header h2,
            .loading-message {
                color: var(--clay-900);
                letter-spacing: -0.03em;
            }

            .loading-overlay {
                background: rgba(33, 23, 15, 0.58);
                backdrop-filter: blur(8px);
            }

            .loading-spinner {
                border-color: rgba(132, 111, 82, 0.18);
                border-top-color: var(--gold);
            }

            .toast {
                background: rgba(255, 252, 246, 0.96);
                border: 1px solid rgba(255, 255, 255, 0.8);
                border-radius: 18px;
                box-shadow: 0 22px 46px rgba(33, 23, 15, 0.18);
            }

            .request-tabs {
                background: #efe4d2;
                border-radius: 999px;
            }

            .request-tab.active,
            .date-picker-date.selected,
            .date-chip {
                background: linear-gradient(
                    135deg,
                    var(--clay-800),
                    var(--clay-600)
                );
                color: #fffaf1;
            }

            .date-picker-date {
                border-color: var(--line);
                border-radius: 12px;
            }

            .date-picker-date:hover:not(:disabled) {
                background: #fff5df;
                border-color: rgba(216, 169, 79, 0.62);
            }

            .period-nav-btn {
                width: 48px;
                height: 48px;
                padding: 0 !important;
                border-radius: 50% !important;
                display: inline-flex;
                align-items: center;
                justify-content: center;
            }

            .period-nav-btn svg {
                width: 22px;
                height: 22px;
            }

            .period-nav-btn:focus-visible {
                outline: 3px solid rgba(216, 169, 79, 0.44);
                outline-offset: 3px;
            }

            .toolbar {
                gap: 12px;
            }

            .toolbar-group {
                display: inline-flex;
                flex-direction: row;
                align-items: center;
                gap: 8px;
                min-width: 0;
            }

            .toolbar-btn {
                width: auto;
                min-width: max-content;
                min-height: 36px;
                padding: 8px 13px;
                display: inline-flex;
                flex: 0 0 auto;
                align-items: center;
                justify-content: center;
                gap: 7px;
                white-space: nowrap;
                line-height: 1;
                font-size: 14px;
                letter-spacing: -0.01em;
            }

            .toolbar-btn svg {
                width: 18px;
                height: 18px;
                flex: 0 0 18px;
                display: block;
            }

            .save-status {
                min-height: 36px;
                display: inline-flex;
                flex: 0 0 auto;
                align-items: center;
                justify-content: center;
                white-space: nowrap;
                line-height: 1;
            }

            @media (max-width: 1024px) {
                .sidebar {
                    border-right: none;
                    border-bottom: 1px solid var(--line);
                }
            }

            @media (max-width: 768px) {
                body {
                    padding: 8px;
                }

                .container {
                    border-radius: 22px;
                }

                .header {
                    padding: 28px 18px 22px;
                }

                .toolbar {
                    align-items: stretch;
                }

                .toolbar-group {
                    flex-direction: column;
                }

                .toolbar-btn,
                .save-status {
                    width: 100%;
                }

                .week-navigation {
                    padding: 14px;
                }

                .period-nav-btn {
                    width: 100% !important;
                    border-radius: 999px !important;
                }

                #employeeFilterList {
                    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
                }

                .calendar {
                    grid-template-columns: repeat(2, minmax(0, 1fr));
                    gap: 10px;
                    overflow: visible;
                }

                .day-column {
                    min-height: 168px;
                }

                .shift-card {
                    padding: 11px;
                    border-radius: 13px;
                }

                .modal {
                    left: 10px !important;
                    right: 10px;
                    width: auto;
                }

                .modal-content {
                    width: auto;
                    max-height: 76vh;
                }
            }
        </style>
    </head>
    <body>
    <!-- Loading Overlay -->
    <div id="loadingOverlay" class="loading-overlay">
        <div class="loading-content">

            <div class="loading-message" id="loadingMessage">Processing...</div>
            <div class="loading-details" id="loadingDetails"></div>
        </div>
    </div>
    
        <div class="container">
            <div class="header">

            </div>

                            viewBox="0 0 24 24"
                            stroke-width="2"
                            stroke="currentColor"
                        >
                            <path
                                stroke-linecap="round"
                                stroke-linejoin="round"
                                d="M19.5 14.25v-2.625a3.375 3.375 0 0 0-3.375-3.375h-1.5A1.125 1.125 0 0 1 13.5 7.125v-1.5a3.375 3.375 0 0 0-3.375-3.375H8.25m0 12.75h7.5m-7.5 3H12M10.5 2.25H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 0 0-9-9Z"
                            />
                        </svg>
                        PDF
                    </button>
                    <button

                        class="toolbar-btn toolbar-btn-primary"
                    >
                        <svg
                            xmlns="http://www.w3.org/2000/svg"
                            fill="none"
                            viewBox="0 0 24 24"
                            stroke-width="2"
                            stroke="currentColor"
                        >
                            <path
                                stroke-linecap="round"
                                stroke-linejoin="round"
                                d="M3 16.5v2.25A2.25 2.25 0 0 0 5.25 21h13.5A2.25 2.25 0 0 0 21 18.75V16.5M16.5 12 12 16.5m0 0L7.5 12m4.5 4.5V3"
                            />
                        </svg>
                        Export

                            stroke="currentColor"
                        >
                            <path
                                stroke-linecap="round"
                                stroke-linejoin="round"
                                d="M3 16.5v2.25A2.25 2.25 0 0 0 5.25 21h13.5A2.25 2.25 0 0 0 21 18.75V16.5m-13.5-9L12 3m0 0 4.5 4.5M12 3v13.5"
                            />
                        </svg>
                        Import
                    </button>
                </div>
            </div>

            <div class="main-content">
                <div class="sidebar">
                    <!-- Day Off Toggle (standalone) -->
                    <div class="section">
                        <label class="sidebar-toggle">
                            <input
                                type="checkbox"

                    </div>

                    <!-- Employees Drawer -->

                        >

                                <svg
                                    xmlns="http://www.w3.org/2000/svg"
                                    fill="none"
                                    viewBox="0 0 24 24"
                                    stroke-width="2"
                                    stroke="currentColor"
                                    style="width: 16px; height: 16px"
                                    aria-hidden="true"
                                >
                                    <path
                                        stroke-linecap="round"
                                        stroke-linejoin="round"
                                        d="M15 19.128a9.38 9.38 0 0 0 2.625.372 9.337 9.337 0 0 0 4.121-.952 4.125 4.125 0 0 0-7.533-2.493M15 19.128v-.003c0-1.113-.285-2.16-.786-3.07M15 19.128v.106A12.318 12.318 0 0 1 8.624 21c-2.331 0-4.512-.645-6.374-1.766l-.001-.109a6.375 6.375 0 0 1 11.964-3.07M12 6.375a3.375 3.375 0 1 1-6.75 0 3.375 3.375 0 0 1 6.75 0Zm8.25 2.25a2.625 2.625 0 1 1-5.25 0 2.625 2.625 0 0 1 5.25 0Z"

                            <h3>
                                <svg
                                    xmlns="http://www.w3.org/2000/svg"
                                    fill="none"
                                    viewBox="0 0 24 24"
                                    stroke-width="2"
                                    stroke="currentColor"
                                    style="width: 16px; height: 16px"
                                    aria-hidden="true"
                                >
                                    <path
                                        stroke-linecap="round"
                                        stroke-linejoin="round"
                                        d="M12 3c2.755 0 5.455.232 8.083.678.533.09.917.556.917 1.096v1.044a2.25 2.25 0 0 1-.659 1.591l-5.432 5.432a2.25 2.25 0 0 0-.659 1.591v2.927a2.25 2.25 0 0 1-1.244 2.013L9.75 21v-6.568a2.25 2.25 0 0 0-.659-1.591L3.659 7.409A2.25 2.25 0 0 1 3 5.818V4.774c0-.54.384-1.006.917-1.096A48.32 48.32 0 0 1 12 3Z"
                                    />
                                </svg>
                                Filter by Employee

                                class="drawer-toggle"
                                id="filterDrawerToggle"

                                >▼</span

                        </div>
                        <div class="drawer-content" id="filterDrawer">

                                    margin-bottom: 12px;

                                    gap: 8px;

                    <!-- Time-Off Requests Drawer -->

                    >
                        <div id="shiftEmployeeList"></div>
                    </div>
                </div>
                <div
                    id="dayOffToggleContainer"

                            gap: 10px;

                                vertical-align: middle;

                        align-items: center;
                        padding: 10px 12px;
                        cursor: pointer;
                        border-radius: 6px;
                        border: 1px solid #e2e8f0;
                        background: #f7fafc;
                        transition: background 0.2s;
                        margin-bottom: 12px;
                    "
                    onclick="document.getElementById('isClosedForBusiness').click()"
                    onmouseenter="this.style.background = '#edf2f7'"
                    onmouseleave="this.style.background = '#f7fafc'"
                >
                    <div
                        style="
                            display: flex;
                            flex-direction: row;
                            align-items: center;
                            gap: 10px;
                        "
                    >
                        <input
                            type="checkbox"
                            id="isClosedForBusiness"
                            onchange="toggleClosedForBusinessMode()"
                            onclick="event.stopPropagation()"
                            style="
                                width: 18px;
                                height: 18px;
                                margin: 0;
                                padding: 0;
                                cursor: pointer;
                                vertical-align: middle;
                            "
                        />
                        <span
                            style="
                                font-size: 14px;
                                font-weight: 500;
                                line-height: 1;
                                vertical-align: middle;
                            "
                            >Closed for Business</span
                        >
                    </div>

        <script>
            // VERSION: 2025-12-30-v3 - FIXED RENDERING
            console.log("Schedule App Version: 2025-12-30-v3");

            // Loading overlay functions
            function showLoading(message, details = "") {
                const overlay = document.getElementById("loadingOverlay");
                const messageEl = document.getElementById("loadingMessage");
                const detailsEl = document.getElementById("loadingDetails");

                messageEl.textContent = message;
                detailsEl.textContent = details;
                overlay.classList.add("active");
            }

            function hideLoading() {
                const overlay = document.getElementById("loadingOverlay");
                overlay.classList.remove("active");
            }

            function updateLoadingDetails(details) {
                const detailsEl = document.getElementById("loadingDetails");
                detailsEl.textContent = details;
            }

            // Toast notification system
            function showToast(title, message, type = "success") {
                // Remove any existing toasts
                const existingToasts = document.querySelectorAll(".toast");
                existingToasts.forEach((toast) => toast.remove());

                // Create new toast
                const toast = document.createElement("div");
                toast.className = `toast ${type}`;

                const icon =
                    type === "success" ? "✅" : type === "error" ? "❌" : "ℹ️";

                toast.innerHTML = `
                <div class="toast-icon">${icon}</div>
                <div class="toast-content">
                    <div class="toast-title">${title}</div>
                    ${message ? `<div class="toast-message">${message}</div>` : ""}
                </div>
            `;

                document.body.appendChild(toast);

                // Trigger animation
                setTimeout(() => toast.classList.add("show"), 10);

                // Auto-dismiss after 3 seconds
                setTimeout(() => {
                    toast.classList.remove("show");
                    setTimeout(() => toast.remove(), 300);
                }, 3000);
            }

            let employees = [];
            let shifts = [];
            let closedDays = [];
            let currentStartDate = new Date();
            let currentEndDate = new Date();
            let selectedDay = null;
            let editingShiftId = null;
            let draggedShiftId = null;
            let editingEmployeeId = null;
            let tempRates = [];
            let selectedEmployees = new Set(); // Track which employees are selected for filtering
            let undoStack = [];
            let maxUndoSteps = 20;
            let showDayOffs = true; // Track whether to show days off

            // Multi-date picker for Add Shift modal
            let selectedShiftDates = [];
            let shiftPickerMonth = new Date();

            // Initialize to today and 35 days from today
            currentStartDate.setHours(0, 0, 0, 0);
            currentEndDate.setHours(0, 0, 0, 0);
            currentEndDate.setDate(currentEndDate.getDate() + 34); // 35 days total (0-34)

            // Auto-save system with debouncing
            let autoSaveTimeout = null;
            let isSaving = false;
            const AUTO_SAVE_DELAY = 1500; // Wait 1.5 seconds after last change before saving

            function autoSave() {
                // Clear any pending auto-save
                if (autoSaveTimeout) {
                    clearTimeout(autoSaveTimeout);
                }

                // Update status to show pending save
                updateSaveStatus("pending");

                // Debounce: wait for user to stop making changes
                autoSaveTimeout = setTimeout(() => {
                    performAutoSave();
                }, AUTO_SAVE_DELAY);
            }

            function updateEmployeeDisplayOrder() {
                employees.forEach((employee, index) => {
                    employee.displayOrder = index;
                });
            }

            function performAutoSave() {
                if (isSaving) {
                    // If already saving, queue another save
                    autoSaveTimeout = setTimeout(() => performAutoSave(), 500);
                    return;
                }

                isSaving = true;
                updateSaveStatus("saving");
                updateEmployeeDisplayOrder();

                const data = {
                    employees: employees,
                    shifts: shifts,
                    closedDays: closedDays,
                };

                // Send to Wix parent page
                window.parent.postMessage(
                    {
                        action: "SYNC_TO_DATABASE",
                        data: data,
                    },
                    "*",
                );
            }

            function saveImmediately() {
                if (autoSaveTimeout) {
                    clearTimeout(autoSaveTimeout);
                    autoSaveTimeout = null;
                }
                performAutoSave();
            }

            function updateSaveStatus(status) {
                const statusEl = document.getElementById("saveStatus");
                if (!statusEl) return;

                switch (status) {
                    case "pending":
                        statusEl.innerHTML =
                            '<span style="color: #718096;">●</span> Unsaved changes';
                        statusEl.style.color = "#718096";
                        break;
                    case "saving":
                        statusEl.innerHTML =
                            '<span style="color: #ECC94B;">●</span> Saving...';
                        statusEl.style.color = "#ECC94B";
                        break;
                    case "saved":
                        statusEl.innerHTML =
                            '<span style="color: #48BB78;">●</span> Saved';
                        statusEl.style.color = "#48BB78";
                        break;
                    case "error":
                        statusEl.innerHTML =
                            '<span style="color: #F56565;">●</span> Save failed';
                        statusEl.style.color = "#F56565";
                        break;
                }
            }

            // Undo system
            function saveState() {
                const state = {
                    employees: JSON.parse(JSON.stringify(employees)),
                    shifts: JSON.parse(JSON.stringify(shifts)),
                    closedDays: JSON.parse(JSON.stringify(closedDays)),
                };
                undoStack.push(state);
                if (undoStack.length > maxUndoSteps) {
                    undoStack.shift(); // Remove oldest state
                }
                updateUndoButton();
            }

            function undo() {
                if (undoStack.length === 0) return;

                const previousState = undoStack.pop();
                employees = previousState.employees;
                shifts = previousState.shifts;
                closedDays = normalizeClosedDays(previousState.closedDays || []);

                // Rebuild selectedEmployees set
                selectedEmployees.clear();
                employees.forEach((emp) => selectedEmployees.add(emp.id));

                renderEmployees();
                updateEmployeeSelect();
                renderEmployeeFilter();
                renderCalendar();
                updateUndoButton();

                // Trigger auto-save after undo
                autoSave();
            }

            function updateUndoButton() {
                const btn = document.getElementById("undoButton");
                if (btn) {
                    btn.disabled = undoStack.length === 0;
                    btn.style.opacity = undoStack.length === 0 ? "0.5" : "1";
                    btn.style.cursor =
                        undoStack.length === 0 ? "not-allowed" : "pointer";
                }
            }

            // LocalStorage functions
            // Wix Integration - Message passing functions
            function sendToWix(action, data) {
                window.parent.postMessage(
                    {
                        action: action,
                        data: data,
                    },
                    "*",
                );
            }

            function deleteShiftFromWix(shift) {
                if (!shift || !shift.wixId) return;

                sendToWix("DELETE_SHIFT", {
                    wixId: shift.wixId,
                });
            }

            function deleteShiftsForDatesFromWix(dates) {
                if (!dates || dates.length === 0) return;

                sendToWix("DELETE_SHIFTS_FOR_DATES", {
                    dates: dates,
                });
            }

            function normalizeClosedDays(days) {
                return [
                    ...new Set(
                        (days || [])
                            .map((day) => {
                                if (!day) return null;
                                if (day instanceof Date) return formatDate(day);
                                const value = String(day);
                                return value.includes("T")
                                    ? value.split("T")[0]
                                    : value;
                            })
                            .filter(Boolean),
                    ),
                ].sort();
            }

            function isClosedDate(dateStr) {
                return closedDays.includes(dateStr);
            }

            function reopenBusinessDay(dateStr) {
                if (!isClosedDate(dateStr)) return;

                saveState();
                closedDays = closedDays.filter((day) => day !== dateStr);
                saveData();
                renderCalendar();
                showToast("Business Day Reopened", dateStr, "success");
            }

            function saveData() {
                autoSave();
            }

            // Floating modal positioning
            let lastClickEvent = null;

            document.addEventListener(
                "click",
                function (e) {
                    lastClickEvent = e;
                },
                true,
            );

            function openFloatingModal(modalId) {
                const modal = document.getElementById(modalId);
                const overlay = document.getElementById("modalOverlay");

                if (!modal || !lastClickEvent) return;

                // Show overlay
                overlay.classList.add("active");

                // Get click position
                const clickX = lastClickEvent.pageX;
                const clickY = lastClickEvent.pageY;

                // Get viewport dimensions
                const viewportWidth = window.innerWidth;
                const modalWidth = 500; // Match CSS .modal-content width

                // Calculate horizontal position - try to center on click, but keep in bounds
                let left = clickX - modalWidth / 2;
                left = Math.max(
                    10,
                    Math.min(left, viewportWidth - modalWidth - 10),
                );

                // Position vertically above the click point
                let top = clickY - 150;

                // Apply position
                modal.style.left = left + "px";
                modal.style.top = top + "px";

                // Show modal
                modal.classList.add("active");
            }

            function closeAllModals() {
                document.querySelectorAll(".modal").forEach((modal) => {
                    modal.classList.remove("active");
                });
                document
                    .getElementById("modalOverlay")
                    .classList.remove("active");

                // Reset state variables
                selectedDay = null;
                editingShiftId = null;
                editingEmployeeId = null;
                tempRates = [];
            }

            // Listen for messages from Wix
            window.addEventListener("message", function (event) {
                if (event.data && event.data.action) {
                    handleWixMessage(event.data);
                }
            });

            function handleWixMessage(message) {
                switch (message.action) {
                    case "LOAD_DATA":
                        employees = message.employees || [];
                        shifts = message.shifts || [];
                        closedDays = normalizeClosedDays(message.closedDays || []);
                        selectedEmployees = new Set(employees.map((e) => e.id));
                        renderEmployees();
                        updateEmployeeSelect();
                        renderEmployeeFilter();
                        renderCalendar();
                        break;

                    case "ERROR":
                        console.error("Wix error:", message.message);
                        alert("Error: " + message.message);
                        break;
                }
            }

            function exportData() {
                const data = {
                    employees: employees,
                    shifts: shifts,
                    closedDays: closedDays,
                    exportDate: new Date().toISOString(),
                };
                const dataStr = JSON.stringify(data, null, 2);
                const dataBlob = new Blob([dataStr], {
                    type: "application/json",
                });

                // Get current date and time in EST
                const now = new Date();
                const estTime = new Date(
                    now.toLocaleString("en-US", {
                        timeZone: "America/New_York",
                    }),
                );

                const year = estTime.getFullYear();
                const month = String(estTime.getMonth() + 1).padStart(2, "0");
                const day = String(estTime.getDate()).padStart(2, "0");
                const hours = String(estTime.getHours()).padStart(2, "0");
                const minutes = String(estTime.getMinutes()).padStart(2, "0");
                const seconds = String(estTime.getSeconds()).padStart(2, "0");

                const timestamp = `${hours}${minutes}${seconds}`;
                const filename = `schedule-backup-${year}-${month}-${day}-${timestamp}.json`;

                const url = URL.createObjectURL(dataBlob);
                const link = document.createElement("a");
                link.href = url;
                link.download = filename;
                link.click();
                URL.revokeObjectURL(url);

                showToast(
                    "Exported Successfully",
                    `${employees.length} employees, ${shifts.length} shifts`,
                    "success",
                );
            }

            function importData() {
                const input = document.createElement("input");
                input.type = "file";
                input.accept = "application/json";
                input.onchange = (e) => {
                    const file = e.target.files[0];
                    if (file) {
                        showLoading(
                            "Importing Data...",
                            `Reading ${file.name}...`,
                        );

                        const reader = new FileReader();
                        reader.onload = (event) => {
                            try {
                                const data = JSON.parse(event.target.result);
                                if (
                                    confirm(
                                        "This will replace all current data. Continue?",
                                    )
                                ) {
                                    updateLoadingDetails(
                                        "Processing employees...",
                                    );

                                    employees = data.employees || [];
                                    shifts = data.shifts || [];
                                    closedDays = normalizeClosedDays(
                                        data.closedDays || [],
                                    );

                                    // Ensure all employees have required fields
                                    employees.forEach((emp) => {
                                        if (emp.archived === undefined) {
                                            emp.archived = false;
                                        }
                                        if (!emp.rates) {
                                            emp.rates = [];
                                        }
                                        if (!emp.color) {
                                            emp.color = "#7F6C50";
                                        }
                                    });

                                    updateLoadingDetails(
                                        "Validating shifts...",
                                    );

                                    // Validate shifts - make sure all shifts reference valid employees
                                    const validEmployeeIds = new Set(
                                        employees.map((e) => e.id),
                                    );
                                    const invalidShifts = shifts.filter(
                                        (s) =>
                                            !validEmployeeIds.has(s.employeeId),
                                    );

                                    if (invalidShifts.length > 0) {
                                        console.warn(
                                            `Found ${invalidShifts.length} shifts with invalid employee references`,
                                        );
                                        shifts = shifts.filter((s) =>
                                            validEmployeeIds.has(s.employeeId),
                                        );
                                    }

                                    shifts = shifts.filter(
                                        (s) => !isClosedDate(s.date),
                                    );

                                    // Ensure all shifts have required fields
                                    shifts.forEach((shift) => {
                                        const employee = employees.find(
                                            (e) => e.id === shift.employeeId,
                                        );
                                        if (employee) {
                                            shift.employeeName = employee.name;
                                        }
                                        // Ensure isDayOff field exists
                                        if (shift.isDayOff === undefined) {
                                            shift.isDayOff = false;
                                        }
                                    });

                                    selectedEmployees = new Set(
                                        employees.map((e) => e.id),
                                    );

                                    updateLoadingDetails("Saving data...");

                                    // Save to localStorage
                                    saveData();

                                    updateLoadingDetails(
                                        "Rendering calendar...",
                                    );

                                    // Small delay to ensure DOM is ready
                                    setTimeout(() => {
                                        try {
                                            renderEmployees();
                                            updateEmployeeSelect();
                                            renderEmployeeFilter();
                                            renderCalendar();
                                            renderTimeOffDrawer();

                                            hideLoading();

                                            if (invalidShifts.length > 0) {
                                                showToast(
                                                    "Data Imported",
                                                    `${employees.length} employees, ${shifts.length} shifts (${invalidShifts.length} invalid shifts skipped)`,
                                                    "info",
                                                );
                                            } else {
                                                showToast(
                                                    "Data Imported Successfully",
                                                    `${employees.length} employees, ${shifts.length} shifts`,
                                                    "success",
                                                );
                                            }
                                        } catch (renderError) {
                                            console.error(
                                                "Render error:",
                                                renderError,
                                            );
                                            hideLoading();
                                            showToast(
                                                "Import Error",
                                                "Data imported but there was an error displaying it",
                                                "error",
                                            );
                                        }
                                    }, 100);
                                } else {
                                    hideLoading();
                                }
                            } catch (error) {
                                console.error("Import error:", error);
                                hideLoading();
                                showToast(
                                    "Import Failed",
                                    error.message,
                                    "error",
                                );
                            }
                        };
                        reader.readAsText(file);
                    }
                };
                input.click();
            }

            function clearAllData() {
                if (
                    confirm(
                        "Are you sure you want to delete ALL data? This cannot be undone.",
                    )
                ) {
                    if (
                        confirm(
                            "Really sure? This will delete all employees and shifts permanently.",
                        )
                    ) {
                        employees = [];
                        shifts = [];
                        closedDays = [];
                        selectedEmployees.clear();
                        localStorage.removeItem("shiftSchedulerData");
                        renderEmployees();
                        updateEmployeeSelect();
                        renderEmployeeFilter();
                        renderCalendar();
                        alert("All data cleared.");
                    }
                }
            }

            function exportToPDF() {
                // Wait for jsPDF to load
                if (typeof window.jspdf === "undefined") {
                    alert(
                        "PDF library is loading, please try again in a moment...",
                    );
                    return;
                }

                const { jsPDF } = window.jspdf;
                const doc = new jsPDF("l", "mm", "a4"); // landscape orientation

                // Add title with better styling
                doc.setFontSize(18);
                doc.setFont("helvetica", "bold");
                doc.text("Mad Potter Schedule", 148, 15, { align: "center" });
                doc.setTextColor(0, 0, 0);

                // Organize data by weeks
                const dayCount = getDayCount();
                const weeks = [];

                for (let weekStart = 0; weekStart < dayCount; weekStart += 7) {
                    const weekDays = [];
                    const weekDates = [];

                    for (let i = 0; i < 7 && weekStart + i < dayCount; i++) {
                        const date = new Date(currentStartDate);
                        date.setDate(date.getDate() + weekStart + i);
                        weekDays.push(
                            date.toLocaleDateString("en-US", {
                                weekday: "short",
                            }),
                        );
                        weekDates.push(date);
                    }

                    weeks.push({ weekDays, weekDates, weekStart });
                }

                let yPosition = 25;

                // Calculate uniform column width
                // Total page width minus margins: 297mm - 28mm (14mm each side) = 269mm
                // Divide by 8 columns (1 name + 7 days)
                const columnWidth = 269 / 8;

                // Process each week
                weeks.forEach((week, weekIndex) => {
                    // Add page break before each table except the first one
                    if (weekIndex > 0) {
                        doc.addPage();
                        yPosition = 15;
                    }

                    // Prepare table data
                    const tableData = [];

                    // Filter employees based on current filter
                    // If no employees selected, show none
                    const displayEmployees = employees.filter((emp) =>
                        selectedEmployees.has(emp.id),
                    );

                    displayEmployees.forEach((emp) => {
                        const row = [emp.name];

                        // Add shift info for each day of the week
                        week.weekDates.forEach((date) => {
                            const dateStr = formatDate(date);
                            if (isClosedDate(dateStr)) {
                                row.push("CLOSED");
                                return;
                            }

                            const dayShifts = shifts.filter(
                                (s) =>
                                    s.date === dateStr &&
                                    s.employeeId === emp.id,
                            );

                            if (dayShifts.length > 0) {
                                // Combine multiple shifts on same day
                                const shiftTexts = dayShifts.map((shift) => {
                                    if (shift.isDayOff) {
                                        return "OFF";
                                    }
                                    if (shift.isTimeOffRequest) {
                                        return shift.requestStatus === "pending"
                                            ? "PENDING"
                                            : "OFF";
                                    }
                                    return `${formatTime12Hour(shift.startTime)} - ${formatTime12Hour(shift.endTime)}`;
                                });
                                row.push(shiftTexts.join(", "));
                            } else {
                                row.push("—");
                            }
                        });

                        tableData.push(row);
                    });

                    // Create week header with dates - make "Week of" dynamic
                    const firstDate = week.weekDates[0];
                    const lastDate = week.weekDates[week.weekDates.length - 1];
                    const weekOfText = `Week of\n${firstDate.toLocaleDateString("en-US", { month: "short", day: "numeric" })} - ${lastDate.toLocaleDateString("en-US", { month: "short", day: "numeric" })}`;

                    const weekHeader = [
                        weekOfText,
                        ...week.weekDays.map((day, idx) => {
                            const date = week.weekDates[idx];
                            return `${day}\n${date.getMonth() + 1}/${date.getDate()}`;
                        }),
                    ];

                    // Create column styles with uniform widths
                    const columnStyles = {};
                    for (let i = 0; i < 8; i++) {
                        columnStyles[i] = {
                            cellWidth: columnWidth,
                            halign: "center",
                            valign: "middle",
                            overflow: "linebreak",
                            cellPadding: {
                                top: 4,
                                right: 2,
                                bottom: 4,
                                left: 2,
                            },
                        };
                        if (i === 0) {
                            columnStyles[i].fontStyle = "bold";
                            columnStyles[i].fillColor = [245, 247, 250];
                            columnStyles[i].fontSize = 9;
                        }
                    }

                    // Draw table with professional styling
                    doc.autoTable({
                        startY: yPosition,
                        head: [weekHeader],
                        body: tableData,
                        theme: "striped",
                        styles: {
                            fontSize: 9,
                            cellPadding: {
                                top: 4,
                                right: 2,
                                bottom: 4,
                                left: 2,
                            },
                            lineColor: [200, 200, 200],
                            lineWidth: 0.1,
                            font: "helvetica",
                            overflow: "linebreak",
                            cellWidth: "wrap",
                            halign: "center",
                            valign: "middle",
                        },
                        headStyles: {
                            fillColor: [110, 95, 74],
                            textColor: [255, 255, 255],
                            fontStyle: "bold",
                            halign: "center",
                            valign: "middle",
                            fontSize: 9,
                            cellPadding: 4,
                        },
                        columnStyles: columnStyles,
                        alternateRowStyles: {
                            fillColor: [250, 250, 252],
                        },
                        bodyStyles: {
                            valign: "middle",
                            halign: "center",
                        },
                        margin: { left: 14, right: 14 },
                    });

                    yPosition = doc.lastAutoTable.finalY + 12;
                });

                // Add footer with page numbers
                const pageCount = doc.internal.getNumberOfPages();
                doc.setFontSize(8);
                doc.setTextColor(150, 150, 150);
                for (let i = 1; i <= pageCount; i++) {
                    doc.setPage(i);
                    doc.text(`Page ${i} of ${pageCount}`, 148, 200, {
                        align: "center",
                    });
                }

                // Save the PDF
                const monthNames = [
                    "jan",
                    "feb",
                    "mar",
                    "apr",
                    "may",
                    "jun",
                    "jul",
                    "aug",
                    "sep",
                    "oct",
                    "nov",
                    "dec",
                ];
                const startMonth = monthNames[currentStartDate.getMonth()];
                const startDay = currentStartDate.getDate();
                const endMonth = monthNames[currentEndDate.getMonth()];
                const endDay = currentEndDate.getDate();

                const filename = `schedule-${startMonth}-${startDay}-${endMonth}-${endDay}.pdf`;
                doc.save(filename);
            }
