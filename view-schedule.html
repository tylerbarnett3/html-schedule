<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
        />
        <meta name="apple-mobile-web-app-capable" content="yes" />
        <meta
            name="apple-mobile-web-app-status-bar-style"
            content="black-translucent"
        />
        <title>Employee Schedule - View Only</title>
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            html,
            body {
                overflow: visible;
                height: auto;
            }

            body {
                font-family:
                    -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                    Oxygen, Ubuntu, Cantarell, sans-serif;
                min-height: 100vh;
                -webkit-text-size-adjust: 100%;
            }

            .container {
                max-width: 1400px;
                margin: 0 auto;
            }

            .header {
                color: white;
                text-align: center;
            }

            .main-content {
                display: grid;
                grid-template-columns: 280px 1fr;
            }

            .section {
                margin-bottom: 16px;
            }

            .drawer-header,
            .sidebar-toggle,
            .filter-checkbox-item,
            .btn,
            .date-chip,
            .date-chip-remove {
                display: flex;
                align-items: center;
            }

            .drawer-header {
                justify-content: space-between;
                cursor: pointer;
            }

            .drawer-header h2 {
                margin: 0;
                color: white;
                font-size: 14px;
            }

            .drawer-toggle {
                transition: transform 0.3s;
            }

            .drawer-toggle.open {
                transform: rotate(180deg);
            }

            .drawer-content {
                max-height: 0;
                overflow: hidden;
                padding: 0;
                transition: max-height 0.3s ease-out;
            }

            .drawer-content.open {
                max-height: 2000px;
                padding: 14px;
                transition: max-height 0.5s ease-in;
            }

            .sidebar-toggle,
            .filter-checkbox-item {
                cursor: pointer;
                padding: 12px 14px;
            }

            .sidebar-toggle input[type="checkbox"],
            .filter-checkbox-item input[type="checkbox"] {
                width: 18px;
                height: 18px;
                margin: 0 10px 0 0;
                cursor: pointer;
                accent-color: #6b5a42;
            }

            .sidebar-toggle .toggle-label,
            .filter-checkbox-item label {
                flex: 1;
                font-size: 13px;
                font-weight: 600;
                cursor: pointer;
            }

            .filter-checkbox-item {
                margin-bottom: 6px;
            }

            .btn,
            .nav-button,
            .date-picker-nav button,
            .date-picker-date,
            .shift-cancel,
            .date-chip-remove {
                border: none;
                cursor: pointer;
                font-weight: 600;
                -webkit-tap-highlight-color: transparent;
            }

            .btn {
                width: 100%;
                justify-content: center;
                gap: 6px;
                padding: 10px 14px;
                font-size: 13px;
            }

            .week-navigation {
                display: flex;
                justify-content: space-between;
                align-items: center;
            }

            .current-week {
                font-weight: 600;
            }

            .calendar {
                display: grid;
                grid-template-columns: repeat(7, 1fr);
            }

            .day-column {
                display: flex;
                flex-direction: column;
                min-height: 120px;
            }

            .day-column .date-header,
            .day-header {
                padding: 8px;
                font-weight: 600;
            }

            .day-header {
                text-align: center;
            }

            .shifts-container {
                flex: 1;
                display: flex;
                flex-direction: column;
                padding: 10px;
            }

            .shift-card {
                position: relative;
                color: white;
            }

            .shift-employee {
                font-weight: 600;
                margin-bottom: 4px;
            }

            .shift-time,
            .shift-cancel {
                font-size: 10px;
            }

            .shift-cancel {
                margin-top: 6px;
                padding: 4px 8px;
                color: white;
            }

            .empty-state {
                text-align: center;
                padding: 30px 20px;
                font-size: 13px;
                font-style: italic;
            }

            .closed-day-message {
                flex: 1;
                display: flex;
                align-items: center;
                justify-content: center;
                min-height: 160px;
                padding: 18px 10px;
                border-radius: 12px;
                background: linear-gradient(135deg, #8fae8b 0%, #6f906b 100%);
                color: white;
                text-align: center;
                font-size: 20px;
                font-weight: 800;
                letter-spacing: 0.12em;
                line-height: 1.45;
            }

            .loading-overlay,
            .modal-overlay,
            .modal {
                display: none;
            }

            .loading-overlay,
            .modal-overlay {
                position: fixed;
                inset: 0;
            }

            .loading-overlay {
                z-index: 10000;
                justify-content: flex-start;
                align-items: center;
                flex-direction: column;
                padding-top: 60px;
            }

            .loading-overlay.active {
                display: flex;
            }

            .loading-content {
                min-width: 300px;
                padding: 40px;
                text-align: center;
            }

            .loading-spinner {
                width: 50px;
                height: 50px;
                border: 5px solid transparent;
                border-radius: 50%;
                animation: spin 1s linear infinite;
                margin: 0 auto 20px;
            }

            @keyframes spin {
                to {
                    transform: rotate(360deg);
                }
            }

            .modal-overlay {
                z-index: 999;
            }

            .modal-overlay.active {
                display: block;
            }

            .modal {
                position: absolute;
                z-index: 1000;
            }

            .modal.active {
                display: block;
            }

            .modal-content {
                width: 500px;
                max-height: 70vh;
                padding: 25px;
                overflow-y: auto;
                -webkit-overflow-scrolling: touch;
            }

            .modal-header {
                margin-bottom: 20px;
            }

            .modal-actions,
            .date-picker-nav,
            .selected-dates-chips {
                display: flex;
                gap: 10px;
            }

            .modal-actions {
                margin-top: 20px;
            }

            .input-group {
                margin-bottom: 15px;
            }

            .input-group label {
                display: block;
                margin-bottom: 5px;
            }

            .input-group select {
                width: 100%;
                padding: 10px;
                font-size: 14px;
            }

            .date-picker-nav {
                justify-content: space-between;
                align-items: center;
                margin-bottom: 15px;
            }

            .request-month-nav {
                gap: 12px;
                min-height: 54px;
                padding-top: 14px;
            }

            .request-month-label {
                flex: 1;
                color: #2d3748;
                font-weight: 800;
                text-align: center;
            }

            .date-picker-nav button {
                padding: 8px 16px;
            }

            .date-picker-nav-icon {
                width: 44px;
                height: 44px;
                flex: 0 0 44px;
                display: inline-flex;
                align-items: center;
                justify-content: center;
                padding: 0 !important;
                border-radius: 999px !important;
            }

            .date-picker-nav-icon svg {
                width: 22px;
                height: 22px;
            }

            .date-picker-grid {
                display: grid;
                grid-template-columns: repeat(7, 1fr);
                gap: 4px;
                margin-bottom: 15px;
            }

            .date-picker-day-header,
            .date-picker-date {
                display: flex;
                align-items: center;
                justify-content: center;
            }

            .date-picker-day-header {
                padding: 8px;
                font-size: 12px;
                font-weight: 600;
            }

            .date-picker-date {
                aspect-ratio: 1;
                font-size: 14px;
            }

            .date-picker-date:disabled {
                cursor: not-allowed;
                opacity: 0.5;
            }

            .selected-dates-container {
                margin-top: 15px;
                padding: 15px;
                min-height: 60px;
            }

            .selected-dates-label {
                margin-bottom: 10px;
            }

            .selected-dates-chips {
                flex-wrap: wrap;
                gap: 8px;
            }

            .date-chip {
                gap: 8px;
                padding: 6px 12px;
                font-size: 13px;
            }

            .date-chip-remove {
                width: 20px;
                height: 20px;
                justify-content: center;
                background: transparent;
                color: white;
                font-size: 18px;
                line-height: 1;
            }

            @media (max-width: 1024px) {
                .main-content {
                    grid-template-columns: 1fr;
                }
            }

            @media (max-width: 768px) {
                .week-navigation,
                .modal-actions {
                    flex-direction: column;
                }

                .week-navigation > div,
                .week-navigation input[type="date"],
                .modal-actions .btn {
                    width: 100%;
                }

                .calendar {
                    grid-template-columns: repeat(2, 1fr);
                }

                .day-header {
                    display: none;
                }

                .day-column .date-header {
                    white-space: nowrap;
                    overflow: hidden;
                    text-overflow: ellipsis;
                }

                .modal-content {
                    width: 300px;
                    max-height: 60vh;
                }
            }

            :root {
                --clay-950: #21170f;
                --clay-900: #352619;
                --clay-800: #4c3725;
                --clay-700: #6b4f36;
                --clay-600: #846f52;
                --clay-500: #a1825d;
                --clay-200: #eadfce;
                --clay-100: #f6efe4;
                --cream: #fffaf1;
                --paper: rgba(255, 252, 246, 0.93);
                --ink: #2b2219;
                --muted: #7d6f61;
                --line: rgba(91, 65, 40, 0.14);
                --gold: #d8a94f;
                --green: #3f9a6b;
                --red: #cf5448;
                --blue: #3d7e9f;
                --shadow-soft: 0 18px 50px rgba(58, 39, 21, 0.13);
                --shadow-card: 0 10px 26px rgba(58, 39, 21, 0.1);
                --radius-xl: 28px;
                --radius-lg: 20px;
                --radius-md: 14px;
            }

            body {
                color: var(--ink);
                background:
                    radial-gradient(
                        circle at top left,
                        rgba(216, 169, 79, 0.26),
                        transparent 34rem
                    ),
                    radial-gradient(
                        circle at 92% 18%,
                        rgba(132, 111, 82, 0.24),
                        transparent 28rem
                    ),
                    linear-gradient(
                        135deg,
                        #fff9ed 0%,
                        #f4eadb 42%,
                        #eadfce 100%
                    );
                padding: 26px;
            }

            body::before {
                content: "";
                position: fixed;
                inset: 0;
                pointer-events: none;
                background-image:
                    linear-gradient(
                        rgba(255, 255, 255, 0.32) 1px,
                        transparent 1px
                    ),
                    linear-gradient(
                        90deg,
                        rgba(255, 255, 255, 0.24) 1px,
                        transparent 1px
                    );
                background-size: 38px 38px;
                mask-image: linear-gradient(
                    to bottom,
                    rgba(0, 0, 0, 0.55),
                    transparent 70%
                );
            }

            .container {
                position: relative;
                background: var(--paper);
                border: 1px solid rgba(255, 255, 255, 0.72);
                border-radius: var(--radius-xl);
                box-shadow: var(--shadow-soft);
                overflow: hidden;
                backdrop-filter: blur(16px);
            }

            .header {
                position: relative;
                overflow: hidden;
                background:
                    linear-gradient(
                        135deg,
                        rgba(33, 23, 15, 0.94),
                        rgba(76, 55, 37, 0.92)
                    ),
                    radial-gradient(
                        circle at 22% 20%,
                        rgba(216, 169, 79, 0.52),
                        transparent 22rem
                    );
                padding: 38px 32px 32px;
            }

            .header::before {
                content: "";
                position: absolute;
                inset: auto -8% -80% -8%;
                height: 170px;
                background: radial-gradient(
                    ellipse at center,
                    rgba(255, 250, 241, 0.22),
                    transparent 68%
                );
            }

            .header h1,
            .header p,
            .header button {
                position: relative;
            }

            .header h1 {
                font-size: clamp(28px, 4vw, 48px);
                line-height: 1;
                letter-spacing: -0.04em;
                margin-bottom: 10px;
                text-shadow: 0 8px 28px rgba(0, 0, 0, 0.28);
            }

            .header p {
                max-width: 620px;
                margin: 0 auto;
                color: rgba(255, 250, 241, 0.76);
                font-size: 15px;
                line-height: 1.5;
            }

            .header button {
                margin-top: 20px !important;
                padding: 12px 22px !important;
                background: linear-gradient(
                    135deg,
                    var(--gold),
                    #f0c86d
                ) !important;
                color: var(--clay-950) !important;
                border: 1px solid rgba(255, 255, 255, 0.35) !important;
                border-radius: 999px !important;
                box-shadow: 0 14px 28px rgba(0, 0, 0, 0.22) !important;
                letter-spacing: -0.01em;
                transition:
                    transform 0.18s ease,
                    box-shadow 0.18s ease !important;
            }

            .header button:hover {
                transform: translateY(-2px);
                box-shadow: 0 18px 34px rgba(0, 0, 0, 0.26) !important;
            }

            .main-content {
                background: rgba(255, 250, 241, 0.34);
            }

            .sidebar {
                background: linear-gradient(
                    180deg,
                    rgba(255, 250, 241, 0.78),
                    rgba(246, 239, 228, 0.86)
                );
                border-right: 1px solid var(--line);
                padding: 22px;
            }

            .section {
                margin-bottom: 18px;
            }

            .drawer-header,
            .sidebar-toggle {
                border: 1px solid rgba(255, 255, 255, 0.65);
                box-shadow: var(--shadow-card);
            }

            .drawer-header {
                background: linear-gradient(
                    135deg,
                    var(--clay-800),
                    var(--clay-600)
                );
                padding: 14px 16px;
                border-radius: var(--radius-md);
            }

            .drawer-header:hover {
                background: linear-gradient(
                    135deg,
                    var(--clay-900),
                    var(--clay-700)
                );
            }

            .drawer-content.open {
                background: rgba(255, 252, 246, 0.92);
                border: 1px solid var(--line);
                border-top: none;
                box-shadow: var(--shadow-card);
                border-radius: 0 0 var(--radius-md) var(--radius-md);
            }

            .sidebar-toggle,
            .filter-checkbox-item,
            .selected-dates-container,
            .input-group select {
                background: rgba(255, 252, 246, 0.82);
                border-color: var(--line);
                border-radius: var(--radius-md);
            }

            .filter-checkbox-item {
                box-shadow: 0 8px 18px rgba(58, 39, 21, 0.06);
            }

            .filter-checkbox-item:hover,
            .sidebar-toggle:hover {
                background: #fffaf1;
                border-color: rgba(132, 111, 82, 0.28);
            }

            #employeeFilterList {
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
                gap: 8px;
            }

            #employeeFilterList .filter-checkbox-item {
                min-width: 0;
                margin-bottom: 0;
            }

            #employeeFilterList .filter-checkbox-item label {
                min-width: 0;
                overflow: hidden;
                text-overflow: ellipsis;
                white-space: nowrap;
            }

            .input-group label,
            .selected-dates-label {
                color: var(--clay-800);
                font-weight: 800;
                letter-spacing: -0.01em;
            }

            .input-group select,
            #customStartDate,
            #customEndDate {
                background: rgba(255, 252, 246, 0.92) !important;
                border: 1px solid var(--line) !important;
                border-radius: 12px !important;
                color: var(--ink);
                box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.78);
                outline: none;
            }

            .input-group select:focus,
            #customStartDate:focus,
            #customEndDate:focus {
                border-color: rgba(216, 169, 79, 0.78) !important;
                box-shadow: 0 0 0 4px rgba(216, 169, 79, 0.18);
            }

            .btn,
            .nav-button,
            .date-picker-nav button,
            .shift-cancel {
                border-radius: 999px;
                transition:
                    transform 0.18s ease,
                    box-shadow 0.18s ease,
                    background 0.18s ease,
                    border-color 0.18s ease;
            }

            .btn-primary,
            .nav-button {
                background: linear-gradient(
                    135deg,
                    var(--clay-800),
                    var(--clay-600)
                ) !important;
                color: #fffaf1;
                box-shadow: 0 12px 24px rgba(76, 55, 37, 0.2);
            }

            .btn-secondary,
            .date-picker-nav button {
                background: #efe4d2;
                color: var(--clay-900);
            }

            .btn-success {
                background: linear-gradient(135deg, #2f855f, var(--green));
            }

            .btn-delete {
                background: linear-gradient(135deg, #b84238, var(--red));
            }

            .btn:hover,
            .nav-button:hover,
            .date-picker-nav button:hover,
            .shift-cancel:hover {
                transform: translateY(-2px);
            }

            .schedule-area {
                padding: clamp(18px, 3vw, 34px);
            }

            .week-navigation {
                background: rgba(255, 252, 246, 0.82);
                border: 1px solid rgba(255, 255, 255, 0.75);
                border-radius: var(--radius-lg);
                padding: 16px;
                box-shadow: var(--shadow-card);
                margin-bottom: 22px;
            }

            .current-week {
                color: var(--clay-900);
                font-size: clamp(17px, 2vw, 23px);
                font-weight: 800;
                letter-spacing: -0.03em;
            }

            .week-navigation label {
                color: var(--muted) !important;
                font-weight: 700;
            }

            .calendar {
                gap: 12px;
                background: transparent;
                border: none;
                border-radius: 0;
                overflow: visible;
            }

            .day-header {
                background: rgba(76, 55, 37, 0.09);
                border: 1px solid var(--line);
                border-radius: 14px;
                color: var(--clay-800);
                text-transform: uppercase;
                letter-spacing: 0.12em;
                font-size: 11px;
            }

            .day-column {
                min-height: 178px;
                background: rgba(255, 252, 246, 0.86) !important;
                border: 1px solid rgba(255, 255, 255, 0.74);
                border-radius: var(--radius-lg);
                box-shadow: var(--shadow-card);
                overflow: hidden;
            }

            .day-column-gray {
                background: rgba(246, 239, 228, 0.68) !important;
            }

            .day-column .date-header {
                background: linear-gradient(
                    180deg,
                    rgba(255, 250, 241, 0.98),
                    rgba(246, 239, 228, 0.68)
                );
                border-bottom: 1px solid var(--line) !important;
                color: var(--clay-900) !important;
                font-weight: 800 !important;
                letter-spacing: -0.01em;
            }

            .shifts-container {
                min-height: 128px;
            }

            .shift-card {
                border-radius: 14px;
                padding: 10px 11px;
                margin-bottom: 8px;
                border: 1px solid rgba(255, 255, 255, 0.26);
                box-shadow: 0 10px 20px rgba(33, 23, 15, 0.18);
                overflow: hidden;
            }

            .shift-card::before {
                content: "";
                position: absolute;
                inset: 0;
                background: linear-gradient(
                    135deg,
                    rgba(255, 255, 255, 0.2),
                    transparent 42%
                );
                pointer-events: none;
            }

            .shift-employee,
            .shift-time,
            .shift-cancel {
                position: relative;
            }

            .shift-employee {
                font-size: 12px;
                letter-spacing: -0.01em;
            }

            .shift-time {
                font-size: 10px;
                text-transform: uppercase;
                letter-spacing: 0.06em;
                opacity: 0.88;
            }

            .shift-card.day-off,
            .shift-card.pending-time-off {
                color: #24190f;
            }

            .shift-cancel {
                background: rgba(255, 250, 241, 0.26);
                border-color: rgba(255, 250, 241, 0.5);
                font-size: 10px;
            }

            .modal-overlay {
                background: rgba(33, 23, 15, 0.36);
                backdrop-filter: blur(6px);
            }

            .modal-content,
            .loading-content {
                background: rgba(255, 252, 246, 0.96);
                border: 1px solid rgba(255, 255, 255, 0.82);
                border-radius: 24px;
                box-shadow: 0 30px 80px rgba(33, 23, 15, 0.26);
            }

            .modal-header h2,
            .loading-message {
                color: var(--clay-900);
                letter-spacing: -0.03em;
            }

            .loading-overlay {
                background: rgba(33, 23, 15, 0.58);
                backdrop-filter: blur(8px);
            }

            .loading-spinner {
                border-color: rgba(132, 111, 82, 0.18);
                border-top-color: var(--gold);
            }

            .date-picker-date {
                border-color: var(--line);
                border-radius: 12px;
            }

            .date-picker-date:hover:not(:disabled) {
                background: #fff5df;
                border-color: rgba(216, 169, 79, 0.62);
            }

            .date-picker-date.selected,
            .date-chip {
                background: linear-gradient(
                    135deg,
                    var(--clay-800),
                    var(--clay-600)
                );
                color: #fffaf1;
            }

            .period-nav-btn {
                width: 48px;
                height: 48px;
                padding: 0 !important;
                border-radius: 50% !important;
                display: inline-flex !important;
                align-items: center;
                justify-content: center;
            }

            .period-nav-btn svg {
                width: 22px;
                height: 22px;
            }

            .period-nav-btn:focus-visible {
                outline: 3px solid rgba(216, 169, 79, 0.44);
                outline-offset: 3px;
            }

            @media (max-width: 1024px) {
                .sidebar {
                    border-right: none;
                    border-bottom: 1px solid var(--line);
                }
            }

            @media (max-width: 768px) {
                html,
                body {
                    max-width: 100%;
                    overflow-x: hidden;
                }

                body {
                    padding: 8px;
                }

                .container {
                    border-radius: 22px;
                }

                .header {
                    padding: 28px 18px 24px;
                }

                .week-navigation {
                    padding: 14px;
                    gap: 12px;
                    align-items: stretch;
                }

                .week-navigation > div {
                    min-width: 0;
                    width: 100%;
                }

                .week-navigation > div > div:last-child {
                    display: grid !important;
                    grid-template-columns: auto minmax(0, 1fr);
                    width: 100%;
                    gap: 8px;
                    align-items: center;
                }

                .current-week {
                    text-align: center;
                }

                #customStartDate,
                #customEndDate {
                    min-width: 0;
                    width: 100% !important;
                    min-height: 44px;
                }

                .week-navigation .period-nav-btn {
                    display: inline-flex !important;
                    width: 100% !important;
                    border-radius: 999px !important;
                }

                #employeeFilterList {
                    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
                }

                .calendar {
                    grid-template-columns: repeat(2, minmax(0, 1fr));
                    gap: 10px;
                    overflow: visible;
                }

                .sidebar {
                    padding: 14px;
                }

                .schedule-area {
                    min-width: 0;
                    padding: 12px;
                }

                .day-column {
                    min-height: 168px;
                }

                .shift-card {
                    padding: 11px;
                    border-radius: 13px;
                }

                .modal {
                    position: fixed;
                    top: 50% !important;
                    left: 10px !important;
                    right: 10px;
                    width: auto;
                    transform: translateY(-50%);
                }

                .modal-content {
                    width: 100%;
                    max-height: calc(100dvh - 32px);
                    padding: 18px;
                }

                .mobile-time-off-panel {
                    padding: 22px 18px 18px;
                }

                .mobile-time-off-panel:empty {
                    display: none;
                }

                .mobile-time-off-panel .modal.mobile-inline-modal {
                    position: static !important;
                    display: block;
                    width: 100%;
                    padding: 0;
                    overflow: visible;
                    pointer-events: auto;
                    z-index: auto;
                }

                .mobile-time-off-panel .modal.mobile-inline-modal .modal-content {
                    width: 100%;
                    max-height: none;
                    overflow: visible;
                    padding: 26px 18px 18px;
                }

                .date-picker-nav {
                    gap: 8px;
                }

                .date-picker-nav button {
                    min-height: 44px;
                    padding: 8px 10px;
                }

                .date-picker-grid {
                    grid-template-columns: repeat(7, minmax(0, 1fr));
                }

                .date-picker-date {
                    min-width: 0;
                    min-height: 40px;
                }

                .loading-content {
                    width: calc(100vw - 32px);
                    min-width: 0;
                    padding: 28px 18px;
                }
            }

            @media (max-width: 480px) {
                .calendar {
                    grid-template-columns: 1fr;
                }

                .week-navigation > div > div:last-child,
                .date-picker-nav {
                    grid-template-columns: 1fr;
                    flex-direction: column;
                }

                .request-month-nav {
                    grid-template-columns: none;
                    flex-direction: row;
                }

                    text-align: left;
