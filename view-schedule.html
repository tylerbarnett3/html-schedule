                #employeeFilterList {
                    grid-template-columns: 1fr;
                }

                .day-column {
                    min-height: 140px;
                }

                .closed-day-message {
                    min-height: 120px;
                }

                .header button {
                    width: 100%;
                }

                .modal-actions {
                    gap: 8px;
                }
            }
        </style>
    </head>
    <body>
        <!-- Loading Overlay -->
        <div id="loadingOverlay" class="loading-overlay">
            <div class="loading-content">
                <div class="loading-spinner"></div>
                <div class="loading-message" id="loadingMessage">
                    Loading...
                </div>
            </div>
        </div>

        <div class="container">
            <div class="header">
                <h1>Mad Potter Schedule</h1>
                <button
                    onclick="openTimeOffRequestModal()"
                    style="
                        margin-top: 15px;
                        padding: 10px 20px;
                        background: #4299e1;
                        color: white;
                        border: none;
                        border-radius: 6px;
                        cursor: pointer;
                        font-weight: 600;
                        font-size: 14px;
                    "
                >
                    Request Time Off
                </button>
            </div>

            <div id="mobileTimeOffPanel" class="mobile-time-off-panel" hidden></div>

            <div class="main-content">
                <div class="sidebar">
                    <!-- Day Off Toggle -->
                    <div class="section">
                        <label class="sidebar-toggle">
                            <input
                                type="checkbox"
                                id="showDayOffsCheckbox"
                                checked
                                onchange="toggleDayOffs()"
                                aria-label="Toggle visibility of days off on calendar"
                            />
                            <span class="toggle-label">Show Days Off</span>
                        </label>
                    </div>
                    <!-- Employee Filter -->
                    <div class="section">
                        <div
                            class="drawer-header"
                            id="filterDrawerHeader"
                            onclick="toggleDrawer('filterDrawer')"
                            role="button"
                            aria-expanded="false"
                            aria-controls="filterDrawer"
                        >
                            <h2 style="margin: 0">Filter by Employee</h2>
                            <span
                                class="drawer-toggle"
                                id="filterDrawerToggle"
                                aria-hidden="true"
                                >▼</span
                            >
                        </div>
                        <div class="drawer-content" id="filterDrawer">
                            <div
                                style="
                                    margin-bottom: 12px;
                                    display: flex;
                                    gap: 8px;
                                "
                            >
                                <button
                                    class="btn btn-secondary"
                                    onclick="selectAllEmployees()"
                                    style="flex: 1; padding: 8px 12px"
                                >
                                    Select All
                                </button>
                                <button
                                    class="btn btn-secondary"
                                    onclick="deselectAllEmployees()"
                                    style="flex: 1; padding: 8px 12px"
                                >
                                    Clear All
                                </button>
                            </div>
                            <div id="employeeFilterList"></div>
                        </div>
                    </div>
                </div>

                <div class="schedule-area">
                    <div class="week-navigation">
                        <button
                            class="nav-button period-nav-btn"
                            onclick="previousPeriod()"
                            aria-label="Previous period"
                            title="Previous period"
                        >
                            <svg
                                xmlns="http://www.w3.org/2000/svg"
                                width="24"
                                height="24"
                                viewBox="0 0 24 24"
                                fill="none"
                                stroke="currentColor"
                                stroke-width="2"
                                stroke-linecap="round"
                                stroke-linejoin="round"
                                class="lucide lucide-arrow-left-icon lucide-arrow-left"
                                aria-hidden="true"
                            >
                                <path d="m12 19-7-7 7-7" />
                                <path d="M19 12H5" />
                            </svg>
                        </button>
                        <div
                            style="
                                display: flex;
                                flex-direction: column;
                                align-items: center;
                                gap: 8px;
                            "
                        >
                            <div class="current-week" id="currentWeek"></div>
                            <div
                                style="
                                    display: flex;
                                    gap: 10px;
                                    align-items: center;
                                "
                            >
                                <label style="font-size: 14px; color: #555"
                                    >Start:</label
                                >
                                <input
                                    type="date"
                                    id="customStartDate"
                                    style="
                                        padding: 6px 10px;
                                        border: 1px solid #cbd5e0;
                                        border-radius: 6px;
                                        font-size: 14px;
                                    "
                                    onchange="setCustomDates()"
                                />
                                <label style="font-size: 14px; color: #555"
                                    >End:</label
                                >
                                <input
                                    type="date"
                                    id="customEndDate"
                                    style="
                                        padding: 6px 10px;
                                        border: 1px solid #cbd5e0;
                                        border-radius: 6px;
                                        font-size: 14px;
                                    "
                                    onchange="setCustomDates()"
                                />
                            </div>
                        </div>
                        <button
                            class="nav-button period-nav-btn"
                            onclick="nextPeriod()"
                            aria-label="Next period"
                            title="Next period"
                        >
                            <svg
                                xmlns="http://www.w3.org/2000/svg"
                                width="24"
                                height="24"
                                viewBox="0 0 24 24"
                                fill="none"
                                stroke="currentColor"
                                stroke-width="2"
                                stroke-linecap="round"
                                stroke-linejoin="round"
                                class="lucide lucide-arrow-right-icon lucide-arrow-right"
                                aria-hidden="true"
                            >
                                <path d="M5 12h14" />
                                <path d="m12 5 7 7-7 7" />
                            </svg>
                        </button>
                    </div>

                    <div class="calendar" id="calendar"></div>
                </div>
            </div>
        </div>

        <!-- Modal overlay for click-to-close -->
        <div
            class="modal-overlay"
            id="modalOverlay"
            onclick="closeAllModals()"
        ></div>

        <!-- Time-Off Request Modal -->
        <div class="modal" id="timeOffRequestModal">
            <div class="modal-content">
                <div class="modal-header">
                    <h2>Request Time Off</h2>
                </div>

                <div class="input-group">
                    <label>Your Name</label>
                    <select id="requestEmployeeSelect">
                        <option value="">Select your name</option>
                    </select>
                </div>

                <div class="input-group">
                    <label>Select Date(s) - Click to select/deselect</label>

                    <div class="date-picker-nav request-month-nav">
                        <button
                            type="button"
                            class="date-picker-nav-icon"
                            onclick="previousMonth()"
                            aria-label="Previous month"
                            title="Previous month"
                        >
                            <svg
                                xmlns="http://www.w3.org/2000/svg"
                                width="24"
                                height="24"
                                viewBox="0 0 24 24"
                                fill="none"
                                stroke="currentColor"
                                stroke-width="2"
                                stroke-linecap="round"
                                stroke-linejoin="round"
                                class="lucide lucide-arrow-left-icon lucide-arrow-left"
                                aria-hidden="true"
                            >
                                <path d="m12 19-7-7 7-7" />
                                <path d="M19 12H5" />
                            </svg>
                        </button>
                        <span
                            id="currentMonthLabel"
                            class="request-month-label"
                        ></span>
                        <button
                            type="button"
                            class="date-picker-nav-icon"
                            onclick="nextMonth()"
                            aria-label="Next month"
                            title="Next month"
                        >
                            <svg
                                xmlns="http://www.w3.org/2000/svg"
                                width="24"
                                height="24"
                                viewBox="0 0 24 24"
                                fill="none"
                                stroke="currentColor"
                                stroke-width="2"
                                stroke-linecap="round"
                                stroke-linejoin="round"
                                class="lucide lucide-arrow-right-icon lucide-arrow-right"
                                aria-hidden="true"
                            >
                                <path d="M5 12h14" />
                                <path d="m12 5 7 7-7 7" />
                            </svg>
                        </button>
                    </div>

                    <div class="date-picker-grid" id="datePickerGrid"></div>

                    <div class="selected-dates-container">
                        <div class="selected-dates-label">Selected Dates:</div>
                        <div
                            class="selected-dates-chips"
                            id="selectedDatesChips"
                        >
                            <span style="color: #718096; font-size: 13px"
                                >No dates selected</span
                            >
                        </div>
                    </div>
                </div>

                <div class="modal-actions">
                    <button
                        class="btn btn-secondary"
                        onclick="closeTimeOffRequestModal()"
                    >
                        Cancel
                    </button>
                    <button
                        class="btn btn-primary"
                        onclick="submitTimeOffRequest()"
                    >
                        Submit Request
                    </button>
                </div>
            </div>
        </div>

        <!-- Cancel Confirmation Modal -->
        <div class="modal" id="cancelConfirmModal">
            <div class="modal-content">
                <div class="modal-header">
                    <h2>Confirm Cancellation</h2>
                </div>
                <p style="margin-bottom: 20px; color: #4a5568">
                    To cancel this time-off request, please select your name to
                    confirm:
                </p>
                <div class="input-group">
                    <label>Your Name</label>
                    <select id="cancelConfirmName">
                        <option value="">Select your name</option>
                    </select>
                </div>
                <div class="modal-actions">
                    <button
                        class="btn btn-secondary"
                        onclick="closeCancelConfirmModal()"
                    >
                        Cancel
                    </button>
                    <button
                        class="btn btn-delete"
                        onclick="confirmCancelRequest()"
                    >
                        Confirm Cancellation
                    </button>
                </div>
            </div>
        </div>

        <script>
            const APP_VERSION = "v2.1";
            console.log(`Schedule View App Version: ${APP_VERSION}`);

            function isEmbeddedInWix() {
                return window.parent !== window;
            }

            const IS_MOCK_MODE = !isEmbeddedInWix();

            let employees = [];
            let shifts = [];
            let closedDays = [];
            let currentStartDate = new Date();
            let currentEndDate = new Date();
            let selectedEmployees = new Set();
            let showDayOffs = true;

            // Time-off request variables
            let selectedDates = [];
            let currentPickerMonth = new Date();
            let cancelingShiftId = null;
            let cancelingEmployeeName = null;

            // Initialize to today and 35 days from today
            currentStartDate.setHours(0, 0, 0, 0);
            currentEndDate.setHours(0, 0, 0, 0);
            currentEndDate.setDate(currentEndDate.getDate() + 34);

            function formatMockDate(offsetDays) {
                const date = new Date();
                date.setHours(0, 0, 0, 0);
                date.setDate(date.getDate() + offsetDays);
                return formatDate(date);
            }

            function createMockScheduleData({ includeRates = false } = {}) {
                const names = [
                    ["Avery Lane", "#7F6C50"],
                    ["Jordan Price", "#2F855A"],
                    ["Mia Chen", "#2B6CB0"],
                    ["Sam Rivera", "#B7791F"],
                    ["Taylor Brooks", "#9F7AEA"],
                    ["Nora Patel", "#C05621"],
                    ["Eli Morgan", "#319795"],
                    ["Grace Kim", "#D53F8C"],
                    ["Leo Bennett", "#4A5568"],
                ];
                const employees = names.map(([name, color], index) => ({
                    id: 1000 + index,
                    name,
                    archived: false,
                    color,
                    displayOrder: index,
                    rates: includeRates
                        ? [
                              {
                                  rate: 15 + index * 0.5,
                                  startDate: null,
                                  endDate: null,
                              },
                          ]
                        : [],
                }));
                const employeeName = (id) =>
                    employees.find((employee) => employee.id === id)?.name || "";

                return {
                    employees,
                    closedDays: [formatMockDate(10)],
                    shifts: [
                        [1000, 1, "09:00", "15:00"],
                        [1001, 1, "12:00", "18:00"],
                        [1002, 2, "10:00", "16:00"],
                        [1003, 2, "13:00", "19:00"],
                        [1004, 3, "09:30", "14:30"],
                        [1005, 4, "11:00", "17:00"],
                        [1006, 5, "09:00", "13:00"],
                        [1007, 6, "14:00", "20:00"],
                        [1008, 7, "10:00", "18:00"],
                    ].map(([employeeId, offset, startTime, endTime], index) => ({
                        id: 2000 + index,
                        employeeId,
                        employeeName: employeeName(employeeId),
                        date: formatMockDate(offset),
                        startTime,
                        endTime,
                        isDayOff: false,
                        isTimeOffRequest: false,
                        requestStatus: null,
                        requestDate: null,
                        requestedBy: null,
                    })).concat([
                        {
                            id: 2100,
                            employeeId: 1002,
                            employeeName: employeeName(1002),
                            date: formatMockDate(8),
                            startTime: "00:00",
                            endTime: "00:00",
                            isDayOff: true,
                            isTimeOffRequest: false,
                            requestStatus: null,
                            requestDate: null,
                            requestedBy: null,
                        },
                        {
                            id: 2101,
                            employeeId: 1005,
                            employeeName: employeeName(1005),
                            date: formatMockDate(12),
                            startTime: null,
                            endTime: null,
                            isDayOff: false,
                            isTimeOffRequest: true,
                            requestStatus: "pending",
                            requestDate: new Date().toISOString(),
                            requestedBy: employeeName(1005),
                        },
                        {
                            id: 2102,
                            employeeId: 1007,
                            employeeName: employeeName(1007),
                            date: formatMockDate(14),
                            startTime: "00:00",
                            endTime: "00:00",
                            isDayOff: true,
                            isTimeOffRequest: false,
                            requestStatus: "approved",
                            requestDate: new Date().toISOString(),
                            requestedBy: employeeName(1007),
                        },
                    ]),
                };
            }

            function applyLoadedScheduleData(data) {
                employees = data.employees || [];
                shifts = data.shifts || [];
                closedDays = normalizeClosedDays(data.closedDays || []);

                employees.forEach((emp) => {
                    if (!emp.color) {
                        emp.color = "#7F6C50";
                    }
                });

                selectedEmployees = new Set(employees.map((e) => e.id));

                renderEmployeeFilter();
                renderCalendar();
                updateDateInputs();
            }

            function loadMockData() {
                applyLoadedScheduleData(
                    createMockScheduleData({ includeRates: false }),
                );
                hideLoading();
            }

            function showLoading() {
                document
                    .getElementById("loadingOverlay")
                    .classList.add("active");
            }

            function hideLoading() {
                document
                    .getElementById("loadingOverlay")
                    .classList.remove("active");
            }

            // Floating modal positioning
            let lastClickEvent = null;
            let timeOffRequestModalHome = null;
            let timeOffRequestModalNextSibling = null;

            document.addEventListener(
                "click",
                function (e) {
                    lastClickEvent = e;
                },
                true,
            );

            function isMobileLayout() {
                return window.innerWidth <= 768;
            }

            function rememberTimeOffRequestModalHome(modal) {
                if (timeOffRequestModalHome) return;
                timeOffRequestModalHome = modal.parentNode;
                timeOffRequestModalNextSibling = modal.nextSibling;
            }

            function openMobileTimeOffRequestPanel() {
                const modal = document.getElementById("timeOffRequestModal");
                const mount = document.getElementById("mobileTimeOffPanel");
                const overlay = document.getElementById("modalOverlay");

                if (!modal || !mount) return false;

                rememberTimeOffRequestModalHome(modal);
                overlay.classList.remove("active");
                mount.hidden = false;
                mount.appendChild(modal);

                modal.classList.add("mobile-inline-modal", "active");
                modal.style.left = "";
                modal.style.right = "";
                modal.style.top = "";
                modal.style.bottom = "";
                modal.style.width = "";
                modal.style.transform = "";

                const content = modal.querySelector(".modal-content");
                if (content) content.scrollTop = 0;

                return true;
            }

            function restoreMobileTimeOffRequestModal() {
                const modal = document.getElementById("timeOffRequestModal");
                const mount = document.getElementById("mobileTimeOffPanel");

                if (!modal) return;

                modal.classList.remove("mobile-inline-modal");
                if (
                    timeOffRequestModalHome &&
                    modal.parentNode !== timeOffRequestModalHome
                ) {
                    timeOffRequestModalHome.insertBefore(
                        modal,
                        timeOffRequestModalNextSibling,
                    );
                }

                if (mount) mount.hidden = true;
            }

            function openFloatingModal(modalId) {
                const modal = document.getElementById(modalId);
                const overlay = document.getElementById("modalOverlay");

                if (!modal || !lastClickEvent) return;

                // Show overlay
                overlay.classList.add("active");

                const content = modal.querySelector(".modal-content");
                if (content) content.scrollTop = 0;

                if (isMobileLayout()) {
                    modal.style.left = "";
                    modal.style.right = "";
                    modal.style.top = "";
                    modal.style.bottom = "";
                    modal.style.width = "";
                    modal.style.transform = "";
                    modal.classList.add("active");
                    return;
                }

                modal.style.right = "auto";

                // Get click position
                const clickX = lastClickEvent.pageX;
                const clickY = lastClickEvent.pageY;

                // Get viewport dimensions
                const viewportWidth = window.innerWidth;
                const modalWidth = 500; // Match CSS width

                // Calculate horizontal position - try to center on click, but keep in bounds
                let left = clickX - modalWidth / 2;
                left = Math.max(
                    10,
                    Math.min(left, viewportWidth - modalWidth - 10),
                );

                // Position vertically below the click point
                let top = clickY + 20;

                // Apply position
                modal.style.left = left + "px";
                modal.style.top = top + "px";

                // Show modal
                modal.classList.add("active");
            }

            function closeAllModals() {
                document.querySelectorAll(".modal").forEach((modal) => {
                    modal.classList.remove("active");
                });
                document
                    .getElementById("modalOverlay")
                    .classList.remove("active");
                restoreMobileTimeOffRequestModal();

                // Reset state variables
                selectedDates = [];
                cancelingShiftId = null;
                cancelingEmployeeName = null;
            }

            // Helper function to open modal at current scroll position
            function loadFromDatabase() {
                if (IS_MOCK_MODE) {
                    loadMockData();
                    return;
                }

                console.log("Requesting schedule data from Wix...");
                showLoading();

                window.parent.postMessage(
                    {
                        action: "LOAD_FROM_DATABASE",
                    },
                    "*",
                );

                setTimeout(() => {
                    if (employees.length === 0) {
                        console.error("No data received after 10 seconds");
                        hideLoading();
                        const calendar = document.getElementById("calendar");
                        if (calendar) {
                            calendar.innerHTML =
                                '<div class="empty-state" style="grid-column: 1 / -1;">Unable to load schedule. Please refresh the page.</div>';
                        }
                    }
                }, 10000);
            }

            window.addEventListener("message", function (event) {
                console.log("Received message:", event.data);

                if (event.data && event.data.action === "LOAD_COMPLETE") {
                    console.log("Processing LOAD_COMPLETE message");
                    applyLoadedScheduleData(event.data);

                    hideLoading();
                    console.log("Rendering complete");
                } else if (
                    event.data &&
                    event.data.action === "TIME_OFF_REQUEST_SUBMITTED"
                ) {
                    const submittedDates = event.data.submittedDates || [];
                    const skippedDates = event.data.skippedDates || [];
                    const skippedText = formatDateList(skippedDates);

                    if (submittedDates.length > 0 && skippedDates.length > 0) {
                        alert(
                            `Time-off request submitted. Skipped dates that are closed or already had a pending or approved request: ${skippedText}`,
                        );
                    } else if (submittedDates.length > 0) {
                        alert(
                            "Time-off request submitted! Your manager will review it shortly.",
                        );
                    } else if (skippedDates.length > 0) {
                        alert(
                            `No new requests were submitted. These dates are closed or already had pending or approved requests: ${skippedText}`,
                        );
                    }
                } else if (
                    event.data &&
                    event.data.action === "TIME_OFF_ERROR"
                ) {
                    hideLoading();
                    alert(
                        event.data.message ||
                            "There was an error submitting your time-off request.",
                    );
                }
            });

            function renderEmployeeFilter() {
                const filterList =
                    document.getElementById("employeeFilterList");
                if (!filterList) return;

                if (employees.length === 0) {
                    filterList.innerHTML =
                        '<div class="empty-state">No employees</div>';
                    return;
                }

                filterList.innerHTML = employees
                    .map(
                        (emp) => `
                <div class="filter-checkbox-item" onclick="toggleEmployeeFilter(${emp.id})">
                    <input type="checkbox"
                           id="filter-${emp.id}"
                           ${selectedEmployees.has(emp.id) ? "checked" : ""}
                           onclick="event.stopPropagation(); toggleEmployeeFilter(${emp.id})">
                    <label for="filter-${emp.id}">${emp.name}</label>
                </div>
            `,
                    )
                    .join("");
            }

            function toggleEmployeeFilter(employeeId) {
                if (selectedEmployees.has(employeeId)) {
                    selectedEmployees.delete(employeeId);
                } else {
                    selectedEmployees.add(employeeId);
                }
                renderEmployeeFilter();
                renderCalendar();
            }

            function selectAllEmployees() {
                employees.forEach((emp) => selectedEmployees.add(emp.id));
                renderEmployeeFilter();
                renderCalendar();
            }

            function deselectAllEmployees() {
                selectedEmployees.clear();
                renderEmployeeFilter();
                renderCalendar();
            }

            function toggleDayOffs() {
                showDayOffs = document.getElementById(
                    "showDayOffsCheckbox",
                ).checked;
                renderCalendar();
            }

            function toggleDrawer(drawerId) {
                const drawer = document.getElementById(drawerId);
                const toggle = document.getElementById(drawerId + "Toggle");
                const header = document.getElementById(drawerId + "Header");

                if (drawer.classList.contains("open")) {
                    drawer.classList.remove("open");
                    toggle.classList.remove("open");
                    if (header) {
                        header.classList.remove("drawer-open");
                        header.setAttribute("aria-expanded", "false");
                    }
                } else {
                    drawer.classList.add("open");
                    toggle.classList.add("open");
                    if (header) {
                        header.classList.add("drawer-open");
                        header.setAttribute("aria-expanded", "true");
                    }
                }
            }

            function previousPeriod() {
                const dayCount = getDayCount();
                currentStartDate.setDate(currentStartDate.getDate() - dayCount);
                currentEndDate.setDate(currentEndDate.getDate() - dayCount);
                updateDateInputs();
                renderCalendar();
            }

            function nextPeriod() {
                const dayCount = getDayCount();
                currentStartDate.setDate(currentStartDate.getDate() + dayCount);
                currentEndDate.setDate(currentEndDate.getDate() + dayCount);
                updateDateInputs();
                renderCalendar();
            }

            function setCustomDates() {
                const startInput = document.getElementById("customStartDate");
                const endInput = document.getElementById("customEndDate");

                if (startInput.value && endInput.value) {
                    const newStart = new Date(startInput.value + "T00:00:00");
                    const newEnd = new Date(endInput.value + "T00:00:00");

                    if (newEnd < newStart) {
                        alert("End date must be after start date");
                        updateDateInputs();
                        return;
                    }

                    currentStartDate = newStart;
                    currentEndDate = newEnd;
                    renderCalendar();
                } else if (startInput.value) {
                    currentStartDate = new Date(startInput.value + "T00:00:00");
                    currentEndDate = new Date(currentStartDate);
                    currentEndDate.setDate(currentEndDate.getDate() + 34);
                    updateDateInputs();
                    renderCalendar();
                } else if (endInput.value) {
                    currentEndDate = new Date(endInput.value + "T00:00:00");
                    currentStartDate = new Date(currentEndDate);
                    currentStartDate.setDate(currentStartDate.getDate() - 34);
                    updateDateInputs();
                    renderCalendar();
                }
            }

            function updateDateInputs() {
                const startInput = document.getElementById("customStartDate");
                const endInput = document.getElementById("customEndDate");

                if (startInput && endInput) {
                    const formatDate = (date) => {
                        const year = date.getFullYear();
                        const month = String(date.getMonth() + 1).padStart(
                            2,
                            "0",
                        );
                        const day = String(date.getDate()).padStart(2, "0");
                        return `${year}-${month}-${day}`;
                    };

                    startInput.value = formatDate(currentStartDate);
                    endInput.value = formatDate(currentEndDate);
                }
            }

            function getDayCount() {
                const timeDiff = currentEndDate - currentStartDate;
                return Math.floor(timeDiff / (1000 * 60 * 60 * 24)) + 1;
            }

            function normalizeClosedDays(days) {
                return [
                    ...new Set(
                        (days || [])
                            .map((day) => {
                                if (!day) return null;
                                if (day instanceof Date) return formatDate(day);
                                const value = String(day);
                                return value.includes("T")
                                    ? value.split("T")[0]
                                    : value;
                            })
                            .filter(Boolean),
                    ),
                ].sort();
            }

            function isClosedDate(dateStr) {
                return closedDays.includes(dateStr);
            }

            function formatDate(date) {
                return date.toISOString().split("T")[0];
            }

            function formatDateList(dateStrings) {
                return dateStrings
                    .map((dateStr) => {
                        const date = new Date(dateStr + "T00:00:00");
                        return date.toLocaleDateString("en-US", {
                            month: "short",
                            day: "numeric",
                            year: "numeric",
                        });
                    })
                    .join(", ");
            }

            function formatTime12Hour(time24) {
                if (!time24) return "—";
                const [hours, minutes] = time24.split(":");
                const hour = parseInt(hours);
                const ampm = hour >= 12 ? "PM" : "AM";
                const hour12 = hour % 12 || 12;
                return `${hour12}:${minutes} ${ampm}`;
            }

            function renderCalendar() {
                const calendar = document.getElementById("calendar");
                if (!calendar) return;
                const dayNames = [
                    "Sun",
                    "Mon",
                    "Tue",
                    "Wed",
                    "Thu",
                    "Fri",
                    "Sat",
                ];
                const dayNamesFull = [
                    "Sunday",
                    "Monday",
                    "Tuesday",
                    "Wednesday",
                    "Thursday",
                    "Friday",
                    "Saturday",
                ];

                const dayCount = getDayCount();

                const currentWeekEl = document.getElementById("currentWeek");
                if (currentWeekEl) {
                    currentWeekEl.textContent = `${currentStartDate.toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" })} - ${currentEndDate.toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" })} (${dayCount} days)`;
                }

                let calendarHTML = "";

                const totalCells = Math.ceil(dayCount / 7) * 7;

                const startDayOfWeek = currentStartDate.getDay();
                for (let i = 0; i < 7; i++) {
                    const dayIndex = (startDayOfWeek + i) % 7;
                    calendarHTML += `
                    <div class="day-header" style="min-height: auto; padding: 10px; font-weight: 700;">
                        ${dayNames[dayIndex]}
                    </div>
                `;
                }

                const isMobile = window.innerWidth <= 768;

                for (let i = 0; i < totalCells; i++) {
                    if (i < dayCount) {
                        const date = new Date(currentStartDate);
                        date.setDate(date.getDate() + i);
                        const dateStr = formatDate(date);

                        let dateDisplay;
                        if (isMobile) {
                            const dayName = dayNamesFull[date.getDay()];
                            const monthName = date.toLocaleDateString("en-US", {
                                month: "short",
                            });
                            dateDisplay = `${dayName}, ${monthName} ${date.getDate()}`;
                        } else {
                            dateDisplay = `${date.getDate()} ${date.toLocaleDateString("en-US", { month: "short" })}`;
                        }

                        const dayIsClosed = isClosedDate(dateStr);

                        const dayShifts = shifts
                            .filter((s) => {
                                if (dayIsClosed) return false;
                                if (s.date !== dateStr) return false;

                                // Filter out denied requests
                                if (s.requestStatus === "denied") return false;

                                if (
                                    !showDayOffs &&
                                    s.isDayOff &&
                                    !s.isTimeOffRequest
                                )
                                    return false;
                                if (
                                    !showDayOffs &&
                                    s.isTimeOffRequest &&
                                    s.requestStatus === "pending"
                                )
                                    return false;

                                // If no employees selected, show no shifts
                                if (selectedEmployees.size === 0) return false;
                                return selectedEmployees.has(s.employeeId);
                            })
                            .sort((a, b) => {
                                // Pending time-off requests at top
                                if (
                                    a.isTimeOffRequest &&
                                    a.requestStatus === "pending" &&
                                    !(
                                        b.isTimeOffRequest &&
                                        b.requestStatus === "pending"
                                    )
                                )
                                    return -1;
                                if (
                                    b.isTimeOffRequest &&
                                    b.requestStatus === "pending" &&
                                    !(
                                        a.isTimeOffRequest &&
                                        a.requestStatus === "pending"
                                    )
                                )
                                    return 1;

                                // Both are pending time-off requests - sort by creation time
                                if (
                                    a.isTimeOffRequest &&
                                    a.requestStatus === "pending" &&
                                    b.isTimeOffRequest &&
                                    b.requestStatus === "pending"
                                ) {
                                    // Try requestDate first if available, otherwise use id
                                    if (a.requestDate && b.requestDate) {
                                        return (
                                            new Date(a.requestDate) -
                                            new Date(b.requestDate)
                                        ); // Earlier dates first
                                    }
                                    return a.id - b.id; // Lower id = created first = appears first
                                }

                                // Regular shifts in middle (by time)
                                if (
                                    !a.isDayOff &&
                                    !a.isTimeOffRequest &&
                                    !b.isDayOff &&
                                    !b.isTimeOffRequest
                                ) {
                                    return (a.startTime || "").localeCompare(
                                        b.startTime || "",
                                    );
                                }

                                // Day offs at bottom
                                if (a.isDayOff && !b.isDayOff) return 1;
                                if (!a.isDayOff && b.isDayOff) return -1;

                                // Both are day offs - sort by creation time for approved time-off requests
                                if (a.isDayOff && b.isDayOff) {
                                    // Try requestDate first if available, otherwise use id
                                    if (a.requestDate && b.requestDate) {
                                        return (
                                            new Date(a.requestDate) -
                                            new Date(b.requestDate)
                                        ); // Earlier dates first
                                    }
                                    return a.id - b.id;
                                }

                                return 0;
                            });

                        const cellIndex = i + 7;
                        const row = Math.floor(cellIndex / 2);
                        const col = cellIndex % 2;
                        const isGray = (row + col) % 2 === 1;
                        const bgClass = isGray ? "day-column-gray" : "";

                        calendarHTML += `
                        <div class="day-column ${bgClass}">
                            <div class="date-header">
                                ${dateDisplay}
                            </div>
                            <div class="shifts-container" style="padding: 8px;">
                                ${
                                    dayIsClosed
                                        ? '<div class="closed-day-message">C<br>L<br>O<br>S<br>E<br>D</div>'
                                        : dayShifts
                                              .map((shift, index) => {
                                                  const employee =
                                                      employees.find(
                                                          (e) =>
                                                              e.id ===
                                                              shift.employeeId,
                                                      );
                                                  let bgColor;
                                                  let shiftText;
                                                  let extraButton = "";

                                                  // Check approved FIRST (before checking pending)
                                                  if (
                                                      shift.requestStatus ===
                                                          "approved" ||
                                                      shift.isDayOff
                                                  ) {
                                                      bgColor =
                                                          "linear-gradient(135deg, #f56565 0%, #c53030 100%)";
                                                      shiftText = "DAY OFF";
                                                  } else if (
                                                      shift.isTimeOffRequest &&
                                                      shift.requestStatus ===
                                                          "pending"
                                                  ) {
                                                      // Count total pending/approved time-off requests for this day
                                                      const totalTimeOffRequests =
                                                          shifts.filter(
                                                              (s) =>
                                                                  s.date ===
                                                                      dateStr &&
                                                                  s.isTimeOffRequest &&
                                                                  (s.requestStatus ===
                                                                      "pending" ||
                                                                      s.requestStatus ===
                                                                          "approved"),
                                                          ).length;

                                                      // Count how many pending requests come before this one in the sorted list
                                                      const pendingRequestsBefore =
                                                          dayShifts
                                                              .slice(0, index)
                                                              .filter(
                                                                  (s) =>
                                                                      s.isTimeOffRequest &&
                                                                      s.requestStatus ===
                                                                          "pending",
                                                              ).length;

                                                      // If 4+ total requests and this is the 4th+ pending request, use purple
                                                      if (
                                                          totalTimeOffRequests >=
                                                              4 &&
                                                          pendingRequestsBefore >=
                                                              3
                                                      ) {
                                                          bgColor = "#9333EA"; // Purple
                                                      } else {
                                                          bgColor = "#FDB913"; // Yellow
                                                      }

                                                      shiftText =
                                                          "PENDING TIME OFF";
                                                      extraButton = `<button class="shift-cancel" onclick="cancelTimeOffRequest(${shift.id}, '${shift.employeeName}')">Cancel Request</button>`;
                                                  } else {
                                                      bgColor =
                                                          employee?.color ||
                                                          "#7F6C50";
                                                      shiftText =
                                                          formatTime12Hour(
                                                              shift.startTime,
                                                          ) +
                                                          " - " +
                                                          formatTime12Hour(
                                                              shift.endTime,
                                                          );
                                                  }

                                                  return `
                                    <div class="shift-card" style="background: ${bgColor};">
                                        <div class="shift-employee">${shift.employeeName}</div>
                                        <div class="shift-time">${shiftText}</div>
                                        ${extraButton}
                                    </div>
                                `;
                                              })
                                              .join("")
                                }
                            </div>
                        </div>
                    `;
                    } else {
                        const cellIndex = i + 7;
                        const row = Math.floor(cellIndex / 2);
                        const col = cellIndex % 2;
                        const isGray = (row + col) % 2 === 1;
                        const bgStyle = isGray
                            ? "background: #f8f9fa;"
                            : "background: white;";
                        calendarHTML += `<div class="day-column" style="${bgStyle}"></div>`;
                    }
                }

                calendar.innerHTML = calendarHTML;
            }

            // Time-Off Request Functions
            let requestEmployeeListenerAttached = false;

            function handleRequestEmployeeChange() {
                selectedDates = []; // Clear selections when changing employee
                renderDatePicker();
            }

            function openTimeOffRequestModal() {
                selectedDates = [];
                currentPickerMonth = new Date();

                // Populate employee dropdown
                const select = document.getElementById("requestEmployeeSelect");
                const activeEmployees = employees.filter(
                    (emp) => !emp.archived,
                );
                select.innerHTML =
                    '<option value="">Select your name</option>' +
                    activeEmployees
                        .map(
                            (emp) =>
                                `<option value="${emp.id}">${emp.name}</option>`,
                        )
                        .join("");

                // Add event listener only once to avoid memory leak
                if (!requestEmployeeListenerAttached) {
                    select.addEventListener(
                        "change",
                        handleRequestEmployeeChange,
                    );
                    requestEmployeeListenerAttached = true;
                }

                renderDatePicker();
                if (isMobileLayout() && openMobileTimeOffRequestPanel()) {
                    return;
                }

                restoreMobileTimeOffRequestModal();
                openFloatingModal("timeOffRequestModal");
            }

            function closeTimeOffRequestModal() {
                closeAllModals();
            }

            function renderDatePicker() {
                const grid = document.getElementById("datePickerGrid");
                const year = currentPickerMonth.getFullYear();
                const month = currentPickerMonth.getMonth();

                document.getElementById("currentMonthLabel").textContent =
                    currentPickerMonth.toLocaleDateString("en-US", {
                        month: "long",
                        year: "numeric",
                    });

                const firstDay = new Date(year, month, 1);
                const lastDay = new Date(year, month + 1, 0);
                const daysInMonth = lastDay.getDate();
                const startDayOfWeek = firstDay.getDay();

                let html = "";

                const dayNames = [
                    "Sun",
                    "Mon",
                    "Tue",
                    "Wed",
                    "Thu",
                    "Fri",
                    "Sat",
                ];
                dayNames.forEach((day) => {
                    html += `<div class="date-picker-day-header">${day}</div>`;
                });

                for (let i = 0; i < startDayOfWeek; i++) {
                    html += "<div></div>";
                }

                const today = new Date();
                today.setHours(0, 0, 0, 0);
                const maxDate = new Date(today);
                maxDate.setDate(maxDate.getDate() + 365);

                for (let day = 1; day <= daysInMonth; day++) {
                    const date = new Date(year, month, day);
                    const dateStr = formatDate(date);

                    const isPast = date < today;
                    const isTooFar = date > maxDate;
                    const hasConflict = checkDateConflict(dateStr);
                    const isClosed = isClosedDate(dateStr);

                    const isDisabled =
                        isPast || isTooFar || hasConflict || isClosed;
                    const isSelected = selectedDates.includes(dateStr);

                    const selectedClass = isSelected ? "selected" : "";

                    html += `
                    <button class="date-picker-date ${selectedClass}"
                            onclick="toggleDateSelection('${dateStr}')"
                            title="${isClosed ? "Closed for business" : ""}"
                            ${isDisabled ? "disabled" : ""}>
                        ${day}
                    </button>
                `;
                }

                grid.innerHTML = html;
                renderSelectedDatesChips();
            }

            function checkDateConflict(dateStr) {
                if (isClosedDate(dateStr)) return true;

                const selectedEmployeeId = parseInt(
                    document.getElementById("requestEmployeeSelect").value,
                );
                if (!selectedEmployeeId) return false;

                return shifts.some(
                    (s) =>
                        s.date === dateStr &&
                        s.employeeId === selectedEmployeeId &&
                        s.isTimeOffRequest &&
                        (s.requestStatus === "pending" ||
                            s.requestStatus === "approved"),
                );
            }

            function toggleDateSelection(dateStr) {
                const index = selectedDates.indexOf(dateStr);
                if (index > -1) {
                    selectedDates.splice(index, 1);
                } else {
                    selectedDates.push(dateStr);
                }
                selectedDates.sort();
                renderDatePicker();
            }

            function renderSelectedDatesChips() {
                const container = document.getElementById("selectedDatesChips");
                if (selectedDates.length === 0) {
                    container.innerHTML =
                        '<span style="color: #718096; font-size: 13px;">No dates selected</span>';
                    return;
                }

                container.innerHTML = selectedDates
                    .map((dateStr) => {
                        const date = new Date(dateStr + "T00:00:00");
                        const formatted = date.toLocaleDateString("en-US", {
                            month: "short",
                            day: "numeric",
                            year: "numeric",
                        });
                        return `
                    <div class="date-chip">
                        <span>${formatted}</span>
                        <button class="date-chip-remove" onclick="toggleDateSelection('${dateStr}')">×</button>
                    </div>
                `;
                    })
                    .join("");
            }

            function previousMonth() {
                currentPickerMonth.setMonth(currentPickerMonth.getMonth() - 1);
                renderDatePicker();
            }

            function nextMonth() {
                const today = new Date();
                const maxMonth = new Date(
                    today.getFullYear(),
                    today.getMonth() + 12,
                    1,
                );

                const nextMonth = new Date(
                    currentPickerMonth.getFullYear(),
                    currentPickerMonth.getMonth() + 1,
                    1,
                );
                if (nextMonth <= maxMonth) {
                    currentPickerMonth = nextMonth;
                    renderDatePicker();
                }
            }

            function submitTimeOffRequest() {
                const employeeId = parseInt(
                    document.getElementById("requestEmployeeSelect").value,
                );
                const employee = employees.find((e) => e.id === employeeId);

                if (!employeeId || !employee) {
                    alert("Please select your name");
                    return;
                }

                if (selectedDates.length === 0) {
                    alert("Please select at least one date");
                    return;
                }

                if (selectedDates.some((dateStr) => isClosedDate(dateStr))) {
                    alert(
                        "Time-off requests cannot be submitted for closed business days.",
                    );
                    return;
                }

                // Check for high-volume dates (3+ pending/approved requests)
                const highVolumeDates = selectedDates.filter((dateStr) => {
                    const requestCount = shifts.filter(
                        (s) =>
                            s.date === dateStr &&
                            s.isTimeOffRequest &&
                            (s.requestStatus === "pending" ||
                                s.requestStatus === "approved"),
                    ).length;
                    return requestCount >= 3;
                });

                // Show warning if any high-volume dates detected
                if (highVolumeDates.length > 0) {
                    const formattedDates = highVolumeDates
                        .map((dateStr) => {
                            const date = new Date(dateStr + "T00:00:00");
                            return date.toLocaleDateString("en-US", {
                                month: "short",
                                day: "numeric",
                                year: "numeric",
                            });
                        })
                        .join(", ");

                    const warningMessage =
                        highVolumeDates.length === 1
                            ? `Warning: ${formattedDates} already has 3 or more time-off requests. Your request may not be approved due to high volume.\n\nDo you want to submit anyway?`
                            : `Warning: The following dates already have 3 or more time-off requests:\n${formattedDates}\n\nYour requests for these days may not be approved due to high volume.\n\nDo you want to submit anyway?`;

                    if (!confirm(warningMessage)) {
                        return;
                    }
                }

                if (IS_MOCK_MODE) {
                    selectedDates.forEach((dateStr) => {
                        shifts.push({
                            id: Date.now() + Math.random(),
                            employeeId: employeeId,
                            employeeName: employee.name,
                            date: dateStr,
                            startTime: null,
                            endTime: null,
                            isDayOff: false,
                            isTimeOffRequest: true,
                            requestStatus: "pending",
                            requestDate: new Date().toISOString(),
                            requestedBy: employee.name,
                        });
                    });

                    selectedDates = [];
                    closeTimeOffRequestModal();
                    renderCalendar();
                    alert(
                        "Time-off request submitted! Your manager will review it shortly.",
                    );
                    return;
                }

                window.parent.postMessage(
                    {
                        action: "SUBMIT_TIME_OFF_REQUEST",
                        data: {
                            employeeId: employeeId,
                            employeeName: employee.name,
                            dates: selectedDates,
                            requestDate: new Date().toISOString(),
                        },
                    },
                    "*",
                );

                selectedDates = [];
                closeTimeOffRequestModal();
                showLoading();
            }

            function cancelTimeOffRequest(shiftId, employeeName) {
                const shift = shifts.find((s) => s.id === shiftId);
                if (!shift) return;

                cancelingShiftId = shiftId;
                cancelingEmployeeName = employeeName;

                const select = document.getElementById("cancelConfirmName");
                const activeEmployees = employees.filter((e) => !e.archived);
                select.innerHTML =
                    '<option value="">Select your name</option>' +
                    activeEmployees
                        .map(
                            (e) =>
                                `<option value="${e.name}">${e.name}</option>`,
                        )
                        .join("");

                openFloatingModal("cancelConfirmModal");
            }

            function closeCancelConfirmModal() {
                closeAllModals();
            }

            function confirmCancelRequest() {
                const selectedName =
                    document.getElementById("cancelConfirmName").value;

                if (!selectedName) {
                    alert("Please select your name to confirm");
                    return;
                }

                if (selectedName !== cancelingEmployeeName) {
                    alert(
                        "Name does not match. You can only cancel your own time-off requests.",
                    );
                    return;
                }

                const shift = shifts.find((s) => s.id === cancelingShiftId);

                if (IS_MOCK_MODE) {
                    shifts = shifts.filter((s) => s.id !== cancelingShiftId);
                    closeCancelConfirmModal();
                    renderCalendar();
                    alert("Time-off request cancelled.");
                    return;
                }

                window.parent.postMessage(
                    {
                        action: "CANCEL_TIME_OFF_REQUEST",
                        shiftData: {
                            employeeName: shift.employeeName,
                            date: shift.date,
                        },
                    },
                    "*",
                );

                closeCancelConfirmModal();

                alert("Time-off request cancelled.");
            }

            // Initialize - Auto-load on page load
            window.addEventListener("load", function () {
                updateDateInputs();
                renderCalendar();

                if (IS_MOCK_MODE) {
                    loadMockData();
                } else {
                    setTimeout(() => {
                        loadFromDatabase();
                    }, 500);
                }
            });
        </script>
    </body>
</html>
